    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `

1. EL CONCEPTO DE ADMINISTRACIÓN PÚBLICA

La Administración pública surge históricamente vinculada a la separación de poderes tras la Revolución Francesa. Frente a la concentración de funciones en el monarca absoluto, se establecen tres funciones diferenciadas: legislar, ejecutar y juzgar, cada una atribuida a órganos distintos e independientes. La Administración se identifica así con la organización encargada de ejercer la función ejecutiva o de administrar.

Sin embargo, definir qué es administrar plantea dificultades, porque las funciones del poder ejecutivo han evolucionado. En el Estado social de Derecho la Administración no solo ejerce potestades públicas que implican autoridad y desigualdad frente al ciudadano, sino que también presta servicios públicos esenciales y desarrolla actividades económicas sometidas a las reglas del mercado. Esta ampliación funcional complica su delimitación frente a los otros poderes.

La función administrativa consiste en aplicar la ley al caso concreto, pero esta operación también la realizan los jueces. La diferencia radica en que el juez actúa con independencia absoluta y su decisión prevalece. Además, cuando la Administración actúa en el ámbito de la discrecionalidad, puede integrar criterios de oportunidad, eficacia o eficiencia dentro del marco de la legalidad, mientras que el juez se rige exclusivamente por el principio de legalidad.

También el legislador ha asumido en ocasiones tareas de aplicación concreta mediante las llamadas leyes singulares, que contienen decisiones particulares. El Tribunal Constitucional ha admitido su constitucionalidad, pero sometiéndolas al principio de proporcionalidad cuando puedan afectar al derecho a la tutela judicial efectiva.

Ante estas dificultades, la función de administrar se ha definido negativamente como la distinta de la legislativa y judicial. No obstante, el sistema constitucional incluye otros órganos de control, como el Defensor del Pueblo y el Tribunal de Cuentas, que no encajan estrictamente en la clásica división tripartita.

El elemento esencial de la Administración es su personalidad jurídica. No es un simple conjunto de órganos, sino una persona jurídica que actúa como sujeto de derecho, celebra contratos, posee patrimonio y responde ante los tribunales. Según la LRJSP, cada Administración actúa con personalidad jurídica única.

No existe una única Administración, sino varias administraciones territoriales —Estado, comunidades autónomas y entidades locales— definidas por su ámbito territorial y dotadas de potestades públicas como la reglamentaria, expropiatoria o tributaria. Junto a ellas se sitúa la Administración institucional, integrada por organismos públicos y entidades de derecho público con personalidad propia y fines específicos.

Existen además entidades del sector público con forma privada, como sociedades mercantiles públicas o fundaciones, que han protagonizado la denominada huida del Derecho administrativo, al utilizar formas privadas para eludir controles públicos. Frente a ello se formuló la tesis de la reserva constitucional de Derecho administrativo, aunque finalmente ha sido el Derecho europeo el que ha reforzado los controles en materia de contratación y gasto.

Por último, aparecen figuras intermedias como las corporaciones públicas de base asociativa privada y supuestos en los que particulares colaboran en el ejercicio de funciones públicas sin integrarse en la Administración. Todo ello muestra la complejidad del concepto y anticipa el estudio de las formas de colaboración de los privados en el ejercicio de funciones públicas.

2. LAS CORPORACIONES DE DERECHO PÚBLICO

2.1. Origen de las corporaciones públicas.

En el Estado liberal inicial solo se reconocían los intereses del individuo y del Estado, lo que explica la tardía admisión de la libertad de asociación. Sin embargo, algunas asociaciones históricas sobrevivieron por su arraigo social, y el Estado advirtió la utilidad de que los propios interesados participaran en el ejercicio de funciones públicas, siempre bajo control administrativo.

Durante el siglo XX, especialmente en periodos autoritarios, la técnica corporativa se expandió como instrumento de ordenación social, sustituyendo en ocasiones la libre asociación y sindicación. Se generalizó la creación de colegios profesionales y cámaras sectoriales con adscripción forzosa, así como corporaciones en ámbitos específicos como la ONCE o la SGAE.

Estas entidades combinan fines públicos y privados, situándose a medio camino entre la Administración y las asociaciones privadas.

2.2. ¿Existe una garantía constitucional de la organización corporativa?

La Constitución menciona expresamente a los colegios profesionales (art. 36 CE) y de forma indirecta a las organizaciones profesionales (art. 52 CE), imponiendo reserva de ley y funcionamiento democrático. No obstante, el Tribunal Constitucional ha negado que exista una garantía institucional que obligue a mantener su configuración tradicional. Corresponde al legislador determinar su naturaleza jurídica y régimen, dentro de los límites constitucionales, pudiendo configurarlas como corporaciones públicas o asociaciones privadas, ampliar o reducir sus funciones e incluso establecer modelos distintos. La Constitución no impone su mantenimiento en los términos históricos en que fueron concebidas.

2.3. La distribución competencial en materia de corporaciones públicas.

Aunque la Constitución no menciona expresamente las corporaciones públicas en los artículos 148 y 149 CE, muchos estatutos de autonomía han asumido competencia exclusiva en la materia.

Sin embargo, el Estado conserva competencia para establecer las bases del régimen jurídico cuando ejercen funciones administrativas, en virtud del artículo 149.1.18 CE. En el caso de los colegios profesionales, el Tribunal Constitucional ha declarado que la adscripción obligatoria puede formar parte de esas bases estatales, siempre que se respeten las exigencias constitucionales. Además, cuando se impone colegiación obligatoria, el Estado actúa también al amparo del artículo 149.1.1 CE, al afectar a las condiciones básicas de igualdad en el ejercicio del derecho al trabajo y a la libre elección de profesión u oficio.

2.4. La naturaleza jurídico-pública de las corporaciones.

La controversia sobre si las corporaciones son entidades públicas o privadas, debido a su base asociativa, ha sido resuelta por el legislador al calificarlas expresamente como entidades de derecho público. Además, el artículo 1.2 LJCA las incluye dentro de las administraciones públicas a efectos jurisdiccionales cuando estén sometidas a tutela administrativa. Aunque parte de la doctrina cuestiona la necesidad de esta personificación pública, la discusión carece hoy de consecuencias prácticas relevantes, ya que es indiscutido que su actividad es administrativa cuando ejercen funciones públicas y privada en el resto de su actuación.

2.5. Características de las corporaciones.

Las corporaciones de derecho público presentan como notas esenciales: - Origen público, pues son creadas por ley o acto del poder público y no por libre voluntad asociativa Dualidad funcional, ya que ejercen funciones públicas y privadas, lo que determina un régimen jurídico mixto de derecho administrativo y derecho privado - Autofinanciación mediante cuotas o aportaciones de sus miembros - Actuación en régimen de monopolio, al existir una única corporación para cada sector - Adscripción obligatoria indirecta, en cuanto la pertenencia se convierte en requisito para ejercer una profesión o actividad.

La adscripción forzosa es el elemento más problemático desde la perspectiva constitucional. El Tribunal Constitucional ha afirmado que las corporaciones no son asociaciones privadas en sentido propio y no se incardinan directamente en los artículos 22 y 28 CE. No obstante, el derecho de asociación opera como límite: - No pueden impedir la creación y funcionamiento de asociaciones privadas para fines propios - La adscripción obligatoria solo es constitucional si está justificada por un interés público relevante y no existe una vía menos restrictiva. En todo caso, la adscripción es un mecanismo excepcional que debe justificarse por las concretas funciones públicas atribuidas.

2.6. La organización cameral.

De las cámaras oficiales previstas en el artículo 52 CE, solo han subsistido como corporaciones públicas, aunque transformadas, las cámaras de comercio y, en algunas comunidades autónomas, determinadas cámaras agrarias.

2.6.1. Las cámaras agrarias.

Originariamente asociaciones privadas, fueron progresivamente publificadas hasta convertirse en corporaciones de adscripción obligatoria. La atribución de funciones comerciales y la obligatoriedad de pertenencia generaron conflictos con la libertad de asociación, lo que llevó a la Ley 23/1986 a suprimir elementos esenciales del modelo corporativo, limitando sus funciones a tareas consultivas y de colaboración y eliminando su papel representativo. Posteriormente, la Ley 18/2005 dejó su regulación en manos de las comunidades autónomas, muchas de las cuales optaron por suprimirlas, aunque algunas las mantienen.

2.6.2. Las cámaras de la propiedad urbana.

Evolucionaron desde asociaciones privadas hacia corporaciones públicas con adscripción obligatoria. A partir de 1988 se inició un proceso legislativo que culminó en su extinción. El Tribunal Constitucional declaró inconstitucional la adscripción forzosa por vulneración del derecho de asociación cuando no existían funciones públicas que la justificaran. Tras diversos intentos normativos y pronunciamientos, su desaparición fue finalmente consolidada, aunque algunas comunidades autónomas las mantienen como entidades asociativas privadas sin funciones públicas.

2.6.3. Las cámaras de comercio, industria y navegación.

Nacieron como asociaciones voluntarias y fueron convertidas en corporaciones públicas con adscripción y financiación obligatoria. La constitucionalidad de esta adscripción fue objeto de pronunciamientos contradictorios del Tribunal Constitucional: primero se declaró incompatible con el derecho de asociación y posteriormente se consideró justificada por sus funciones públicas y por el respaldo del artículo 52 CE. Finalmente, el Real Decreto-Ley 13/2010 eliminó la obligación económica. En la actualidad, la Ley 4/2014 mantiene su carácter de corporaciones de derecho público con adscripción formal obligatoria, pero sin carga económica, financiándose mediante servicios y aportaciones voluntarias y ejerciendo funciones públicas de representación, certificación, asesoramiento y apoyo a la actividad empresarial.

2.7. Los colegios profesionales.

2.7.1. Noción.

Los colegios profesionales son corporaciones de derecho público creadas por ley estatal o autonómica, con personalidad jurídica propia y plena capacidad para el cumplimiento de sus fines, conforme a la Ley 2/1974. En España han constituido tradicionalmente la forma de organización de las profesiones tituladas, asumiendo no solo la representación del colectivo profesional sino también funciones públicas de regulación y disciplina.

El estatuto general de cada profesión es aprobado por el Consejo de Ministros a solicitud del Consejo General correspondiente, y tipifica infracciones y sanciones que aplican los colegios territoriales. Cuando ejercen funciones públicas, sus actos se someten al derecho administrativo y son recurribles ante la jurisdicción contencioso-administrativa. Junto a ello desarrollan funciones privadas, como la defensa de los intereses de sus miembros o la prestación de servicios a los colegiados.

El modelo colegial ha sido objeto de críticas, ya que se encomienda a los propios profesionales la defensa de los derechos de los usuarios de sus servicios, lo que genera tensiones entre intereses corporativos y protección del consumidor.

2.7.2. El progresivo sometimiento al principio de libre competencia.

Los servicios profesionales forman parte del mercado y, por tanto, deben respetar las reglas de la libre competencia. Los acuerdos e instrucciones de los colegios constituyen acuerdos entre competidores y quedan sometidos a la normativa de defensa de la competencia y competencia desleal.

Las reformas iniciadas en 1996 y 1997 introdujeron cambios relevantes: - Prohibición de honorarios obligatorios, permitiéndose solo criterios orientativo
- Eliminación de la obligación de suscribir determinados seguros o mutualidades como requisito de colegiación 
- Implantación del principio de colegiación única, permitiendo ejercer en todo el territorio nacional con una sola inscripción.

No obstante, la Comisión Europea consideró insuficientes estas reformas, señalando que subsistían barreras injustificadas a la competencia, como restricciones publicitarias, reservas de actividad excesivas o limitaciones organizativas. La regulación de las profesiones debía cumplir requisitos estrictos: no discriminación, justificación por razones imperiosas de interés general, adecuación y proporcionalidad.

La Directiva 2006/123/CE sobre servicios en el mercado interior impulsó una nueva reforma mediante la Ley 25/2009, orientada a reducir barreras de entrada y restricciones al ejercicio profesional, reforzando la compatibilidad del modelo colegial con el principio de libre competencia.

2.7.3. La regulación actual.

La legislación vigente establece que quien posea la titulación exigida y cumpla los requisitos estatutarios tiene derecho y, en su caso, obligación de colegiarse cuando la adscripción sea obligatoria. La cuota de colegiación no puede constituir una barrera de entrada, por lo que debe limitarse a los costes de tramitación y no ser desproporcionada, aunque en la práctica existen diferencias entre colegios de una misma profesión.

Solo cuando una ley estatal exija la suscripción de un seguro profesional por razones de seguridad o salud pública podrá el colegio imponerlo como requisito. En ausencia de previsión legal, no puede exigirse. Asimismo, se consolida el principio de colegiación única: basta estar inscrito en un colegio para ejercer en todo el territorio nacional, sin necesidad de comunicaciones, habilitaciones adicionales ni pagos distintos de los correspondientes a servicios efectivamente prestados.

La colegiación obligatoria pasa de ser regla general a convertirse en excepción. Solo puede establecerse por ley estatal cuando concurran razones imperiosas de interés general, formando parte de la competencia básica del Estado. Coexisten así dos modelos: colegios de adscripción obligatoria, establecidos por el Estado, y colegios voluntarios, cuya creación corresponde a las comunidades autónomas. Aunque la ley preveía una revisión general de las profesiones con colegiación obligatoria, esta no se ha llevado a cabo.

2.7.4. Las regulaciones colegiales sobre honorarios y visados profesionales.

La fijación de honorarios ha sido una cuestión central desde la perspectiva de la libre competencia. La ley ha eliminado la facultad de fijar honorarios obligatorios u orientativos con efectos vinculantes, al considerarse que favorecen la concertación entre competidores y limitan la competencia. Incluso en el ámbito de la abogacía, el Tribunal Supremo ha restringido esta posibilidad a criterios meramente indicativos y generales, prohibiendo la fijación concreta de cuantías.

En cuanto a los visados profesionales, la reforma de 2009 distinguió entre visados voluntarios, solicitados por el usuario, y visados obligatorios, que solo pueden establecerse por el Gobierno cuando exista relación directa con la seguridad o integridad física. Los colegios no pueden imponer por sí mismos la obligatoriedad del visado.

El visado se limita a comprobar la identidad y habilitación del profesional y la corrección formal e integridad de la documentación, pero no garantiza la corrección técnica del trabajo. La responsabilidad del colegio es subsidiaria y se circunscribe a los defectos formales que debieron advertirse en el control propio del visado, sin extenderse a errores técnicos del proyecto.

3. LAS ASOCIACIONES PRIVADAS DE CONFIGURACIÓN LEGAL

Las asociaciones privadas de configuración legal son entidades de base asociativa y personificación privada que, además de cumplir fines privados, ejercen funciones públicas encomendadas por la Administración. Se diferencian de las corporaciones públicas en su naturaleza jurídica: mientras estas tienen personificación pública, aquellas mantienen naturaleza privada aunque su régimen se vea intensamente condicionado por el ejercicio de funciones públicas.

El concepto fue acuñado por el Tribunal Constitucional en la STC 67/1985, al analizar el régimen de las federaciones deportivas. Estas entidades presentan un régimen peculiar que, aunque formalmente asociativo, se aproxima en muchos aspectos al de las corporaciones públicas debido a las funciones administrativas que desempeñan bajo tutela del Consejo Superior de Deportes.

Las federaciones deportivas son entidades privadas con régimen especial. Ejercen funciones públicas como la ejecución de programas deportivos, la expedición de licencias, la calificación de competiciones oficiales o el ejercicio de potestad disciplinaria. Estas funciones se desarrollan bajo tutela administrativa, lo que permite al Consejo Superior de Deportes ejercer poderes de control, inspección y supervisión.

Su régimen jurídico presenta características que las separan del modelo asociativo clásico: - Requieren autorización previa para su creación - Operan en régimen de monopolio, al reconocerse una única federación por modalidad deportiva - La adscripción resulta necesaria para participar en competiciones oficiales, lo que introduce un elemento de integración forzosa indirecta.

Estas notas tensionan el derecho de asociación, pero el Tribunal Constitucional ha considerado que son compatibles con el artículo 22 CE siempre que se respeten ciertos límites: - No puede obligarse directamente a nadie a asociarse - Debe permitirse la creación de otras asociaciones con fines privados - La configuración excepcional debe estar justificada por la necesidad de garantizar fines públicos. El derecho de asociación no incluye el derecho a constituir asociaciones cuyo objeto sea el ejercicio de funciones públicas administrativas, por lo que su regulación no requiere ley orgánica siempre que respete el marco general del derecho de asociación.

En definitiva, las asociaciones de configuración legal constituyen un modelo intermedio entre lo público y lo privado: entidades privadas que ejercen funciones públicas bajo tutela administrativa, con un régimen excepcional que solo resulta constitucional cuando está justificado por la protección del interés general.

4. OTRAS FORMAS DE COLABORACIÓN DE LOS PARTICULARES EN EL EJERCICIO DE FUNCIONES PÚBLICAS 

En determinados sectores se ha producido una externalización del ejercicio de funciones públicas, especialmente en actividades de control e inspección. Inicialmente, la colaboración privada se limitaba a la prestación de servicios públicos contratados por la Administración, pero la legislación siempre ha excluido de la contratación aquellas actividades que impliquen ejercicio de autoridad o prerrogativas públicas, reservadas a funcionarios.

Desde los años ochenta, factores tecnológicos y la apertura del mercado impulsada por la Unión Europea favorecieron la intervención de entidades privadas en funciones técnicas de inspección y control. Estas entidades actúan en ámbitos como la inspección técnica de vehículos, seguridad industrial, control ambiental, certificación técnica o control en materia de subvenciones.

Existe debate doctrinal sobre si estas entidades ejercen verdaderas funciones públicas o si simplemente colaboran aportando apoyo técnico previo al acto administrativo. La respuesta depende del diseño legal sectorial: en algunos casos sustituyen el control administrativo; en otros, su actuación es un elemento previo que la Administración puede valorar al dictar el acto definitivo.

La jurisprudencia no reconoce a sus actuaciones la presunción de certeza propia de los funcionarios públicos, aunque sí les otorga un valor probatorio reforzado dada su cualificación técnica y la obligación legal de objetividad.

La intervención de particulares en funciones públicas exige reserva de ley cuando afecta a derechos de los ciudadanos o impone prestaciones patrimoniales no tributarias, conforme al artículo 31.3 CE. La creación de entidades colaboradoras y la imposición de pagos obligatorios requieren cobertura legal suficiente.

El número de entidades puede ser limitado o ilimitado. Cuando es limitado, suele utilizarse la técnica concesional; cuando es abierto, basta autorización administrativa. En algunos casos se formaliza la relación mediante convenio de colaboración.

El control administrativo resulta esencial, ya que la Administración responde por la función ejercida. Deben preverse mecanismos de supervisión, régimen de incompatibilidades, exigencia de cualificación técnica e independencia, así como sistemas de recurso ante la Administración y posteriormente ante la jurisdicción contencioso-administrativa.

En definitiva, se trata de un modelo de colaboración público-privada en el ejercicio de funciones públicas que exige base legal, control administrativo efectivo, garantías de objetividad e imputación última de la función a la Administración titular.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL

    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
