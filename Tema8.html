    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN

La Administración General del Estado presenta un peso relativo reducido dentro del conjunto del sector público, ya que en 2022 solo concentraba una parte minoritaria del empleo público, en contraste con el crecimiento experimentado por las Administraciones autonómica y local. A pesar de esta reducción de efectivos y de la pérdida de funciones ejecutivas en favor de tareas de regulación, coordinación y supervisión, sigue siendo una organización de gran dimensión y elevada complejidad, con más de medio millón de empleados y una estructura cada vez más amplia por la diversificación de la actividad administrativa.

La AGE se configura como un conjunto integrado por tres grandes ámbitos en función del territorio de actuación: la Administración central, la territorial o periférica y la exterior. Esta estructura ha evolucionado históricamente desde modelos más simples, como el previsto en la normativa de 1957, hacia una organización más compleja en la que se han ido incorporando nuevos órganos superiores y directivos, ajustándose continuamente el número de ministerios y sus competencias en función de las necesidades y del contexto político.

La evolución de determinadas áreas materiales, como el medio ambiente, refleja claramente este proceso de reorganización progresiva, pasando de estructuras dispersas a la creación de órganos especializados y finalmente a ministerios propios con competencias integradas. Este dinamismo también se aprecia en el número de ministerios, que ha variado en función de factores económicos y políticos, desde configuraciones más reducidas en momentos de austeridad hasta estructuras más amplias vinculadas a gobiernos de coalición.

La creación o modificación de ministerios implica la adaptación de la estructura administrativa mediante la redistribución de puestos y órganos, sin que ello suponga necesariamente un incremento significativo del gasto público. En todo caso, el diseño de la Administración central responde fundamentalmente a decisiones de carácter político, en las que influyen tanto la complejidad de las materias como criterios estratégicos del Gobierno, sin que existan parámetros objetivos que determinen el número óptimo de ministerios o el rango de sus órganos.

Para comprender la estructura de la Administración central es necesario atender a distintos niveles normativos, que incluyen los reales decretos del presidente del Gobierno, del Consejo de Ministros y los específicos de cada ministerio, que desarrollan progresivamente la organización hasta niveles detallados. Este sistema normativo refleja el carácter flexible y adaptable de la organización administrativa.

Junto a la Administración central, la AGE incluye la Administración territorial o periférica, integrada por los delegados y subdelegados del Gobierno y los directores insulares, que actúan en ámbitos territoriales concretos. Asimismo, forma parte de ella la Administración exterior, compuesta por embajadores, representantes permanentes y el conjunto de órganos y medios que actúan fuera del territorio nacional.

Finalmente, la estructura estatal se completa con el sector público estatal institucional, formado por entidades de derecho público o privado dependientes o adscritas a la Administración del Estado para el cumplimiento de sus funciones, así como por determinadas universidades, configurando así un entramado organizativo amplio y diversificado que excede el núcleo estrictamente administrativo.

2. EL GOBIERNO

2.1. Naturaleza y funciones

El Gobierno del Estado ejerce, conforme al artículo 97 CE, la dirección de la política interior y exterior, la dirección de la Administración civil y militar, la potestad reglamentaria y la función ejecutiva. Su regulación se remite por la Constitución a la Ley del Gobierno, lo que confirma que no es solo el órgano superior de la Administración del Estado, sino también el órgano constitucional que, por su legitimación democrática, asume la función de gobernar. Por ello, junto a funciones propiamente administrativas, desempeña funciones de dirección política y de dirección de la Administración.

Dentro de la dirección de la política exterior se incluyen las competencias para negociar tratados internacionales y alcanzar acuerdos de esa naturaleza. En el ámbito de la política interior se comprenden decisiones de especial relevancia constitucional, como la actuación en situaciones de crisis mediante los estados de alarma y excepción y la iniciativa para el estado de sitio, la disolución de las Cámaras y la convocatoria de elecciones, la iniciativa legislativa y presupuestaria, la aprobación de normas con rango de ley, la propuesta de referéndum, la propuesta de nombramientos constitucionalmente relevantes, la iniciativa de reforma constitucional y la adopción de medidas frente a las comunidades autónomas al amparo del artículo 155 CE.

Junto a ello, las funciones de dirección de la Administración civil y militar abarcan la creación y supresión de órganos directivos ministeriales, el nombramiento de sus titulares y la aprobación de programas, planes y directrices vinculantes para todos los órganos de la Administración General del Estado. La diferenciación entre actos de dirección política y actividad administrativa dio lugar a una intensa polémica sobre su control jurisdiccional, especialmente tras la STC 45/1990, que negó que toda la actuación del Gobierno estuviera sometida al Derecho administrativo cuando se tratase de manifestaciones de la función de dirección política.

La discusión sobre el control de los actos del Gobierno fue recogida por la Ley del Gobierno, que remite a la legislación reguladora de la jurisdicción contencioso-administrativa y del Tribunal Constitucional. La LJCA rechazó la existencia de una categoría general de actos políticos inmunes al control judicial y extendió el control de los tribunales, aunque preservando el núcleo discrecional de la decisión. En todo caso, siempre cabe control sobre los derechos fundamentales, los elementos reglados del acto y las indemnizaciones procedentes.

Pese a ello, la controversia no ha desaparecido. La jurisprudencia ha seguido afirmando en determinados supuestos la doble condición del Gobierno como órgano constitucional y como órgano administrativo, lo que ha llevado a excluir del control del Tribunal Supremo ciertos actos dictados en el ejercicio de funciones directamente constitucionales. Esta línea fue confirmada respecto de los reales decretos de declaración del estado de alarma, cuyo control asumió el Tribunal Constitucional al considerarlos normas con rango de ley.

2.2. Los miembros del Gobierno

La Constitución establece que el Gobierno está integrado, al menos, por el presidente, el vicepresidente o vicepresidentes y los ministros. La Ley del Gobierno ha mantenido esa composición mínima sin incluir a los secretarios de Estado, aunque estos dirijan áreas concretas dentro de los ministerios bajo la dependencia directa del ministro.

2.2.1. El presidente y el vicepresidente o vicepresidentes

El presidente ocupa una posición claramente dominante dentro del Gobierno. Le corresponde crear, modificar y suprimir los departamentos ministeriales y proponer al Rey el nombramiento y cese de los demás miembros del Gobierno, de modo que la propia existencia de los órganos y la designación de sus titulares dependen directamente de su voluntad. También fija las directrices políticas generales, puede impartir instrucciones a los ministros, resuelve conflictos de atribuciones entre departamentos y, dentro del Consejo de Ministros, convoca, preside y fija el orden del día de las reuniones.

Aunque el sistema tiene un marcado carácter presidencialista, el Gobierno actúa conforme al principio de colegialidad y de responsabilidad solidaria de sus miembros, sin perjuicio de la responsabilidad individual que cada ministro asume por la gestión de su departamento. El nombramiento del presidente exige la confianza del Congreso de los Diputados, obtenida en los términos previstos constitucionalmente, y su cese puede producirse por pérdida de esa confianza o por la celebración de elecciones generales.

La vicepresidencia no es un órgano necesario, pues depende de la voluntad del presidente. Este decide también las funciones que atribuye al vicepresidente, que no necesita ser ministro, aunque la acumulación de ambos cargos refuerza su posición política. Puede haber varios vicepresidentes y corresponde al vicepresidente primero, si existe, sustituir al presidente del Gobierno.

2.2.2. Los ministros

Los ministros son una figura con antecedentes históricos en los Secretarios del Despacho, surgidos para sustituir progresivamente a los Consejos Reales y especializar la gestión de los asuntos públicos. En la actualidad, además de formar parte del Gobierno, desarrollan el programa gubernamental en el departamento del que son titulares conforme a los acuerdos del Consejo de Ministros y a las instrucciones del presidente.

Como órganos superiores de la Administración central del Estado, dirigen las actividades comprendidas en la competencia de su ministerio y responden de su gestión. Les corresponde fijar objetivos, aprobar planes de actuación y controlar la ejecución por los órganos superiores y directivos, así como ejercer el control de eficacia sobre estos y sobre los organismos dependientes. También poseen potestad reglamentaria, aunque limitada a las materias propias de su departamento, sin alcanzar la aprobación de reglamentos generales de desarrollo y ejecución de las leyes, que corresponde al Consejo de Ministros.

Los ministros proponen la organización interna de su departamento y el nombramiento o cese de determinados órganos directivos, nombran y cesan a otros titulares salvo los atribuidos al secretario de Estado, delegan competencias, imparten instrucciones y ejercen funciones de revisión de actos, declaración de lesividad, resolución de recursos y de conflictos internos de atribuciones. Asimismo, ostentan la jefatura del personal del departamento, gestionan los planes de empleo y las relaciones de puestos de trabajo y pueden imponer la sanción de separación del servicio por faltas muy graves.

También asumen la gestión presupuestaria del ministerio, elaborando las propuestas de gasto y de presupuesto de los organismos dependientes y administrando después los créditos aprobados y sus modificaciones dentro de su ámbito competencial. Además, representan al departamento en sus relaciones con las comunidades autónomas y en los órganos de cooperación correspondientes. Junto a los ministros con departamento pueden existir ministros sin cartera, que carecen de ministerio propio, pero disponen de estructura y medios asignados por real decreto, y cuyas competencias dependen de la norma de creación del órgano.

2.2.3. El régimen común a vicepresidentes y ministros

Para ser vicepresidente o ministro no es necesario ser diputado. Basta con reunir la nacionalidad española, la mayoría de edad, el disfrute de los derechos de sufragio, no estar inhabilitado y cumplir los requisitos de idoneidad exigidos a los altos cargos de la Administración General del Estado. Sin embargo, al no exigirse una formación o experiencia profesional mínima concreta, la idoneidad queda en la práctica muy vinculada a la honorabilidad y a la apreciación del presidente del Gobierno, que decide si la persona nombrada es adecuada para el cargo.

La retribución de los miembros del Gobierno se fija anualmente por la ley de presupuestos en una cuantía anual distribuida en doce meses, a la que puede añadirse la antigüedad si se trata de funcionarios. Al ser nombrados, dejan el servicio activo y pasan a la situación de servicios especiales, lo que les permite recuperar posteriormente su puesto o uno similar. Su cargo solo es compatible con el mandato parlamentario, quedando excluida cualquier otra función pública o actividad profesional o mercantil.

Tras el cese, los miembros del Gobierno tienen derecho, en los términos legalmente establecidos, a una pensión indemnizatoria temporal, concebida para compensar las limitaciones que pesan sobre su actividad profesional posterior y para evitar las denominadas puertas giratorias. Esa percepción es incompatible con la obtención de determinadas retribuciones públicas o privadas, salvo en los supuestos excepcionales previstos legalmente.

2.3. El funcionamiento del Gobierno

La Ley del Gobierno dispone que sus miembros se reúnen en Consejo de Ministros y en Comisiones Delegadas del Gobierno. Ambos son órganos colegiados del Gobierno, aunque la denominación de las Comisiones Delegadas no implica que todas sus competencias procedan de una delegación del Consejo de Ministros.

2.3.1. El Consejo de Ministros

El Consejo de Ministros integra a todos los miembros del Gobierno. A sus reuniones pueden asistir, con voz y sin voto, secretarios de Estado y altos cargos cuando sean convocados por el presidente, que es quien convoca, preside y fija el orden del día, mientras que la secretaría corresponde al ministro de la Presidencia. De las reuniones, que pueden tener carácter deliberante o decisorio, se levanta acta con un contenido limitado, coherente con el carácter secreto de las deliberaciones reconocido expresamente por la Ley del Gobierno.

Su funcionamiento no se rige por las reglas generales de los órganos colegiados de la LRJSP, sino por disposiciones internas no publicadas, lo que pone de manifiesto el peso de la tradición burocrática. La Ley del Gobierno recoge solo algunas reglas básicas, muchas de ellas procedentes de instrucciones internas anteriores.

Entre sus competencias destacan la aprobación de proyectos de ley y del proyecto de ley de presupuestos generales del Estado, la aprobación de reales decretos-leyes y reales decretos legislativos, la negociación y firma de tratados internacionales o su remisión a las Cortes, la declaración de los estados de alarma y excepción y la propuesta del estado de sitio, la emisión de deuda pública cuando exista autorización legal, la aprobación de reglamentos de desarrollo y ejecución de las leyes y de otras disposiciones reglamentarias, la creación, modificación y supresión de órganos directivos ministeriales y la adopción de programas, planes y directrices vinculantes para la Administración General del Estado.

2.3.2. Las Comisiones Delegadas del Gobierno

Las Comisiones Delegadas del Gobierno surgieron para facilitar la coordinación entre ministerios en materias que afectaban a varios departamentos y para aligerar la toma de decisiones del Gobierno en Pleno. Reúnen a los ministros directamente interesados en cada materia, lo que permite coordinar actuaciones, preparar asuntos reservados al Consejo de Ministros y resolver aquellos que no requieren su intervención directa.

Estas Comisiones son creadas por real decreto del Consejo de Ministros a propuesta del presidente, que determina su composición, presidencia, secretaría, funciones y reglas de funcionamiento. Sus reuniones son secretas y, aunque son órganos colegiados del Gobierno, en ellas participan también secretarios de Estado para hacer más eficaz su actividad.

Sus funciones son principalmente de coordinación, examen y resolución de cuestiones que afectan a varios ministerios, así como de elaboración de propuestas conjuntas para su elevación al Consejo de Ministros. También pueden ejercer funciones administrativas delegadas por este, salvo aquellas que les están vedadas por derivar directamente de la Constitución o por referirse al nombramiento y separación de altos cargos. A su vez, el Consejo de Ministros puede avocar asuntos atribuidos a estas Comisiones.

La Ley del Gobierno no les atribuye expresamente potestad reglamentaria ni permite que la reciban por delegación, aunque existe una cierta tensión con otros preceptos legales que parecen admitir la adopción de disposiciones por estas Comisiones. En todo caso, esa ambigüedad no elimina el hecho de que la atribución expresa de la potestad reglamentaria se reconoce únicamente al Consejo de Ministros.

3. LOS ÓRGANOS DE APOYO AL GOBIERNO

3.1. Los secretarios de Estado

Entre los órganos de apoyo al Gobierno destaca el secretario de Estado, cargo inspirado en el modelo francés, que depende directamente del ministro y ocupa una posición superior al subsecretario, aunque este no dependa de él sino también del ministro. Su función consiste en dar unidad de dirección e intensificar la acción administrativa en un área concreta de un ministerio cuando esa materia no justifica la creación de un departamento independiente, pero sí requiere una dirección política y administrativa propia.

Los secretarios de Estado no forman parte del Gobierno, aunque pueden integrarse en las Comisiones Delegadas del Gobierno cuando así lo prevea el real decreto correspondiente. Son órganos superiores que coordinan las secretarías generales, si existen, y las direcciones generales incluidas en su ámbito, respondiendo ante el ministro por la ejecución de la política gubernamental en el área que tienen encomendada. Sus funciones propias, reguladas en la LRJSP, se asemejan en gran medida a las del ministro, pero limitadas a su sector de actividad.

Dentro de esas funciones, asumen la representación externa de la secretaría de Estado, dirigen y supervisan los órganos directivos adscritos, nombran y separan a los subdirectores generales de su dependencia, resuelven recursos frente a actos de los órganos que dependen directamente de ellos y solucionan conflictos de atribuciones entre dichos órganos. También gestionan, dentro de los límites fijados por el ministro, los créditos presupuestarios de su área, aprueban modificaciones presupuestarias, reconocen obligaciones económicas y proponen su pago.

Las secretarías de Estado se crean por real decreto del presidente, mientras que sus titulares son nombrados y separados por real decreto del Consejo de Ministros. Aunque tienen la condición de altos cargos y les resulta aplicable el régimen general correspondiente, no se les exigen requisitos específicos adicionales de formación, experiencia o condición funcionarial. Su régimen retributivo, pese a tratarse de órganos superiores, se aproxima al de los órganos directivos, al estructurarse en sueldo, complemento de destino, complemento específico y productividad, con una configuración semejante a la de los funcionarios, aunque se trate de cargos de carácter político.

3.2. La Comisión General de Secretarios de Estado y Subsecretarios

La Comisión General de Secretarios de Estado y Subsecretarios está integrada por los titulares de esos cargos y cuenta además con la asistencia del abogado general del Estado, que dirige el servicio jurídico del Estado. El presidente puede convocar también a otros altos cargos asimilados cuando la naturaleza de los asuntos lo aconseje. La presidencia corresponde a un vicepresidente del Gobierno o, más habitualmente, al ministro de la Presidencia, y en su ausencia se aplica el orden de precedencia entre los departamentos ministeriales. La secretaría corresponde al subsecretario del ministerio de la Presidencia, actuando el director del secretariado del Gobierno como secretario adjunto.

La función principal de esta Comisión es preparar los asuntos que posteriormente se elevarán al Consejo de Ministros, salvo aquellos que deban ir directamente o los que, por razones de urgencia, así lo decida su presidente. Además, actúa en la práctica como órgano de coordinación respecto de cuestiones que, aun sin corresponder al Consejo de Ministros, afectan a varios ministerios.

El funcionamiento interno de la Comisión muestra su relevancia política y técnica. Su orden del día, conocido como índice negro, incluye los asuntos seleccionados por su presidente entre los propuestos por los ministerios. Tras emitir informe, es también el presidente quien decide la forma en que los asuntos se elevan al Consejo de Ministros. De ahí derivan el índice verde, que reúne los asuntos informados favorablemente y normalmente aprobados sin discusión, y el índice rojo, en el que se incluyen los asuntos que, pese a contar con informe favorable, han suscitado oposición de algún ministerio o exigen una atención especial, por lo que son objeto de deliberación expresa por el Consejo de Ministros.

3.3. El secretariado del Gobierno

El secretariado del Gobierno es el órgano del ministerio de la Presidencia encargado del apoyo material a los órganos colegiados del Gobierno y a la Comisión de Secretarios de Estado y Subsecretarios. Se ocupa de remitir convocatorias, archivar y custodiar actas y documentación, asistir al ministro que desempeña la secretaría del Consejo de Ministros y velar por la publicación en el BOE de las disposiciones y normas emanadas del Gobierno cuando proceda. Su titular ejerce además la secretaría adjunta de la Comisión de Secretarios de Estado y Subsecretarios.

También desarrolla funciones de asistencia al ministro de la Presidencia en materias de especial relevancia institucional. Entre ellas se encuentran la obtención de la sanción real de las leyes aprobadas por las Cortes, la expedición real de los reales decretos, la tramitación de los actos y disposiciones del Rey que deben ser refrendados por el presidente del Gobierno y la tramitación de las disposiciones y actos del propio presidente del Gobierno.

3.4. Los gabinetes

Los miembros del Gobierno y los secretarios de Estado cuentan con un gabinete como órgano de apoyo político y de especial confianza. Su función es asesorarles tanto en sus tareas parlamentarias como en sus relaciones con las instituciones y con la organización administrativa.

La composición, número de integrantes y categoría de sus puestos se determina en los reales decretos de estructura orgánica básica de los departamentos ministeriales.

Los puestos de los gabinetes suelen configurarse como puestos que pueden ser ocupados indistintamente por personal funcionario o eventual. El personal eventual, nombrado con carácter no permanente, realiza exclusivamente funciones de confianza, lo que permite incorporar a personas que no son funcionarios de carrera. Por ello, los gabinetes suelen integrar personas vinculadas políticamente al Gobierno o al alto cargo correspondiente, o personas de su especial confianza, siendo además libre su cese y produciéndose en todo caso cuando cesa la autoridad a la que prestan asesoramiento.

Cuando un funcionario de carrera pasa a ocupar un puesto en un gabinete, puede mantenerse en servicio activo en ese nuevo puesto o pasar a la situación de servicios especiales. Esta última situación le garantiza, tras el cese, la posibilidad de reincorporarse a un puesto en la misma localidad y con las retribuciones correspondientes a la categoría, nivel o escalón que tuviera consolidados.

4. ÓRGANOS DIRECTIVOS DE LA ADMINISTRACIÓN CENTRAL DEL ESTADO

4.1. El subsecretario

La Administración central del Estado cuenta, además de con ministros y secretarios de Estado como órganos superiores, con órganos directivos entre los que se incluyen subsecretarios, secretarios generales, secretarios generales técnicos, directores generales y subdirectores generales. La agrupación legal de estos cargos responde al rango que la ley les atribuye y al régimen retributivo asociado, no a la identidad de sus funciones. Todos, salvo el subdirector general, son altos cargos con una estructura salarial semejante a la funcionarial, aunque solo este último ocupa realmente un puesto funcionarial en servicio activo. Además, mientras secretarios generales y directores generales se proyectan sobre áreas concretas de actividad, subsecretarios y secretarios generales técnicos prestan servicio al conjunto del departamento.

El subsecretario depende directamente del ministro y representa al departamento, dirigiendo sus servicios comunes. Asume la coordinación operativa del personal y de los medios materiales para hacer posibles los objetivos de la acción ministerial, asegurando la asistencia técnica y jurídica necesaria para que los órganos superiores desarrollen sus funciones de planificación, control de eficacia, organización del personal y ejercicio de la potestad reglamentaria del ministro.

Tras el ministro, ejerce la jefatura de personal de todo el departamento, nombrando y cesando subdirectores generales, imponiendo sanciones disciplinarias salvo la de pérdida del empleo, convocando y resolviendo pruebas selectivas y concursos de provisión. Supervisa la secretaría general técnica, dirige los servicios comunes y la inspección de servicios, y se ocupa también de obtener los inmuebles precisos para el funcionamiento del ministerio. A ello se añade su colaboración con el ministro en la planificación de los objetivos departamentales y su papel de relación con otros ministerios, especialmente relevante en la Comisión General de Secretarios de Estado y Subsecretarios.

Todos los departamentos ministeriales cuentan necesariamente con una única subsecretaría. Su titular debe reunir no solo los requisitos generales de idoneidad exigidos a los altos cargos, sino también la condición de funcionario de carrera del subgrupo A1 de cualquier Administración pública, lo que pretende asegurar un conocimiento interno de la organización administrativa. Su nombramiento y cese corresponde al Consejo de Ministros mediante real decreto.

4.2. El secretario general

El secretario general es un órgano directivo con rango asimilado al de subsecretario. Puede depender directamente del ministro o del secretario de Estado cuando actúa en un área concreta atribuida a una secretaría de Estado. Su origen está en antiguos subsecretarios que, sin ocuparse de los servicios comunes del ministerio, ejercían funciones de dirección sobre sectores específicos de actividad.

Los actuales secretarios generales son, por tanto, órganos de carácter excepcional que dirigen un sector determinado dentro del ministerio, coordinan los órganos subordinados que dependen de ellos y ejercen las competencias que les atribuyen las normas de estructura orgánica básica.

Su función no se extiende a todo el departamento, sino a un ámbito material concreto dentro de él.

Son nombrados por el Consejo de Ministros a propuesta del ministro o del presidente del Gobierno entre personas con cualificación y experiencia en puestos de responsabilidad en la gestión pública o privada. Sin embargo, al no concretarse legalmente qué nivel de cualificación o experiencia se exige, esta previsión apenas añade contenido real a la exigencia general de idoneidad establecida para los altos cargos.

4.3. El secretario general técnico

El secretario general técnico nació para proporcionar asistencia técnica en las materias propias del departamento, elaborando estudios, reuniendo documentación, preparando proyectos de planes y programas y recopilando información estadística. Esa función técnica sigue siendo hoy su rasgo esencial, aunque actualmente se le atribuyan además otras competencias relacionadas con los servicios comunes del ministerio.

En la actualidad le corresponden, como mínimo, funciones relativas a asistencia jurídica, publicaciones y producción normativa, lo que confirma su posición como órgano de apoyo técnico general del departamento. Depende del subsecretario y tiene rango asimilado al de director general, por lo que sirve al conjunto del ministerio y no a un área sectorial concreta.

Su nombramiento corresponde al Consejo de Ministros, a propuesta del titular del ministerio, y exige no solo la idoneidad propia de los altos cargos, sino también la condición de funcionario de carrera del subgrupo A1, igual que sucede con los subsecretarios. Con ello se refuerza su perfil técnico y profesional dentro de la estructura directiva ministerial.

4.4. El director general

El director general es el órgano directivo de categoría inmediatamente inferior al subsecretario y puede depender funcionalmente de una subsecretaría, de una secretaría de Estado o de una secretaría general. Tiene encomendada la gestión ordinaria de una o varias áreas de actividad conectadas entre sí, impulsando y supervisando las tareas de gestión, velando por el buen funcionamiento de los órganos y unidades dependientes y ejerciendo las competencias que le atribuyan las normas o le sean delegadas.

Constituye el último escalón político de la Administración, ya que, aunque normalmente debe ser funcionario de carrera, no desempeña su cargo en situación de servicio activo, sino en servicios especiales. La legislación ha intentado profesionalizar este nivel exigiendo, como regla general, que el director general pertenezca a un cuerpo del subgrupo A1 y reúna además los requisitos generales de idoneidad.

Sin embargo, la propia ley permite exceptuar esa exigencia mediante real decreto de estructura, siempre que la decisión esté motivada. Esa excepción no existe para subsecretarios ni secretarios generales técnicos, que necesariamente han de ser funcionarios de carrera. La legalidad de la exención puede ser controlada por los tribunales, que exigen una justificación objetiva y comprensible, vinculada a las funciones concretas de la dirección general y a la preparación o experiencia requerida para su desempeño, especialmente cuando esa cualificación pueda proceder del sector privado.

4.5. El subdirector general

El subdirector general es el órgano directivo encargado de ejecutar las actividades que tenga asignadas y de llevar la gestión ordinaria de los asuntos propios de su subdirección. Aunque la ley lo incluye entre los órganos directivos, se trata en realidad de un cargo integrado plenamente en la carrera funcionarial.

Debe ser desempeñado por un funcionario de carrera en servicio activo perteneciente a un cuerpo del subgrupo A1, ya que se trata de puestos que suelen tener nivel de destino 30. Su nombramiento corresponde al órgano superior o directivo del que dependa, pero debe hacerse conforme a los principios de igualdad, mérito y capacidad y a través de los sistemas de provisión previstos para los funcionarios, normalmente mediante libre designación.

La libre designación exige convocatoria pública, pero permite al órgano competente valorar discrecionalmente la idoneidad de los candidatos en relación con los requisitos del puesto.

Precisamente por ese carácter discrecional, tanto el nombramiento como el cese deben ser motivados. En el caso del cese, la motivación ha de expresar de forma real y suficiente la desaparición de las razones de confianza o idoneidad que justificaron el nombramiento, o la concurrencia de una circunstancia objetiva que lo haga procedente, sin que basten fórmulas genéricas o estandarizadas. Esta exigencia diferencia claramente al subdirector general del resto de órganos superiores y directivos, cuyos titulares, al ser cargos políticos ajenos a la carrera funcionarial, pueden ser nombrados y cesados sin motivación.

5. ORGANIGRAMA DEL MINISTERIO DEL INTERIOR

El ministerio del Interior se estructura en torno al ministro, del que dependen directamente órganos de apoyo como el gabinete y la oficina de comunicación, así como tres grandes bloques organizativos que concentran la estructura básica del departamento: la secretaría de Estado de Seguridad, la secretaría general de Instituciones Penitenciarias y la subsecretaría del Interior.

La secretaría de Estado de Seguridad constituye el núcleo principal en materia de seguridad pública y se organiza en torno a varias direcciones generales. Destacan la Dirección General de la Policía y la Dirección General de la Guardia Civil, que, pese a su denominación, tienen rango equivalente al de subsecretaría de Estado. Bajo ellas se integran diversos órganos con denominaciones heterogéneas, como direcciones adjuntas operativas, mandos y gabinetes técnicos, todos ellos con rango de subdirección general. Junto a estas, existen otras direcciones generales con funciones más transversales, como las de relaciones internacionales y extranjería o la de coordinación y estudios, además de órganos especializados en cooperación policial, planificación de infraestructuras y sistemas de información.

La secretaría general de Instituciones Penitenciarias se configura como el órgano encargado de la ejecución de la política penitenciaria y se articula fundamentalmente a través de la Dirección General de Ejecución Penal y Reinserción Social. Bajo esta se integran órganos responsables de la gestión de penas, medidas alternativas y actividad penitenciaria, junto con otros centros directivos orientados a la coordinación institucional, la gestión de recursos, la planificación económica y el análisis. Asimismo, depende de esta secretaría una entidad de derecho público dedicada al trabajo penitenciario y a la formación para el empleo.

La subsecretaría del Interior actúa como órgano de dirección de los servicios comunes del ministerio y concentra funciones transversales de apoyo. Bajo su dependencia se sitúan la secretaría general técnica y diversas direcciones generales con competencias específicas, como política interior, tráfico, protección civil y emergencias, y apoyo a víctimas del terrorismo. Estas direcciones se estructuran internamente en subdirecciones generales especializadas en ámbitos como procesos electorales, movilidad y seguridad vial, planificación de emergencias o asistencia a víctimas. Además, la subsecretaría cuenta con órganos de apoyo como la Abogacía del Estado y la Intervención Delegada, que garantizan respectivamente la asistencia jurídica y el control económico-financiero del departamento.

En conjunto, el organigrama del ministerio del Interior refleja una estructura compleja en la que coexisten órganos superiores, directivos y entidades instrumentales, con una organización que combina áreas funcionales específicas con órganos de coordinación y apoyo común, destacando la singularidad de sus denominaciones frente a su verdadero rango orgánico.

6. LA ADMINISTRACIÓN PERIFÉRICA DEL ESTADO

La Administración General del Estado ejerce sus competencias en todo el territorio nacional, pero la existencia de un único centro de decisión hace necesario acercar su actuación a los distintos ámbitos territoriales. Dado que el Estado mantiene competencias ejecutivas, tanto en la prestación de servicios como en el ejercicio de potestades públicas, resulta imprescindible una organización territorial que permita su ejercicio eficaz. Esta es la finalidad de la Administración periférica del Estado, regulada en la LRJSP.

6.1. Los delegados del Gobierno

La Constitución configura a los delegados del Gobierno como los órganos encargados de dirigir la Administración del Estado en cada comunidad autónoma y de coordinarla tanto internamente como con las administraciones autonómica y local. Se trata de un órgano propio de la administración periférica que no debe confundirse con otros órganos de igual denominación integrados en la Administración central.

Su configuración actual es el resultado de una evolución normativa que culmina con la LOFAGE y se mantiene en la LRJSP, que los configura como cargos directivos equiparados a subsecretarios y sometidos al régimen de los altos cargos. Son nombrados por real decreto del Consejo de Ministros a propuesta del presidente del Gobierno, con amplios márgenes de discrecionalidad, ya que no se exigen requisitos concretos de cualificación ni la condición de funcionario de carrera.

En caso de ausencia o vacante, la suplencia corresponde al subdelegado del Gobierno designado o, en su defecto, al de la provincia sede de la delegación, y en comunidades autónomas uniprovinciales al secretario general de la delegación.

Sus competencias comprenden la dirección y coordinación de la Administración del Estado en la comunidad autónoma, incluyendo el nombramiento de subdelegados y la supervisión de los servicios territoriales. También asumen funciones de información al ciudadano, actuando como punto de acceso a las distintas administraciones, y de coordinación entre administraciones mediante el intercambio de información y la promoción de convenios.

Ejercen asimismo funciones de control de legalidad, resolviendo recursos administrativos y velando por la correcta aplicación del ordenamiento jurídico, pudiendo incluso suspender actos de entidades locales que lesionen gravemente el interés general, con posterior impugnación ante la jurisdicción contencioso-administrativa. Además, informan a los ministerios sobre el funcionamiento de los servicios territoriales, proponen medidas de mejora organizativa y coordinan el uso de medios materiales.

Finalmente, desempeñan funciones esenciales en materia de seguridad ciudadana y protección de derechos y libertades, a través de las Fuerzas y Cuerpos de Seguridad del Estado bajo la dependencia funcional del ministerio del Interior.

6.2. Los servicios territoriales y la estructura de las delegaciones del Gobierno

La Administración del Estado dispone de servicios territoriales distribuidos por todo el territorio, que pueden integrarse o no en las delegaciones del Gobierno. La integración persigue la racionalización organizativa y el ahorro de costes mediante el uso compartido de medios personales y materiales.

Los servicios integrados dependen orgánicamente del delegado del Gobierno o del subdelegado, a través de la secretaría general, y sus puestos de trabajo se adscriben al ministerio competente en materia de política territorial. Sin embargo, funcionalmente continúan dependiendo de los ministerios correspondientes, que dictan instrucciones, resuelven consultas y evalúan su actividad, manteniendo una relación directa en la gestión ordinaria.

Existen también servicios no integrados, cuya organización se determina mediante real decreto o por orden ministerial según su nivel orgánico. Esta dualidad ha hecho necesaria la creación de un órgano de coordinación interministerial para garantizar el correcto funcionamiento del sistema.

La estructura de las delegaciones del Gobierno incluye las subdelegaciones en las provincias y las direcciones insulares, así como una secretaría general encargada de los servicios comunes y de ámbitos como derechos ciudadanos, procesos electorales o protección civil, que dependen funcionalmente del ministerio del Interior. También existen áreas funcionales para la gestión de los servicios integrados y un gabinete de apoyo al delegado.

6.3. Los subdelegados del Gobierno

Los subdelegados del Gobierno en la provincia sustituyen a los antiguos gobernadores civiles y responden a la adaptación de la administración periférica al Estado autonómico. A diferencia de aquellos, carecen de carácter político y se configuran como puestos reservados a funcionarios de carrera del subgrupo A1, equiparados a subdirectores generales.

Existe un subdelegado en cada provincia, salvo en las comunidades autónomas uniprovinciales, donde sus funciones son asumidas por el delegado del Gobierno, salvo excepciones justificadas.

Son nombrados por el delegado del Gobierno mediante libre designación y pasan a la situación de servicios especiales.

Ejercen funciones relativas al orden público, la seguridad ciudadana y la protección civil en el ámbito provincial, coordinan la actuación de la administración estatal con la autonómica y local, dirigen los servicios territoriales integrados y supervisan los no integrados, y coordinan la utilización de medios materiales en la provincia.

6.4. El director insular

El director insular tiene su origen en los antiguos gobernadores insulares y responde a la necesidad de adaptar la organización territorial a la realidad insular. Su regulación actual mantiene la lógica de profesionalización introducida por la LOFAGE, configurándolo como un puesto reservado a funcionarios de carrera del subgrupo A1.

Es nombrado por el delegado del Gobierno mediante libre designación y depende jerárquicamente de este o del subdelegado del Gobierno, cuando exista. Ejerce en su ámbito territorial funciones equivalentes a las de los subdelegados del Gobierno, aunque no tiene la condición de órgano directivo al no estar equiparado a una subdirección general.

Su existencia no es obligatoria en todas las islas, sino únicamente en aquellas que se determinen reglamentariamente, atendiendo a las necesidades organizativas del territorio.

7. LA ADMINISTRACIÓN DEL ESTADO EN EL EXTERIOR

La Administración del Estado en el exterior careció durante mucho tiempo de una regulación legal sistemática, pues su organización se apoyaba en reales decretos y en normas específicas sobre determinados órganos o instituciones. La novedad llegó con la LOFAGE, que incorporó una regulación básica de esta materia, aunque hoy el régimen principal se contiene en la Ley de la Acción y del Servicio Exterior del Estado, a la que la LRJSP se remite, quedando esta última con aplicación supletoria.

La Ley de la Acción y del Servicio Exterior del Estado regula el servicio exterior con la finalidad de asegurar la unidad de acción. Sus funciones generales consisten en proporcionar al Gobierno la información necesaria para el desarrollo de la política exterior y en prestar en el extranjero asistencia y protección a las personas físicas y jurídicas españolas. El servicio exterior está integrado por órganos, unidades administrativas, instituciones y medios personales y materiales que actúan fuera del territorio nacional y que, aunque dependen orgánica y funcionalmente de los ministerios competentes por razón de la materia, quedan jerárquicamente sometidos al embajador.

La organización del servicio exterior comprende las misiones diplomáticas permanentes, las representaciones permanentes, las misiones diplomáticas especiales, las delegaciones y las oficinas consulares. Las misiones diplomáticas permanentes representan a España ante uno o varios Estados, mientras que las representaciones permanentes lo hacen ante la Unión Europea o ante organizaciones internacionales, incluyéndose entre ellas las representaciones de observación ante organizaciones de las que España no forma parte.

Estas misiones y representaciones ejercen las funciones que les atribuyen el Derecho internacional, los tratados internacionales, la normativa de la Unión Europea y las reglas de la organización internacional correspondiente. Debido a que actúan en el ámbito internacional, la aplicación del derecho interno se adapta en aspectos como la gestión del personal, la administración económica, la contratación pública, la seguridad de la información o la defensa jurídica en el exterior.

La creación de misiones diplomáticas y representaciones permanentes exige real decreto del Consejo de Ministros a iniciativa del ministerio competente en asuntos exteriores, con acuerdo del ministerio de Hacienda y previo informe del Consejo Ejecutivo de Política Exterior. Al frente de ambas se sitúa el embajador, salvo que en determinadas representaciones pueda actuar un encargado de negocios. El embajador es el jefe de la misión o representación y dirige, coordina, supervisa e impulsa la actividad del conjunto de órganos y unidades integrados en ella.

Los embajadores son nombrados por real decreto. Normalmente proceden de la carrera diplomática, aunque también pueden ser designadas personas ajenas a ella conforme a criterios de experiencia profesional. Junto a la jefatura, las misiones y representaciones cuentan con una chancillería diplomática dirigida por un funcionario de la carrera diplomática y con otras unidades especializadas, como consejerías, agregadurías, oficinas sectoriales, oficinas económicas y comerciales, centros culturales o de cooperación, que dependen orgánica y funcionalmente de sus respectivos ministerios. En algunos casos existe además una sección de servicios comunes para la gestión compartida de recursos.

Las misiones diplomáticas especiales y las delegaciones se caracterizan por su carácter temporal. Las primeras responden a cometidos concretos o asuntos especiales y se crean por real decreto del Consejo de Ministros, que determina su objeto y duración de acuerdo con el Estado receptor. Las delegaciones representan al Estado en conferencias o actos concretos y están presididas, con carácter general, por los órganos que ostentan la representación del Estado, requiriéndose solo excepcionalmente autorización específica para que esa función recaiga en otro titular.

Las oficinas consulares son los órganos encargados de ejercer las funciones consulares previstas en los tratados internacionales y de prestar asistencia a los españoles en el exterior. Entre sus tareas se encuentran la expedición de pasaportes y documentos de viaje, la representación o asistencia ante autoridades del Estado receptor, la comunicación de resoluciones judiciales, la tramitación de comisiones rogatorias y la protección de menores españoles. Esa protección no se limita a los nacionales españoles, pues también puede extenderse a ciudadanos de otros Estados miembros de la Unión Europea cuando su Estado no esté representado en el país tercero de que se trate.

Las oficinas consulares se crean por real decreto a iniciativa del ministerio competente en asuntos exteriores, con conformidad del ministerio de Hacienda e informe previo del Consejo Ejecutivo de Política Exterior. Pueden ser oficinas consulares de carrera, dirigidas por funcionarios de la carrera diplomática y de las que dependen agencias consulares, u oficinas consulares honorarias, a cargo de cónsules honorarios.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
