    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. EL MODELO CONSTITUCIONAL DE ADMINISTRACIÓN LOCAL

1.1. La autonomía local y su significado

El artículo 137 CE integra a municipios, provincias y comunidades autónomas en la organización territorial del Estado y reconoce a esas entidades autonomía para la gestión de sus propios intereses, como expresión de la descentralización territorial. Municipios y provincias son entidades locales de existencia necesaria, con gobierno y administración atribuidos respectivamente a ayuntamientos y diputaciones u otros órganos representativos, mientras que en los archipiélagos las islas cuentan además con cabildos o consejos.

La autonomía local consiste en el derecho de la comunidad a participar, mediante órganos propios, en el gobierno y administración de los asuntos que le afectan, con una intensidad variable según la relación entre intereses locales y supralocales. Esa participación exige órganos representativos dotados de potestades efectivas, así como capacidad de gestión mediante competencias suficientes para atender sus intereses.

La doctrina aprecia un doble grado de autonomía local derivado de la Constitución. Los municipios son entidades primarias, mientras que provincias e islas son entidades de segundo grado o agrupaciones de municipios, por lo que la autonomía es más intensa en el nivel municipal. Además, los municipios cuentan con mayor legitimación democrática, lo que ha permitido al Tribunal Constitucional flexibilizar la reserva de ley para admitir ordenanzas municipales en materia tributaria y sancionadora.

El artículo 140 CE exige que el gobierno municipal esté integrado por alcalde y concejales, elegidos estos por sufragio universal, libre, directo y secreto, admitiéndose para el alcalde elección directa o indirecta. En cambio, el artículo 141 CE solo afirma el carácter representativo de las diputaciones. Aunque no se diga expresamente lo mismo de cabildos y consejos, la autonomía local exige también en ellos órganos de dirección política de carácter representativo, sin excluir la existencia de órganos ejecutivos no necesariamente integrados por electos, siempre que respondan ante aquellos.

1.2. La garantía institucional de la autonomía local

La garantía institucional de la autonomía local ampara a municipio, provincia e isla y obliga al legislador a respetar un núcleo indisponible que mantenga reconocibles esas instituciones como componentes esenciales del orden constitucional. La Constitución no asegura un contenido competencial concreto e inmutable, pero sí impide una regulación que vacíe a la institución de su existencia real y la reduzca a una mera denominación, pues en tal caso la ley sería inconstitucional.

Para reforzar esa garantía, la Ley Orgánica 7/1999 modificó la LOTC e introdujo el conflicto en defensa de la autonomía local. Antes de esa reforma, las entidades locales podían impugnar reglamentos y actos ante la jurisdicción contencioso-administrativa, pero no normas con rango de ley, cuyo control corresponde al Tribunal Constitucional y ante el que carecían de legitimación.

La reforma respondió además a la exigencia del artículo 11 de la Carta Europea de Autonomía Local, aunque incorporó cautelas para evitar una litigiosidad masiva.

Esas cautelas consisten en que solo pueden recurrirse por esta vía leyes estatales o autonómicas, quedando fuera reglamentos y actos administrativos; en que el único motivo admisible es la lesión de la autonomía local constitucionalmente garantizada; y en que solo están legitimados municipios, provincias e islas, quedando excluidas otras entidades locales no preceptivas. También se exige una legitimación reforzada cuando la ley afecta a una pluralidad de entidades, de modo que se requiere un mínimo de municipios o provincias y de población representada, salvo que la ley afecte solo a una entidad concreta. Además, la decisión de recurrir debe adoptarse por mayoría absoluta del pleno correspondiente y ha de ir precedida del dictamen preceptivo, aunque no vinculante, del Consejo de Estado o del órgano consultivo autonómico competente.

1.3. El contenido de la autonomía provincial

La adaptación de la provincia al nuevo modelo territorial ha planteado dificultades por la imprecisión del contenido esencial de la autonomía local. El Tribunal Constitucional señaló desde temprano que la aparición del nivel autonómico obligaba a replantear tanto competencias estatales como provinciales, ya que de estas últimas se nutrirían en parte las nuevas comunidades autónomas.

La garantía institucional llevó a declarar inconstitucional la transferencia plena y urgente de las diputaciones catalanas a la Generalidad, porque en una comunidad autónoma pluriprovincial no era posible que la comunidad asumiera la totalidad de las competencias provinciales. En cambio, en las comunidades autónomas uniprovinciales la situación era distinta, ya que coincidían los intereses de la provincia con los de la comunidad autónoma. Por ello, el artículo 40 LBRL permitió que asumieran las competencias, medios y recursos de las diputaciones, solución considerada compatible con la garantía constitucional porque los intereses provinciales seguían presentes en un órgano representativo, ahora autonómico.

En Baleares, pese a su carácter uniprovincial, las competencias de las diputaciones pasaron a los consejos insulares y no a la comunidad autónoma. Canarias planteó más problemas por ser comunidad pluriprovincial y archipelágica. Allí las mancomunidades interinsulares provinciales ya tenían un régimen distinto y competencias mucho más limitadas que las diputaciones, centradas en la representación y coordinación de intereses insulares, la gestión de servicios encomendados por los cabildos, el reparto de recursos y cargas y el fomento de servicios interinsulares.

Aunque el artículo 141 CE atribuyó a las islas una administración propia adicional y no sustitutiva de la provincial, el Estatuto de Autonomía de Canarias de 1982 omitió las provincias en la organización territorial autonómica y previó el reparto de las competencias, medios y recursos de las mancomunidades entre la comunidad autónoma y los cabildos. Así, las provincias quedaron despojadas de sus escasas competencias, pero la constitucionalidad de ese estatuto no fue enjuiciada por el Tribunal Constitucional. El Tribunal Supremo confirmó la validez del decreto de traspaso al considerar que la garantía institucional de la provincia no resultaba aplicable en Canarias. Desde entonces, las provincias canarias subsisten solo formalmente, con organización representativa integrada por los presidentes de los cabildos, pero sin competencias, medios ni recursos financieros.

1.4. Las otras entidades locales

El modelo no se agota en municipios, provincias e islas. El artículo 141 CE permite crear agrupaciones de municipios distintas de la provincia, por lo que se trata de entidades contingentes y de ámbito supramunicipal. El artículo 3 LBRL añade expresamente las áreas metropolitanas y las mancomunidades de municipios, previstas para todo el territorio nacional en los términos de la legislación local y autonómica.

Ambas figuras permiten agrupar municipios para prestar servicios o realizar obras comunes. En las áreas metropolitanas, esa agrupación responde a la existencia de grandes aglomeraciones urbanas que exigen planificación y coordinación. En las mancomunidades, basta la voluntad de los municipios, aunque pertenezcan a distintas comunidades autónomas.

Las comunidades autónomas también han regulado otras entidades supramunicipales distintas de la provincia y, pese al silencio constitucional, otras de ámbito inferior. Entre las primeras destacan las comarcas, históricamente implantadas en algunos territorios como Cataluña. En Cataluña se configuran como división territorial preceptiva orientada a hacer efectivo el principio de subsidiariedad en la prestación de servicios y a agrupar municipios con rasgos sociales, culturales e históricos comunes. En Aragón se conciben como entidades locales creadas por ley, integradas por municipios limítrofes vinculados por características e intereses comunes y situadas como nivel intermedio entre provincia y municipio, asumiendo servicios y actividades supramunicipales y reduciendo paralelamente competencias provinciales.

En su redacción originaria, el artículo 3 LBRL también contemplaba entidades locales de ámbito inferior al municipio reconocidas por las comunidades autónomas. Al carecer de mención constitucional expresa, estas entidades menores desaparecieron de la enumeración legal tras la reforma de 2013, orientada a la racionalización y sostenibilidad de la administración local. La idea inicial era suprimirlas como entidades con personalidad jurídica y permitir solo órganos de gestión desconcentrada cuando resultaran más eficientes, pero finalmente el legislador optó por prohibir la creación de nuevas entidades inframunicipales con personalidad jurídica y permitir la subsistencia de las ya existentes o en tramitación, siempre que rindieran cuentas ante el Estado y las comunidades autónomas. En caso de incumplimiento, debían entrar en disolución. Además, el artículo 116 bis LBRL prevé la supresión de estas entidades cuando incumplan los objetivos de estabilidad presupuestaria o deuda pública, o cuando superen el plazo legal máximo de pago.

2. LA DISTRIBUCIÓN DE COMPETENCIAS ENTRE EL ESTADO Y LAS COMUNIDADES

AUTÓNOMAS EN MATERIA DE RÉGIMEN LOCAL El artículo 148 CE solo atribuye expresamente a las comunidades autónomas la alteración de términos municipales dentro de su territorio y las funciones sobre entidades locales que les transfiera el Estado. Sin embargo, al no reservar el artículo 149.1 CE una competencia específica estatal sobre régimen local, los estatutos de autonomía han asumido generalmente competencias exclusivas sobre las entidades locales de su territorio, si bien subordinadas a la competencia estatal para dictar la legislación básica de régimen local al amparo del artículo 149.1.18 CE.

Esta concurrencia competencial da lugar al carácter bifronte del régimen local: las entidades locales no son solo divisiones territoriales de la comunidad autónoma, sino también del Estado, por lo que ninguna de ambas instancias agota por sí sola su proyección institucional. En consecuencia, aunque la legislación básica puede atribuir directamente competencias a las entidades locales para garantizar un núcleo homogéneo de derechos prestacionales, cuando la materia corresponda constitucionalmente a la comunidad autónoma solo esta puede atribuir competencias locales o impedir su ejercicio, mientras que el Estado podrá hacerlo cuando ostente competencia sobre la materia sectorial correspondiente.

La jurisprudencia constitucional mantiene que la competencia estatal sobre régimen local básico se superpone a la autonómica sobre entidades locales de su territorio. No obstante, el alcance de las competencias estatales no es uniforme, tanto porque no todas las comunidades autónomas han asumido igual nivel competencial en sus estatutos como porque existen regímenes singulares, especialmente en el País Vasco y Navarra.

La intensidad de la legislación básica estatal disminuye respecto de aquellas entidades locales cuya creación corresponde exclusivamente a las comunidades autónomas, como las comarcas, otras agrupaciones de municipios o las antiguas entidades locales menores. Al tratarse de entidades de fuerte interiorización autonómica, corresponde en exclusiva a la comunidad autónoma determinar su creación, organización y competencias, sin que el Estado pueda imponer qué funciones atribuirles.

Los estatutos de autonomía de última generación han tendido a incorporar regulación material sobre régimen local, incluyendo aspectos antes reservados a leyes autonómicas de desarrollo, con la finalidad de reforzar el blindaje estatutario de determinadas opciones organizativas frente a la legislación básica estatal. Aunque esta técnica fue declarada constitucional, el Tribunal Constitucional ha precisado que las previsiones estatutarias en materia de régimen local solo vinculan al legislador autonómico y no pueden desplazar la competencia estatal para fijar bases comunes aplicables a todas las comunidades autónomas.

La competencia estatal en materia de régimen local no se fundamenta únicamente en el artículo 149.1.18 CE. También se apoya en el artículo 149.1.14 CE para regular la hacienda de las corporaciones locales, incluyendo sus tributos propios y su participación en tributos estatales y autonómicos, elemento esencial de la autonomía local conforme al artículo 142 CE. La suficiencia financiera local continúa siendo uno de los principales problemas estructurales de la administración local, especialmente en municipios pequeños y despoblados.

Asimismo, aunque la reserva de ley orgánica del artículo 81 CE no constituye por sí misma un título competencial, el hecho de que el régimen electoral general deba regularse por ley orgánica y comprenda las elecciones locales ha permitido al Estado regular el sistema electoral de los órganos representativos de las entidades locales. Esta regulación se contiene en la LOREG, que disciplina las elecciones municipales, de cabildos y consejos insulares y de diputaciones provinciales.

3. LOS MUNICIPIOS

3.1. La inadecuación de la actual planta municipal

El modelo municipal español responde al patrón francés, caracterizado por una elevada fragmentación municipal, frente a otros sistemas europeos con menor número de municipios.

Aunque en Europa se ha reducido progresivamente la planta municipal desde 1945, en España subsisten más de 8.000 municipios, manteniéndose una estructura especialmente fragmentada.

La planta municipal española presenta una fuerte desigualdad demográfica. La población se concentra en un número muy reducido de municipios mientras la mayoría cuenta con escasa población, hasta el punto de que una parte muy significativa de los municipios no supera los 1.000 habitantes y reúne un porcentaje mínimo de la población total. Esta situación es especialmente intensa en determinadas comunidades autónomas y refleja un acusado fenómeno de despoblación rural.

También existe una gran disparidad en la distribución interna de la población municipal, pues mientras en algunas zonas predominan municipios de núcleo único, en otras la población se dispersa en varios núcleos o entidades inferiores, lo que encarece la prestación de servicios. A ello se suma la desigualdad territorial, con municipios muy pequeños en extensión en unas regiones y muy extensos en otras, como consecuencia de factores históricos y económicos.

La inadecuación de la planta municipal española ha sido reiteradamente señalada por instituciones europeas, al dificultar la descentralización efectiva de políticas públicas y comprometer la sostenibilidad financiera de los servicios básicos. Sin embargo, ni el Estado ni las comunidades autónomas han impulsado una reducción forzosa del número de municipios por el rechazo político y social que suscita la pérdida de personalidad jurídica municipal.

Por ello, las reformas recientes no han optado por la fusión obligatoria de municipios, sino por fomentar fórmulas de coordinación, asociación y redistribución competencial para evitar duplicidades y mejorar la eficiencia. No obstante, estas soluciones plantean dudas por el incremento del número de entes instrumentales y la dispersión de recursos. Además, cualquier reforma que altere el reparto competencial municipal requiere respetar el contenido mínimo de la autonomía local y la voluntad de las comunidades autónomas, competentes para atribuir muchas de las competencias sectoriales municipales.

3.2. Las competencias municipales

La atribución de competencias municipales corresponde a los legisladores estatal y autonómico dentro de sus respectivas materias, debiendo atender al tipo de actividad, capacidad de gestión y principios de descentralización, eficacia, eficiencia, estabilidad presupuestaria, sostenibilidad financiera y proximidad. Pese a ello, el sistema actual se caracteriza por una notable uniformidad competencial entre municipios, sin apenas diferenciación real según tamaño o capacidad de gestión.

El artículo 7 LBRL distingue entre competencias propias, delegadas y competencias distintas de las anteriores, incluyéndose dentro de las propias los servicios de prestación obligatoria.

3.2.1. Las competencias propias

Las competencias propias son aquellas atribuidas por ley a los municipios por responder a intereses esencialmente locales, ejercitándose con autonomía aunque sometidas, en su caso, a coordinación cuando concurran intereses supramunicipales. Son de titularidad municipal, se atribuyen directamente por ley y no requieren aceptación del municipio.

Su atribución exige previsión legal expresa del legislador estatal o autonómico competente en la materia y queda condicionada por los principios de estabilidad presupuestaria, sostenibilidad financiera, eficiencia y ausencia de duplicidades. Para ello, la ley atributiva debe acompañarse de memoria económica que analice el impacto financiero de la atribución, garantice la suficiencia financiera y justifique que no se genera mayor gasto, requiriéndose además informe del Ministerio de Hacienda cuando se trate de leyes estatales.

Las materias en las que los municipios deben tener competencias propias se recogen en el artículo 25.2 LBRL, pero esa enumeración no es cerrada ni implica atribución automática. La atribución concreta dependerá de que concurran los requisitos legales de eficiencia, sostenibilidad y ausencia de duplicidades. Tampoco son las únicas posibles, pues las comunidades autónomas y el Estado pueden atribuir otras competencias propias dentro de sus respectivos ámbitos materiales, sin que el Estado pueda impedir a las comunidades autónomas atribuir competencias locales en materias de su competencia.

3.2.2. Los servicios municipales de prestación obligatoria

Dentro de las competencias propias, el artículo 26 LBRL establece determinados servicios cuya prestación es obligatoria para los municipios en función de su población. Todos los municipios deben prestar los servicios básicos esenciales vinculados a necesidades elementales de la vida urbana.

A medida que aumenta la población municipal se amplía el catálogo de servicios obligatorios. Los municipios de más de 5.000 habitantes deben asumir servicios adicionales, mientras que los de más de 20.000 y 50.000 habitantes deben prestar progresivamente nuevos servicios de mayor complejidad.

En los municipios de menos de 20.000 habitantes la prestación de muchos servicios puede realizarse mediante fórmulas de coordinación o cooperación provincial basadas en criterios de coste efectivo, pudiendo intervenir diputaciones, mancomunidades o consorcios cuando resulte más eficiente. No obstante, esta fórmula requiere la conformidad del municipio afectado, lo que garantiza su compatibilidad con la autonomía local.

La gestión coordinada de servicios obligatorios constituye además una medida relevante en los planes económico-financieros de los municipios que incumplan objetivos de estabilidad presupuestaria o deuda pública.

3.2.3. Las competencias delegadas

Las competencias delegadas son aquellas cuya titularidad conserva la administración delegante, limitándose el municipio a ejercerlas en los términos fijados en el acuerdo de delegación. Por ello, la administración delegante mantiene facultades de dirección, control e instrucción sobre su ejercicio.

La delegación requiere aceptación voluntaria del municipio mediante acuerdo de mayoría absoluta del pleno, lo que excluye lesión de la autonomía local. Además, exige financiación suficiente por la administración delegante, siendo nula la delegación que carezca de cobertura financiera adecuada.

El acuerdo de delegación debe prever causas de revocación y de renuncia, pudiendo revocarse por incumplimiento municipal de las instrucciones de la administración delegante. El municipio, por su parte, puede renunciar cuando falte financiación o sobrevengan circunstancias que impidan la adecuada prestación.

La delegación también está sujeta a límites de eficiencia, ausencia de duplicidades, sostenibilidad financiera y prohibición de incremento del gasto, extremos que deben justificarse mediante memoria económica. La ley contempla determinadas materias en las que la delegación se presume especialmente idónea por razones de ahorro o eficiencia, sin perjuicio de la necesidad de motivar cada delegación concreta.

3.2.4. Las competencias que no son propias ni delegadas

Los municipios pueden ejercer actividades o prestar servicios no atribuidos legalmente como competencias propias ni delegados, siempre que consideren necesaria su prestación para sus vecinos. Sin embargo, ese ejercicio queda sometido a límites estrictos.

En particular, se exige que no se comprometa la sostenibilidad financiera de la hacienda municipal y que no exista duplicidad con servicios efectivamente prestados por otra administración competente. El cumplimiento de ambos requisitos debe acreditarse mediante informes previos, preceptivos y vinculantes, emitidos respectivamente por la administración materialmente competente y por la administración de tutela financiera.

El mantenimiento de estas competencias queda además condicionado al cumplimiento de los objetivos de estabilidad presupuestaria, deuda pública y regla de gasto. Su incumplimiento obliga a incluir su supresión en el correspondiente plan económico-financiero.

3.3. La población y el territorio

La población y el territorio, junto con la organización, constituyen elementos esenciales del municipio.

3.3.1. La población

La población municipal está integrada por los vecinos, entendiendo por tales quienes residen habitualmente en el municipio y figuran inscritos en el padrón municipal. El empadronamiento es obligatorio para toda persona que viva en España, incluidos extranjeros en situación irregular, y no acredita por sí mismo residencia legal.

Solo puede ostentarse la condición de vecino de un único municipio. La inscripción padronal produce dicha condición mientras subsista la residencia habitual, procediendo la baja cuando se produzca alta en otro municipio o se constate la falta de residencia efectiva.

El padrón recoge los datos personales y de domicilio necesarios para identificar al vecino y elaborar el censo electoral, pudiendo cederse a otras administraciones cuando resulte necesario para el ejercicio de sus competencias y la residencia sea relevante. En caso de ausencia de domicilio efectivo, la normativa prevé mecanismos específicos de empadronamiento con intervención de servicios sociales.

El padrón constituye prueba del domicilio habitual, aunque no excluye la obligación administrativa de intentar notificaciones en otros domicilios conocidos cuando proceda. La condición de vecino atribuye derechos y deberes como participar en elecciones municipales, utilizar servicios públicos municipales, solicitar su establecimiento y contribuir a su financiación.

La gestión padronal corresponde al municipio, si bien debe realizarse informáticamente y puede ser asistida por otras administraciones cuando el municipio carezca de medios. El INE desempeña funciones de coordinación, control y validación de datos, elevando al Gobierno las cifras oficiales de población para su aprobación.

3.3.2. El territorio

El territorio municipal es el término municipal, necesariamente integrado en una sola provincia, sobre el que el ayuntamiento ejerce sus competencias. La regulación y aprobación de alteraciones de términos municipales corresponde a las comunidades autónomas dentro del marco básico estatal.

Las alteraciones territoriales comprenden todas las modificaciones del término municipal, incluyan o no variación en el número de municipios, como fusiones, integraciones o segregaciones parciales.

La creación de nuevos municipios por segregación queda sometida por la legislación estatal a requisitos restrictivos dirigidos a evitar el incremento del número de municipios, especialmente la existencia de núcleos diferenciados con población mínima suficiente, garantía de suficiencia financiera y mantenimiento de la calidad de los servicios.

El procedimiento de alteración territorial corresponde regularlo a las comunidades autónomas, debiendo incluir audiencia a los municipios afectados e informes preceptivos del órgano consultivo correspondiente y de la administración de tutela financiera.

La legislación estatal fomenta específicamente las fusiones voluntarias de municipios colindantes de la misma provincia, sujetas a acuerdo municipal y al procedimiento autonómico aplicable. Para incentivar estas fusiones se reconocen ventajas financieras, dispensas temporales de determinados servicios obligatorios y preferencia en planes de cooperación y subvenciones, además de prohibirse la segregación durante un plazo determinado.

3.4. La organización municipal

3.4.1. Evolución legislativa desde 1985

La LBRL de 1985 estableció inicialmente un modelo organizativo municipal prácticamente uniforme para todos los ayuntamientos, con escasas diferencias según población, salvo para los municipios en concejo abierto y para Madrid y Barcelona. La organización básica se articulaba en torno al alcalde, los tenientes de alcalde y el pleno, con competencias homogéneas para todos los municipios, añadiéndose únicamente algunos órganos preceptivos adicionales en municipios de más de 5.000 habitantes.

La organización complementaria quedaba inicialmente muy vinculada a la autonomía municipal, permitiéndose a los municipios crear órganos adicionales con amplio margen de decisión. Sin embargo, la STC 214/1989 declaró inconstitucional que los municipios pudieran inaplicar la legislación autonómica de desarrollo en esta materia, quedando la creación de órganos complementarios sujeta tanto a la legislación básica estatal como a la autonómica.

La Ley 57/2003 reformó el sistema e incrementó los órganos de existencia preceptiva en todos los municipios, introduciendo además un régimen organizativo especial para los municipios de gran población. Este nuevo régimen alteró el reparto funcional entre pleno, alcalde y junta de gobierno local e impuso numerosos órganos obligatorios adicionales. Aunque esta opción legislativa fue discutida doctrinalmente por restringir la potestad de autoorganización municipal, el Tribunal Constitucional la consideró compatible con la autonomía local.

La legislación básica distingue actualmente tres regímenes organizativos municipales: concejo abierto, régimen general y régimen de municipios de gran población.

3.4.2. Los muy pequeños municipios: el régimen de Concejo abierto

Tras la reforma de 2011, el régimen de concejo abierto dejó de imponerse automáticamente por razón de población y pasó a aplicarse a los municipios que ya funcionaban así o a aquellos en que se acuerde su implantación con apoyo vecinal, acuerdo reforzado de los concejales y aprobación autonómica.

En este régimen, el gobierno y administración municipales corresponden al alcalde, elegido directamente por los vecinos, y a una asamblea vecinal integrada por todos los electores. Su funcionamiento se rige preferentemente por los usos y costumbres locales y, supletoriamente, por la legislación estatal y autonómica de régimen local.

3.4.3. Los municipios de régimen general

3.4.3.1. El pleno

El pleno es el órgano representativo integrado por todos los concejales y presidido por el alcalde.

Como manifestación del principio democrático, le corresponden las decisiones fundamentales de la vida municipal, especialmente aquellas de mayor trascendencia política, normativa, presupuestaria y de control.

Entre sus competencias destacan la aprobación de reglamentos y ordenanzas, presupuestos, tributos, planes urbanísticos, control de los órganos de gobierno, alteraciones del término municipal, creación de órganos colegiados y desconcentrados, aceptación de delegaciones, aprobación de la estructura de personal y ejercicio de acciones judiciales en materias de su competencia.

Aunque determinadas competencias pueden delegarse en el alcalde o en la junta de gobierno local, quedan excluidas de delegación las funciones esenciales vinculadas al principio democrático.

El pleno funciona mediante sesiones ordinarias y extraordinarias, con convocatoria formal, quórum mínimo de constitución, adopción de acuerdos por mayoría simple salvo supuestos de mayoría reforzada y publicidad general de sus reuniones, salvo excepciones justificadas por protección de derechos fundamentales.

3.4.3.2. El alcalde

El alcalde preside y representa la corporación municipal, convoca y dirige el pleno y ostenta la dirección del gobierno y administración municipales.

Ejerce amplias competencias ejecutivas, entre ellas la dirección de servicios y obras, la jefatura del personal y de la policía municipal, la gestión económica ordinaria y la aprobación de determinados proyectos y operaciones. Además, dispone de una cláusula residual que le atribuye las competencias municipales no asignadas expresamente a otro órgano.

Gran parte de sus competencias son delegables, aunque mantiene la titularidad y el control sobre la delegación.

3.4.3.3. La junta de gobierno local y tenientes de alcalde

La junta de gobierno local es un órgano colegiado de apoyo al alcalde, de su confianza política, obligatorio en municipios de más de 5.000 habitantes. Carece de competencias propias salvo atribución legal expresa, ejerciendo fundamentalmente competencias delegadas por el alcalde o el pleno.

Las reuniones de la junta son secretas salvo en aquello que afecte al ejercicio de competencias delegadas del pleno cuya publicidad venga exigida por el principio democrático.

Los tenientes de alcalde son nombrados libremente por el alcalde entre los concejales y le sustituyen en casos de ausencia, enfermedad o vacante.

3.4.3.4. La comisión especial de sugerencias y reclamaciones

Es un órgano voluntario en municipios de régimen general destinado a la defensa de los derechos de los vecinos mediante la supervisión de la actuación administrativa municipal.

Está integrada proporcionalmente por representantes de todos los grupos políticos del pleno y conoce de quejas vecinales sobre el funcionamiento de los servicios municipales, pudiendo formular recomendaciones e informar al pleno de su actuación.

3.4.3.5. La comisión especial de cuentas

Es un órgano obligatorio encargado de examinar las cuentas anuales municipales antes de su sometimiento al pleno.

3.4.3.6. Las comisiones del pleno

Son órganos colegiados internos del pleno que estudian, informan y preparan los asuntos que deben someterse a este, realizan seguimiento de la acción de gobierno y ejercen competencias delegadas cuando proceda.

Su composición reproduce proporcionalmente la representación política existente en el pleno.

3.4.3.7. Los órganos desconcentrados

El pleno puede crear órganos desconcentrados para acercar la administración municipal a los ciudadanos, especialmente en función de la distribución territorial de la población.

Dentro de esta categoría se integran las actuales entidades inframunicipales sin personalidad jurídica, que pueden crearse para la administración de núcleos separados cuando resulte más eficiente desde el punto de vista presupuestario.

3.4.3.8. Los órganos de gestión económico-financiera

Todos los municipios deben contar con órganos responsables de presupuestación, contabilidad, tesorería y recaudación, así como con intervención general municipal para el control interno de la gestión económica y presupuestaria.

La legislación básica reserva gran parte de estas funciones a funcionarios con habilitación nacional con el fin de reforzar la profesionalidad técnica en la gestión financiera local.

3.4.4. Los municipios de gran población

Los municipios de gran población se rigen por un régimen organizativo especial que prevalece sobre el régimen general. Acceden a este régimen automáticamente o por decisión de la asamblea legislativa autonómica cuando concurren determinados requisitos poblacionales o circunstancias especiales.

Una vez adquirido, este régimen tiende a mantenerse incluso si posteriormente disminuye la población.

3.4.4.1. El pleno

En los municipios de gran población el pleno pierde la mayoría de sus funciones ejecutivas y administrativas, conservando principalmente las competencias normativas, presupuestarias, de control político y aquellas relativas a las decisiones fundamentales de la vida municipal.

Las competencias delegables del pleno pasan a ejercerse preferentemente por las comisiones plenarias, no por el alcalde o la junta de gobierno.

Cuenta además con secretaría general propia, cuyo titular debe ser funcionario con habilitación nacional.

3.4.4.2. El alcalde

El alcalde asume una función predominantemente de dirección política y de liderazgo del gobierno municipal, compartiendo con la junta de gobierno local la dirección de la administración municipal.

Mantiene la representación de la corporación, la presidencia del pleno y de la junta de gobierno y amplias competencias de dirección política, muchas de ellas delegables salvo las legalmente indelegables.

3.4.4.3. La junta de gobierno local y los tenientes de alcalde

La junta de gobierno local pasa a ser el principal órgano ejecutivo y administrativo del municipio, asumiendo gran parte de las competencias ejecutivas ordinarias.

Sus miembros deben ser concejales, tras la declaración de inconstitucionalidad de la posibilidad de integrar en ella a no electos. Los tenientes de alcalde deben formar parte necesariamente de la junta.

Sus reuniones son secretas, aunque sus acuerdos son públicos.

3.4.4.4. Los distritos

Los distritos son órganos desconcentrados obligatorios destinados a acercar la gestión municipal a los ciudadanos y fomentar la participación vecinal, gestionando parte del presupuesto municipal.

3.4.4.5. La asesoría jurídica

Es el órgano obligatorio encargado del asesoramiento jurídico y defensa en juicio del alcalde, junta de gobierno y órganos directivos.

3.4.4.6. Los órganos directivos

Comprenden coordinadores generales, directores generales y otros altos cargos administrativos responsables de la dirección técnica y administrativa de las distintas áreas municipales.

Son nombrados por la junta de gobierno conforme a criterios de competencia profesional y experiencia.

3.4.4.7. El órgano de gestión tributaria

Puede crearse para centralizar la gestión, liquidación, inspección y recaudación de tributos e ingresos de derecho público municipales, así como funciones presupuestarias relacionadas con ingresos.

3.4.4.8. El consejo social de la ciudad

Es un órgano preceptivo de participación de organizaciones económicas, sociales, profesionales y vecinales en grandes líneas de desarrollo económico y urbano.

3.4.4.9. El órgano para la resolución de las reclamaciones económico-administrativas

Es un órgano obligatorio encargado de resolver reclamaciones económico-administrativas contra actos tributarios municipales, garantizando una vía especializada, gratuita y previa al control judicial.

Sus miembros son designados por el pleno entre personas de reconocida competencia técnica, aunque su independencia se considera limitada por el sistema de nombramiento y cese.

3.5. La elección de los concejales y el alcalde

Los concejales son elegidos por sufragio universal, libre, directo y secreto de los vecinos, conforme a la LOREG. El sufragio activo en elecciones municipales se extiende, en determinadas condiciones, a ciudadanos de la Unión Europea y a extranjeros de terceros Estados cuando exista reciprocidad.

También pueden ser elegibles como concejales los ciudadanos de la Unión Europea y extranjeros habilitados por tratado, siempre que cumplan los requisitos legales y no incurran en causas de inelegibilidad o incompatibilidad.

El mandato de los concejales dura cuatro años. Las vacantes se cubren por suplentes de la misma lista o, en su defecto, mediante designación por la formación política correspondiente. Si no puede mantenerse el número mínimo de miembros electos se constituye una comisión gestora.

El alcalde es elegido por el pleno entre los cabezas de lista de las candidaturas con representación, requiriéndose mayoría absoluta o, en su defecto, resultando elegido el cabeza de la lista más votada. En determinados municipios pequeños pueden ser candidatos todos los concejales.

El alcalde puede ser destituido mediante moción de censura constructiva y puede plantear cuestión de confianza en determinados supuestos tasados. La normativa establece reglas específicas para evitar el transfuguismo y limita el papel de los concejales no adscritos, respetando en todo caso el núcleo esencial de su función representativa.

4. LAS PROVINCIAS

4.1. Introducción

Desde la Constitución de Cádiz de 1812, la provincia ha desempeñado una doble función como entidad local y como circunscripción territorial del Estado para la administración periférica. La división provincial quedó consolidada con el Decreto de 1833 de Javier de Burgos, concebida como una organización administrativa dependiente de la Administración central para facilitar una acción gubernativa uniforme y eficaz sobre el territorio, manteniéndose sustancialmente estable desde entonces con la única modificación relevante de la división de Canarias en 1927.

Aunque inicialmente la provincia sirvió también de base para múltiples administraciones especiales, algunos ministerios establecieron divisiones territoriales propias para sus servicios periféricos con el fin de evitar la dependencia funcional respecto de la administración provincial general.

La Constitución de 1978 mantiene la provincia como división territorial del Estado y como entidad local dotada de autonomía constitucionalmente garantizada. No obstante, en algunos territorios su relevancia práctica es muy reducida, como sucede en las comunidades autónomas uniprovinciales, en las islas y en otros territorios con regímenes específicos, donde sus competencias han sido asumidas por otras instituciones.

La Constitución protege especialmente la continuidad territorial provincial al exigir ley orgánica para alterar los límites provinciales, lo que dificulta la modificación de la delimitación territorial incluso en supuestos de enclaves.

La provincia es definida por la LBRL como entidad local integrada por la agrupación de municipios, con personalidad jurídica propia y plena capacidad para el cumplimiento de sus fines, orientados al equilibrio y solidaridad intermunicipal, a la adecuada prestación de servicios municipales en todo el territorio provincial, a la coordinación con administraciones superiores y al apoyo financiero y técnico a los municipios.

4.2. La organización provincial

El órgano de gobierno y administración de la provincia es la diputación provincial, cuya estructura reproduce esencialmente la organización de los municipios de régimen general, aunque puede incorporar órganos directivos propios de los municipios de gran población.

La regulación básica estatal de la organización provincial es reducida, lo que permite su desarrollo por la legislación autonómica y por el reglamento orgánico de cada diputación.

Son órganos preceptivos el pleno, el presidente, la junta de gobierno y las comisiones del pleno.

El pleno provincial está integrado por los diputados y el presidente, determinándose el número de diputados en función de la población provincial.

Los diputados provinciales no son elegidos directamente por los ciudadanos, sino de forma indirecta a partir de los resultados de las elecciones municipales, asignándose primero los puestos a las formaciones políticas según votos obtenidos y siendo después designados los diputados por éstas entre sus electos. El presidente es elegido por los diputados de entre sus miembros.

La moción de censura y la cuestión de confianza se regulan de forma análoga al ámbito municipal, aunque esta última solo puede vincularse a determinadas materias tasadas.

Las relaciones entre pleno, presidente y junta de gobierno se estructuran como en los municipios de régimen general. La junta de gobierno es un órgano de apoyo al presidente, de composición monocolor y sin competencias propias salvo delegación.

El pleno ejerce funciones similares a las del pleno municipal y las comisiones del pleno preparan e informan los asuntos que deban someterse a aquél.

El presidente dirige políticamente la diputación, ostenta competencias ejecutivas y dispone de cláusula residual de atribución de competencias, pudiendo delegar gran parte de ellas salvo determinadas materias legalmente exceptuadas.

4.3. Las competencias provinciales

Las competencias de las diputaciones pueden ser propias, delegadas y distintas de unas y otras.

Las competencias propias comprenden, además de las que atribuyan las leyes estatales o autonómicas, funciones de asistencia y cooperación a los municipios para garantizar la adecuada prestación de servicios municipales y mejorar su eficiencia, así como funciones de coordinación de servicios municipales.

Dentro de la asistencia municipal, corresponde a la diputación prestar determinados servicios o apoyos a municipios con insuficiencia de medios, especialmente en materias como padrón, secretaría e intervención, tratamiento de residuos, administración electrónica, contratación centralizada, recaudación tributaria y apoyo a la gestión financiera, siempre que tales servicios no sean prestados por los propios municipios.

Asimismo, presta apoyo técnico y material a los ayuntamientos en materia de personal y en la tramitación de procedimientos administrativos mediante encomienda de gestión.

Entre sus competencias de coordinación destaca la coordinación de la prestación unificada de servicios municipales cuando exista un interés supramunicipal vinculado a la estabilidad presupuestaria.

Especial relevancia tiene el plan provincial de cooperación a las obras y servicios municipales, aprobado por el pleno de la diputación con participación de las distintas administraciones y de la ciudadanía, en el que se programan actuaciones de interés municipal financiadas con aportaciones provinciales, municipales y de otras administraciones. Tras la reforma de 2013, este instrumento incorpora exigencias de sostenibilidad orientadas a favorecer fórmulas de prestación supramunicipal cuando resulten más eficientes.

En materia de competencias delegadas, resultan aplicables a las diputaciones las mismas reglas generales previstas para la delegación en municipios.

Las comunidades autónomas pueden delegar competencias en las diputaciones en los términos previstos en sus estatutos de autonomía, pudiendo incluso atribuirles la gestión ordinaria de servicios autonómicos, aunque esta posibilidad apenas se utiliza en la práctica por sus problemas de encaje con la autonomía local y por el desarrollo de la administración autonómica periférica.

También el Estado puede delegar competencias de mera ejecución en las diputaciones cuando el ámbito provincial sea el más adecuado para la prestación del servicio correspondiente.

5. LAS ISLAS

5.1. Los cabildos insulares

En las comunidades archipelágicas la isla constituye la agrupación natural de los municipios por razones físicas, geográficas, sociales y económicas. En Canarias, el órgano de gobierno y administración insular son los cabildos insulares, expresamente reconocidos por el artículo 141 CE y creados para superar las insuficiencias de la organización provincial en el territorio insular. El Estatuto de Autonomía de Canarias los configura no solo como entidades locales, sino también como instituciones autonómicas.

La organización territorial canaria se articula sobre las islas, cuyos cabildos, dotados de autonomía, han asumido además competencias de la administración periférica autonómica. Su regulación corresponde a una ley del Parlamento canario aprobada por mayoría absoluta, dentro del respeto a la legislación básica estatal. En lo básico, su organización se rige por la LBRL y, supletoriamente, por las normas aplicables a las diputaciones provinciales. Además, los cabildos de las islas con mayor población quedan sometidos al régimen organizativo de los municipios de gran población, con algunas excepciones, y los de menor población pueden acceder a él por decisión legislativa autonómica a iniciativa propia.

Son órganos preceptivos de gobierno el presidente, los vicepresidentes, el consejo de gobierno insular y el pleno. El pleno está integrado por el presidente y los consejeros insulares elegidos por sufragio universal y directo en votación separada de la municipal. El presidente es el candidato de la lista más votada y puede ser cesado mediante moción de censura o por no superar una cuestión de confianza vinculada a determinadas materias esenciales. Existen también comisiones del pleno y una junta de portavoces como órganos complementarios.

El consejo de gobierno insular puede integrarse por consejeros electos y por ciudadanos no electos dentro de ciertos límites, aunque la interpretación pactada con el Estado restringe el ejercicio de funciones ejecutivas y administrativas por quienes no sean electos. En la organización administrativa del cabildo se distinguen órganos superiores, vinculados a la dirección política, y órganos directivos, algunos de carácter general para todo el cabildo y otros insertos en las distintas áreas insulares, siguiendo un modelo similar al de los municipios de gran población.

Como entidades locales, los cabildos ejercen con autonomía las competencias propias equivalentes a las provinciales, adaptadas al contexto insular, centradas en la coordinación, la asistencia municipal y la prestación de servicios supramunicipales. Como instituciones autonómicas, ejercen además las competencias que les atribuye el Estatuto, la iniciativa legislativa ante el Parlamento canario, la representación ordinaria de la administración autonómica en la isla y las competencias que les transfiera la comunidad autónoma en numerosas materias sectoriales. También pueden ejercer competencias delegadas por otras administraciones en los términos generales previstos para la delegación.

5.2. Los consejos insulares

En Baleares, la comunidad autónoma se organiza territorialmente en islas y municipios, siendo los consejos insulares las instituciones de gobierno de cada isla. Su régimen se establece por la legislación autonómica en el marco de la legislación básica estatal, aplicándoseles las normas de organización y funcionamiento de las diputaciones provinciales y asumiendo tanto sus competencias como las que les atribuya el Estatuto de Autonomía.

Los consejos insulares están integrados por consejeros elegidos en cada isla mediante sufragio universal, libre, directo y secreto en urna distinta de la municipal, salvo en Formentera, donde forman parte del consejo todos los concejales electos. También pueden formar parte del consejo de gobierno miembros no electos, aunque sin derecho de voto en el pleno.

Su estructura distingue entre órganos de gobierno y órganos de administración, aproximándose en este punto al modelo de los municipios de gran población. Son órganos de gobierno el presidente, los vicepresidentes, el consejo ejecutivo y el pleno. El pleno conserva las decisiones fundamentales, como la elección del presidente, la moción de censura y la cuestión de confianza, la potestad normativa y de planificación, las funciones presupuestaria y tributaria, el control del resto de órganos de gobierno y la creación de entes públicos. También actúa a través de comisiones que pueden asumir funciones preparatorias, de seguimiento y delegadas.

El presidente y el consejo ejecutivo asumen competencias ejecutivas antes residenciadas en el pleno para reforzar la capacidad administrativa insular. El presidente concentra funciones de dirección política y administrativa, nombramiento y separación de cargos, gestión económica, jefatura superior del personal y aprobación de la estructura departamental. El consejo ejecutivo amplía sus responsabilidades en la dirección administrativa, personal, contratación, bienes públicos, expropiación y acciones judiciales.

Los órganos de administración se integran jerárquicamente en los departamentos y se distinguen en órganos superiores y directivos. Los consejeros ejecutivos son los órganos superiores al frente de cada departamento y tienen carácter político. Entre los órganos directivos destacan los secretarios técnicos y los directores insulares, cuyo nombramiento debe responder a criterios de formación, competencia profesional y experiencia. Los reglamentos orgánicos pueden atribuir carácter directivo a otros órganos, con sometimiento al régimen de provisión correspondiente.

Los consejos insulares ejercen, además de las competencias atribuidas por el legislador estatal, las que les transfiere la comunidad autónoma en las materias previstas en el Estatuto y, en determinadas materias adicionales, pueden recibir tanto transferencias como delegaciones, de modo que en ellas pueden coexistir competencias propias y delegadas. Asimismo, los municipios pueden delegarles competencias, pues los consejos, al igual que cabildos y diputaciones, desarrollan funciones de asistencia obligatoria y voluntaria a los municipios, de apoyo jurídico y técnico, de coordinación de servicios municipales y de aprobación del plan insular de cooperación.

6. OTRAS ENTIDADES LOCALES

6.1. Las áreas metropolitanas

Las áreas metropolitanas responden a la realidad de grandes conurbaciones urbanas en las que la relevancia de la ciudad principal no depende solo de su población, sino de la continuidad urbana, económica y social con municipios limítrofes. Mientras en algunos casos el crecimiento periférico se absorbe dentro de un término municipal muy extenso, en otros se proyecta sobre municipios contiguos, haciendo necesaria una respuesta organizativa supramunicipal.

Esta realidad fue abordada primero desde la planificación urbanística conjunta y después mediante intentos de regulación general de entidades metropolitanas, que no llegaron a consolidarse. En la actualidad, la LBRL se limita a reconocer las áreas metropolitanas como entidades locales y remite a las comunidades autónomas tanto su regulación de desarrollo como su creación.

Según el artículo 43 LBRL, las áreas metropolitanas están integradas por municipios pertenecientes a grandes aglomeraciones urbanas vinculados económica y socialmente, cuando esa vinculación exige planificación conjunta o coordinación en la prestación de servicios. La legislación autonómica debe regular sus órganos de gobierno y administración, en los que han de estar representados todos los municipios integrados, así como su régimen económico y de funcionamiento, garantizando tanto la participación municipal como un reparto equitativo de cargas.

La creación de las áreas metropolitanas corresponde a una ley autonómica, previa audiencia de la Administración del Estado y de los municipios afectados, aunque no se exige su consentimiento.

Algunos estatutos de autonomía contemplan expresamente esta figura o permiten indirectamente crear agrupaciones funcionales de municipios, mientras que en otros no aparece mencionada, sin que ello impida acudir a otras formas asociativas supramunicipales.

6.2. Las mancomunidades

Las mancomunidades son entidades locales constituidas por la asociación de varios municipios para prestar conjuntamente servicios o realizar obras de competencia municipal. Su finalidad coincide con la lógica de cooperación supramunicipal, aunque no exige la existencia de una gran aglomeración urbana y puede incluir municipios de distintas comunidades autónomas si la legislación autonómica no lo impide.

Como entidades locales, pueden ejercer las potestades públicas que les reconozca la ley y sus estatutos, incluidas potestades reglamentarias, de autoorganización, tributarias, expropiatorias, de ejecución forzosa o de revisión de oficio. Su creación exige acuerdo de los plenos de los municipios implicados por mayoría absoluta del número legal de miembros, mayoría que también se requiere para aprobar o modificar los estatutos, incorporarse a una mancomunidad existente, separarse de ella o acordar su disolución.

La mancomunidad tiene personalidad jurídica propia para el cumplimiento de sus fines y se rige por sus estatutos, que deben establecer órganos de gobierno representativos de los municipios asociados, así como su ámbito territorial, objeto, competencias, recursos económicos y duración.

La elaboración y aprobación de los estatutos exige acuerdo conjunto inicial de todos los concejales de los municipios implicados, informe de la diputación o diputaciones afectadas y aprobación posterior por todos los plenos municipales. Al ser entidades territoriales sujetas al derecho administrativo, cuentan con personal propio sometido a la legislación de función pública y deben disponer de órganos de secretaría, asesoramiento jurídico, control y fiscalización desempeñados por funcionarios locales con habilitación nacional.

7. LA ADMINISTRACIÓN INSTITUCIONAL DE LAS ENTIDADES LOCALES

El artículo 85.2 LBRL incluye entre las formas de gestión directa de los servicios públicos locales las realizadas mediante entidades instrumentales de la entidad local, concretamente el organismo autónomo, la entidad pública empresarial y la sociedad mercantil de capital íntegramente público.

Tras la reforma de 2013, la disposición adicional novena de la LBRL limita la creación de nuevas entidades del sector público local cuando la entidad local esté sometida a un plan económicofinanciero o de ajuste por incumplimiento de estabilidad presupuestaria, prohibiéndose durante su vigencia tanto la constitución de nuevas entidades como determinadas aportaciones patrimoniales o ampliaciones de capital.

Aunque el artículo 85.2 LBRL enumera expresamente determinadas formas de gestión instrumental, también pueden existir otras entidades instrumentales. Entre ellas destaca el consorcio, cuya consideración como entidad instrumental ha sido afirmada por la jurisprudencia del Tribunal Supremo salvo atribución autonómica expresa de naturaleza local. Se diferencia de la mancomunidad en que esta última agrupa exclusivamente municipios para prestar servicios de competencia municipal, mientras que el consorcio se crea para gestionar servicios de interés común de varias administraciones en ámbitos de competencias concurrentes.

El consorcio es una entidad de derecho público con personalidad jurídica propia regulada como instrumento de cooperación interadministrativa, no como forma de gestión directa de servicios públicos. Su creación solo es admisible cuando mejore la eficiencia de la gestión pública, elimine duplicidades y respete la estabilidad presupuestaria, de modo que no puede constituirse si basta un convenio de colaboración ni cuando comprometa la sostenibilidad financiera de las entidades participantes.

También pueden existir fundaciones locales, pese a no figurar expresamente entre las entidades instrumentales del artículo 85.2 LBRL, entendiéndose admitida su constitución cuando la entidad local realice aportación mayoritaria o el patrimonio fundacional esté integrado mayoritariamente por bienes o derechos aportados por entidades locales.

Asimismo, la ausencia de referencia a las sociedades mercantiles de capital mayoritariamente público no impide su constitución, pero al existir participación privada no pueden actuar como medio directo de gestión de servicios municipales sin previa licitación y adjudicación contractual.

El régimen jurídico de los organismos autónomos y entidades públicas empresariales queda parcialmente remitido a la normativa autonómica y, en defecto de esta, supletoriamente a la LRJSP en lo no previsto por la LBRL. Su creación corresponde al pleno de la entidad local, que aprueba también sus estatutos, quedando adscritos a una concejalía o, en el caso de la entidad pública empresarial, eventualmente a un organismo autónomo.

Los titulares de sus órganos directivos deben reunir cualificación profesional reforzada, exigiéndose que sean empleados públicos o profesionales titulados superiores con experiencia suficiente. Ambos organismos se estructuran en torno a órganos colegiados de gobierno y quedan sometidos al control de eficacia, control de gasto de personal y supervisión de recursos humanos por parte de la entidad de adscripción.

Las sociedades mercantiles de capital íntegramente público se rigen con carácter general por el derecho privado, salvo en materia presupuestaria, contable, de control financiero, de eficacia y de contratación pública, quedando sometidas en estos ámbitos a la normativa administrativa correspondiente. Deben adoptar alguna de las formas previstas en la legislación de sociedades de capital y en su escritura de constitución ha de constar la aportación de capital realizada por la entidad local titular.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
    
    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

      const full = String(PDF_TEXTO);

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
