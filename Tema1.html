const PDF_TEXTO = `
1. CONCEPTO

1.1. Introducción

El concepto de Derecho administrativo presenta mayores dificultades que en otras ramas del Derecho debido a la delimitación de su objeto frente a otras disciplinas jurídicas. Estas dificultades se intensifican cuando se pretende definirlo a partir de un criterio único, ya que el Derecho administrativo puede manifestarse, según el ámbito o el momento histórico, como un Derecho exorbitante, garantista o instrumental.

La determinación de un criterio definitorio único no constituye un imperativo científico y, en relación con el Derecho administrativo, resulta inalcanzable. La búsqueda de ese criterio suele apoyarse en un apriorismo, consistente en concebir previamente la Administración pública bien como sujeto, bien como forma de actividad.

Estas dificultades han dado lugar a distintas posiciones doctrinales: la renuncia a definir el Derecho administrativo, la combinación de varios criterios, o el rechazo de concepciones totalizadoras. Esta última postura es considerada la más adecuada, pues la experiencia demuestra que el criterio definitorio no puede ser único ni inmutable.

La Administración pública es una realidad plural, compleja y dinámica, lo que impide una definición universal válida para cualquier momento histórico y para cualquier modalidad de Administración. En consecuencia, tampoco existe una definición universal del Derecho administrativo.

El Derecho administrativo no se identifica con todo el Derecho aplicable a la Administración pública. Quedan fuera de su ámbito tanto el Derecho privado y laboral, cuando la Administración actúa conforme a estos, como el Derecho constitucional, especialmente relevante para el Gobierno como órgano constitucional. Asimismo, determinadas ramas del Derecho público, como el Derecho financiero y tributario y el Derecho de la Seguridad Social, se han independizado del Derecho administrativo al adquirir autonomía funcional.

1.2. La concepción estatutaria y su crisis

La concepción estatutaria del Derecho administrativo parte de una perspectiva subjetiva, según la cual la Administración pública es ante todo un sujeto jurídico, y no una función o una actividad. En consecuencia, el Derecho administrativo se concibe como el conjunto de normas aplicables al sujeto denominado Administración pública, entendido como Derecho general y común a todas las Administraciones públicas.

Esta concepción implica que la condición de Administración pública constituye el presupuesto necesario para la aplicación del Derecho administrativo, dando lugar a un régimen jurídico particular o estatutario, de forma similar a cómo el Derecho mercantil o laboral regulaban originariamente estatutos profesionales específicos. Esta es la concepción clásica defendida, entre otros, por García de Enterría.

La principal ventaja de la concepción estatutaria reside en su simplicidad, pero esa misma simplicidad constituye su principal debilidad, ya que incurre en un círculo vicioso: para saber qué sujetos son Administración pública es necesario acudir previamente al Derecho administrativo.

Además, la perspectiva subjetiva no explica qué es materialmente la Administración pública, pues se limita a un rasgo formal —la personalidad jurídica— e ignora elementos esenciales como los fines perseguidos (interés general), la actividad desarrollada, y los poderes especiales o potestades administrativas, que en la realidad aparecen inseparablemente vinculados.

La concepción estatutaria también desconoce los datos del Derecho positivo, en particular las fracturas introducidas por el legislador a partir de 1992, que han provocado que el Derecho administrativo se aplique también a órganos situados fuera de la Administración pública, tanto dentro como fuera del poder ejecutivo.

Estos desajustes se agravan por diversos fenómenos: – la actuación de las Administraciones públicas conforme al Derecho privado, – la huida de la Administración hacia el Derecho privado por su mayor flexibilidad y menor control, – y la transferencia de funciones públicas a sujetos privados, que quedan sometidos al Derecho administrativo cuando ejercen funciones públicas, pese a no integrarse en la Administración pública.

Situaciones similares se producen respecto de las corporaciones de Derecho público (colegios profesionales, cámaras de comercio) y otras entidades de Derecho público (universidades públicas), que ejercen funciones públicas y potestades administrativas, pero no encajan en el concepto formal de Administración pública.

Tras la Constitución, el legislador ha provocado fracturas decisivas en los presupuestos de la concepción estatutaria mediante dos procesos: a) Contracción del concepto de Administración pública: Se produce la diferenciación entre Gobierno y Administración, culminada con la LRJSP, de modo que el Gobierno deja de integrarse formalmente en la Administración. Los ministros actúan como bisagra entre ambos, pero el ámbito de aplicación del Derecho administrativo no se reduce, obligando a recurrir a criterios distintos del subjetivo. b) Expansión del ámbito de aplicación del Derecho administrativo fuera del poder ejecutivo: Por decisión legislativa, determinadas actividades administrativas de órganos constitucionales o de relevancia constitucional quedan sometidas al Derecho administrativo y al control contencioso-administrativo, aunque solo respecto a la gestión de su patrimonio y personal, lo que confirma la insuficiencia de la concepción estatutaria.

1.3. La consolidación de los criterios materiales y funcionales

Las perspectivas material y funcional del Derecho administrativo atienden a la actividad administrativa en sí misma, con independencia del sujeto que la realice. Definen el fenómeno jurídico-administrativo de forma autónoma dentro de las funciones del Estado, sin reparar en quién sea su autor. Tradicionalmente, estas perspectivas quedaron en segundo plano por la dificultad de formular una definición abstracta y satisfactoria de la actividad administrativa como materia, lo que favoreció la prevalencia de la concepción estatutaria por su simplicidad.

A partir de los años noventa del siglo XX, el Derecho positivo comienza a recurrir de forma sistemática a criterios funcionales para determinar el sometimiento al Derecho administrativo.

Este sometimiento deja de recaer exclusivamente sobre la Administración pública e incluye: a) corporaciones de Derecho público que ya no se consideran formalmente Administración pública; b) sujetos privados, tanto particulares como entidades de Derecho privado creadas o controladas instrumentalmente por las Administraciones públicas; c) autoridades y órganos constitucionales, situados dentro o fuera del poder ejecutivo, que nunca fueron o dejaron de ser Administración pública.

El Derecho positivo define actualmente como administraciones públicas a la Administración General del Estado, las administraciones autonómicas, las entidades que integran la administración local y los organismos públicos y entidades de Derecho público vinculados o dependientes de ellas. Sin embargo, la mera condición subjetiva de Administración pública no basta para afirmar que su actividad esté sujeta al Derecho administrativo, pues la legislación recurre frecuentemente a la noción de “actos sujetos al Derecho administrativo” para delimitar su ámbito de aplicación.

Fuera del ámbito de las administraciones públicas, el legislador emplea criterios funcionales adicionales. Así, la LPAC y la LRJSP incluyen en su ámbito de aplicación a las universidades públicas, pese a excluirlas del concepto formal de Administración pública. Asimismo, se someten al Derecho administrativo las entidades de Derecho privado vinculadas o dependientes de las Administraciones públicas cuando la norma se refiera expresamente a ellas y, en todo caso, cuando ejerzan potestades administrativas, criterio funcional central de adscripción.

Un supuesto específico lo constituyen los concesionarios de servicios públicos, que quedan sometidos al Derecho administrativo y a la jurisdicción contencioso-administrativa cuando dictan actos que impliquen el ejercicio de potestades administrativas conferidas, utilizándose aquí un criterio funcional para delimitar la competencia jurisdiccional.

En una posición distinta se sitúan las corporaciones de Derecho público, que no son Administraciones públicas ni sector público institucional. No obstante, cuando ejercen funciones públicas atribuidas por ley o delegadas, se someten a su normativa específica y supletoriamente a la LPAC, y sus actos adoptados en el ejercicio de funciones públicas quedan sujetos al control de la jurisdicción contencioso-administrativa.

Las Cámaras Oficiales de Comercio, Industria, Servicios y Navegación constituyen una modalidad de corporación de Derecho público: actúan como órganos consultivos y de colaboración con las Administraciones públicas y ejercen funciones público-administrativas concretas, rigiéndose por su normativa específica, aplicándose supletoriamente la legislación administrativa general y sometiendo su contratación y régimen patrimonial al Derecho privado, con exigencias de publicidad, transparencia y no discriminación.

La Ley reguladora de la jurisdicción contencioso-administrativa (LJCA) es el ámbito donde mejor se aprecia la combinación de criterios subjetivos, materiales y funcionales. Atribuye a dicho orden jurisdiccional: – las controversias relativas a la actuación de las administraciones públicas cuando esté sujeta al Derecho administrativo; – determinadas actuaciones materialmente administrativas de órganos constitucionales no integrados en la Administración pública, especialmente en materia de personal, administración y gestión patrimonial; – los actos de corporaciones de Derecho público y de concesionarios de servicios públicos cuando impliquen ejercicio de funciones o potestades administrativas.

Finalmente, la delimitación entre el orden contencioso-administrativo y el orden social muestra la complejidad del criterio material. En materia de Seguridad Social, el orden social conoce de las prestaciones y materias conexas, mientras que el contencioso-administrativo conoce de sanciones, liquidaciones de cuotas y controles administrativos. En cambio, las cuestiones de asistencia y protección social públicas corresponden al orden contenciosoadministrativo, aunque el legislador puede ampliar o reducir el ámbito de cada jurisdicción mediante decisiones normativas expresas.

1.4. El Derecho administrativo como objeto de regulación

Dentro del Derecho administrativo se distingue entre parte general y parte especial.

La parte general tiene por función fijar los principios y estructuras generales y transversales aplicables a todos o a muchos sectores de la actividad administrativa, mientras que la parte especial está integrada por las regulaciones de los sectores concretos de actuación administrativa (urbanismo, medio ambiente, educación, sanidad, telecomunicaciones, servicios sociales, etc.).

La función de la parte general es limitada pero esencial. No puede regular exhaustivamente los sectores materiales, pero cumple una doble finalidad: – facilitar la aplicación del Derecho, descargando a legisladores sectoriales y operadores jurídicos de resolver problemas repetidos; – garantizar un nivel mínimo común de protección a los ciudadanos en todos los sectores de actividad administrativa, con independencia de la Administración actuante.

Esta función conecta con el mandato constitucional de garantizar a los administrados un tratamiento común ante las Administraciones públicas al regularse las bases del régimen jurídico administrativo.

La parte general no tiene existencia autónoma. Las Administraciones no aplican directamente categorías abstractas (acto administrativo, invalidez, contrato administrativo, infracción administrativa), sino normas sectoriales relativas a la materia o institución concreta. No obstante, la parte general enmarca, complementa y sistematiza la aplicación de esas normas, cubriendo lagunas y proporcionando soluciones a problemas recurrentes, especialmente en materia procedimental, de eficacia, ejecución, notificación o revisión de actos. Sin estos marcos generales, el Derecho administrativo se fragmentaría en regulaciones parciales y casuísticas.

En el ámbito universitario, el estudio de la parte general se limita a la familiarización con sus categorías básicas, distribuidas en varias asignaturas. En la UNED, la parte general se aborda a través de las asignaturas relativas al sistema de fuentes y organización administrativa, al régimen jurídico de la actuación administrativa y a los contratos, medios y responsabilidad patrimonial, mientras que materias como urbanismo y medio ambiente corresponden a la parte especial.

La elaboración de la parte general es una tarea colectiva, en la que concurren distintos actores y métodos. Desde un punto de vista científico, se construye mediante dos procesos complementarios: – la inducción, a partir de las regulaciones sectoriales; – la deducción, desde los principios generales.

Ambos procesos operan mediante la abstracción, siendo característicos de la doctrina científica y de la jurisprudencia. Cuando estas reglas abstractas reciben respaldo legislativo o jurisprudencial, pasan a integrarse en el Derecho positivo o en el Derecho de creación jurisprudencial.

El legislador no queda vinculado a estos procesos científicos de elaboración gradual. Puede intervenir directamente en la parte general, incorporando nuevas reglas o modificando las existentes por razones de interés general, desde una perspectiva esencialmente política, propia del procedimiento democrático. Cuando la modificación afecta a la parte general, sus efectos se proyectan sobre la totalidad de las regulaciones sectoriales.

A diferencia de otras ramas del Derecho, la parte general del Derecho administrativo no se recoge en un código único. En su lugar, se articula a través de un conjunto de leyes vertebradoras, entre las que destacan, por su carácter transversal, la LPAC y la LRJSP, ambas de 2015, aplicables a la organización, funcionamiento y procedimiento administrativo de todas las Administraciones públicas y del sector público institucional. Junto a ellas, otras leyes estatales cumplen funciones vertebradoras relevantes, vinculando ampliamente a las comunidades autónomas.

2. BASES

Tras la Segunda Guerra Mundial se produce en Europa la superación del Estado liberal de Derecho. En la segunda mitad del siglo XX, el Derecho público europeo se ve transformado por dos fenómenos principales: la recuperación del valor de la Constitución y el proceso de integración europea.

Ambos fenómenos modifican la forma de concebir y ordenar el sistema jurídico, al introducir nuevas categorías y fuentes de Derecho y obligar a reestructurar el Derecho administrativo.

Como consecuencia, el centro de gravedad del Derecho administrativo deja de situarse en la ley y pasa a ubicarse en la Constitución y en el Derecho de la Unión Europea.

2.1. Bases constitucionales

La recuperación del valor normativo de la Constitución obliga a revisar principios clásicos del Derecho público surgidos desde 1789, como la identificación entre ley y voluntad general, la soberanía del Parlamento y la primacía absoluta de la ley.

El modelo vigente deja de ser el Estado liberal de Derecho, de carácter esencialmente legalista, y pasa a ser el Estado constitucional de Derecho, caracterizado por la proclamación de valores superiores, el reconocimiento de derechos individuales inalienables, la limitación del legislador y la existencia de una jurisdicción constitucional encargada de controlar esa limitación.

Como consecuencia, la Constitución reduce el protagonismo tradicional del principio de legalidad en la ordenación del Derecho público.

2.1.1. La relación entre Derecho constitucional y Derecho administrativo

El Derecho administrativo forma parte del Derecho público, pero ya no es el único Derecho relevante para la Administración, pues el Derecho constitucional adquiere una importancia equivalente. La relación entre ambos es tan estrecha que se ha afirmado que el Derecho administrativo es “Derecho constitucional concretizado”, subrayando su dependencia estructural de la Constitución.

Esta concepción se opone a la tesis clásica según la cual el Derecho administrativo sería inmune a los cambios políticos, frente al carácter cambiante del Derecho constitucional. El modelo constitucional vigente desmiente esa separación, al proyectar la Constitución una influencia profunda sobre el Derecho administrativo.

Las normas administrativas deben desarrollar y concretar principios y disposiciones constitucionales caracterizados por su alto grado de abstracción. No obstante, la Constitución no constituye un sistema normativo completo, sino una ordenación marco, que no predetermina todas las decisiones posibles ni convierte al legislador en mero ejecutor constitucional.

El legislador dispone de amplios márgenes de decisión y configuración, dentro del marco constitucional, y adopta opciones políticas libres, siempre que no contradiga la Constitución.

Esta ordenación marco no es solo formal, sino también material, pues incluye normas que fijan objetivos y límites sustantivos, en particular los derechos fundamentales, que restringen o excluyen determinadas opciones legislativas.

La Constitución es compatible con una pluralidad de regulaciones legislativas en distintos ámbitos materiales, incluso cuando afectan a derechos fundamentales, ya que, por regla general, no impone soluciones únicas, sino el deber de no contradicción con el texto constitucional.

2.1.2. La influencia de la Constitución sobre el Derecho administrativo

La Constitución ocupa una posición superior y central en el ordenamiento jurídico, de modo que todo el Derecho debe interpretarse y construirse a partir de ella. En el contexto español, este proceso se inicia en 1978, con retraso respecto de otros Estados europeos donde comenzó tras 1945, lo que ha permitido apreciar directamente su impacto sobre el sistema jurídico.

La influencia constitucional no es un proceso cerrado, ya que la Constitución es susceptible de nuevas interpretaciones y de nuevos desarrollos legislativos.

Dicha influencia sobre el Derecho administrativo puede analizarse de dos maneras: – mediante el estudio de los valores y principios constitucionales, o – a través de los cambios y transformaciones producidos en las cuestiones centrales del Derecho administrativo.

En este apartado se identifican como bases constitucionales del Derecho administrativo los siguientes principios: el principio de separación de funciones, el principio democrático, el principio de Estado de Derecho, el principio de Estado social y el principio de autonomía de las nacionalidades y regiones.

2.1.2.1. El principio de separación de funciones

El principio de separación de funciones es consustancial al Estado social y democrático de Derecho y constituye un principio político y jurídico estructural de los Estados democráticos.

Aunque la Constitución de 1978 no lo enuncia expresamente, lo articula mediante la atribución diferenciada de funciones: la potestad legislativa a las Cortes Generales, la función ejecutiva y la potestad reglamentaria al Gobierno, y la potestad jurisdiccional a los Juzgados y Tribunales.

La Constitución añade el control judicial de la potestad reglamentaria y de la legalidad de la actuación administrativa, así como del sometimiento de ésta a los fines que la justifican. Este control no habilita a los órganos judiciales para autorizar previamente el ejercicio de potestades propias del Poder Ejecutivo.

La atribución legal a los órganos judiciales de funciones ajenas a su cometido constitucional, como la autorización previa de disposiciones reglamentarias, quiebra el principio de separación de poderes, al menoscabar la potestad reglamentaria, que la Constitución atribuye al Poder Ejecutivo de forma exclusiva y excluyente. No cabe convertirla en una potestad compartida con el Poder Judicial ni condicionarla a autorización judicial para su eficacia.

2.1.2.2. El principio democrático

El principio democrático exige la legitimación democrática de la Administración pública, en cuanto los poderes del Estado emanan del pueblo. Dicha legitimación se articula de manera diferenciada según el tipo de poder: es más intensa en los poderes de carácter político (legislativo y ejecutivo) y menor en los poderes de control jurídico, como el judicial.

La legitimación democrática del poder legislativo es directa, mediante la elección de las Cortes Generales, que representan al pueblo y ejercen la potestad legislativa. La legitimación del poder ejecutivo es también directa, aunque de segundo grado, ya que la designación del presidente del Gobierno depende de los resultados electorales y de la composición del Parlamento. Además, el Parlamento controla políticamente al Gobierno, pudiendo exigirle responsabilidad y provocar su sustitución.

La cadena de legitimación democrática se extiende hasta la Administración pública, que actúa bajo la dirección del Gobierno, de modo que su actuación queda vinculada a los objetivos fijados por las leyes y el ordenamiento jurídico. En el ámbito estatal, esa subordinación se garantiza a través de los ministros y secretarios de Estado, responsables de ejecutar la acción del Gobierno.

El ejercicio de funciones públicas no puede atribuirse a entidades u órganos carentes de legitimidad democrática suficiente. El grado de legitimación exigible debe ser proporcional al poder de decisión atribuido. En el sector público institucional, dicha legitimación se asegura mediante poderes de control de las Administraciones de las que depende, incluida la tutela sobre sociedades mercantiles públicas.

Las administraciones independientes plantean un problema específico de legitimación democrática. Su legitimidad deriva, en primer lugar, de su creación legal, y en segundo término, de los mecanismos de nombramiento de sus órganos directivos por poderes democráticos, garantizándose su independencia mediante la inamovilidad temporal.

El principio democrático también permite formas de participación ciudadana directa, como el referéndum consultivo y la audiencia de los ciudadanos en los procedimientos de elaboración normativa, dentro de los límites y requisitos establecidos por la Constitución y la ley.

Junto a las administraciones burocráticas, existen formas de autoadministración, en las que los propios interesados se agrupan obligatoriamente en corporaciones para gestionar intereses específicos y ejercer funciones públicas. Las corporaciones territoriales (municipios y provincias) presentan una legitimidad plenamente democrática, mientras que las corporaciones no territoriales carecen de legitimación democrática directa, aunque pueden ser constitucionalmente admisibles si responden a un interés general, mantienen una estructura democrática interna y están sometidas a tutela administrativa.

2.1.2.3. El principio de autonomía

El principio democrático se proyecta en varios niveles de decisión —estatal, autonómico y local— y mantiene una relación de continuidad con el principio de autonomía. La capacidad para decidir políticamente fines y orientar la regulación constituye a la vez una manifestación de la autonomía política y del principio democrático, reconociéndose al legislador autonómico un margen de configuración para adoptar opciones políticas legítimas.

El principio de autonomía y el modelo de Estado autonómico tienen consecuencias directas en el Derecho administrativo. Dos poderes del Estado —el legislativo y el ejecutivo— se reparten entre el Estado y las comunidades autónomas, conforme a los Estatutos de Autonomía, con posibilidad de modulación estatal mediante los instrumentos del art. 150 CE.

La distribución constitucional de competencias condiciona la configuración del Derecho administrativo, a diferencia de otras ramas con competencia estatal exclusiva. Esta diferencia se explica mediante la distinción entre parte general y parte especial del Derecho administrativo.

La parte general corresponde principalmente al legislador estatal, en virtud del art. 149.1.18 CE, que le atribuye la regulación exclusiva del procedimiento administrativo común, la expropiación forzosa y la responsabilidad de las Administraciones, así como la legislación básica sobre régimen jurídico administrativo, función pública y contratos y concesiones. Las comunidades autónomas pueden desarrollar estas bases.

La parte especial presenta una distribución competencial más amplia. El Estado conserva competencias exclusivas o de legislación básica en múltiples materias, mientras que las comunidades autónomas desarrollan las bases estatales y ejercen competencias exclusivas en ámbitos propios. En las materias compartidas se combinan la legislación básica estatal y la legislación autonómica de desarrollo.

En la práctica, las competencias estatales predominan, debido a la escasa holgura que suele dejar la legislación básica y al uso de títulos transversales que condicionan competencias autonómicas (arts. 149.1.1 y 13 CE).

Con carácter general, la ejecución de la legislación corresponde a las comunidades autónomas, incluyendo facultades reglamentarias, aplicativas y de gestión. Existen excepciones estatales, justificadas por efectos supraterritoriales o por la relevancia política de determinadas decisiones, atribuyéndose en ocasiones carácter básico a actos singulares de ejecución.

Las controversias competenciales entre el Estado y las comunidades autónomas se plantean con frecuencia ante el Tribunal Constitucional.

2.1.2.4. El principio de Estado de Derecho

El principio de Estado de Derecho ha sido decisivo en la conformación del Derecho administrativo y no se reduce a una concepción formal o legalista. Para legitimar la actuación administrativa no basta cualquier norma o ley, aunque emane de órgano competente, pues el Estado de Derecho constitucional tiene un contenido material.

Ese contenido material se concreta en la proclamación de valores superiores (libertad, justicia, igualdad y pluralismo político) y en la centralidad de la dignidad de la persona, los derechos inviolables, el libre desarrollo de la personalidad y el respeto a la ley y a los derechos de los demás.

En el ámbito del Derecho administrativo, el principio de Estado de Derecho se articula en tres componentes básicos: – el principio de legalidad; – la vinculación a los derechos fundamentales; – el derecho a la tutela judicial efectiva.

A ello se añaden otras consecuencias constitucionales: jerarquía normativa, publicidad de las normas, irretroactividad sancionadora desfavorable, seguridad jurídica, responsabilidad de los poderes públicos e interdicción de la arbitrariedad.

La responsabilidad patrimonial de la Administración encuentra su fundamento constitucional en el derecho a la indemnización por lesiones derivadas del funcionamiento de los servicios públicos, salvo fuerza mayor.

El Tribunal Constitucional ha deducido otros principios del Estado de Derecho, como el principio de proporcionalidad y el principio de non bis in idem.

La Constitución ha incidido de forma relevante en la revisión de los privilegios de la Administración. La posición prevalente o supremacía jurídica de la Administración solo es constitucionalmente admisible cuando esté justificada por el interés general, sea necesaria y proporcionada, conciliándose con el principio de igualdad.

Finalmente, la Constitución contiene mandatos directos sobre la Administración y su actividad, destacando el servicio objetivo al interés general, los principios de eficacia y sometimiento pleno a la ley y al Derecho, la eficiencia del gasto público, el mérito y la capacidad en la función pública, las garantías de imparcialidad, los procedimientos administrativos, el acceso a archivos y registros y el control judicial de la Administración.

2.1.2.5. El principio de Estado social

El principio de Estado social no se limita a la lucha contra la vulnerabilidad o a la prestación de servicios asistenciales, sino que se concreta en múltiples disposiciones constitucionales. Los derechos fundamentales de contenido económico se vinculan a funciones e intereses sociales, subordinando su ejercicio al interés general.

Así, la propiedad privada y la herencia quedan sometidas a su función social; la libertad de empresa se condiciona a las exigencias de la economía general y, en su caso, a la planificación; y se reconoce la negociación y la acción colectivas. La Constitución proclama que toda la riqueza del país se subordina al interés general, cualquiera que sea su titularidad.

El Estado social se manifiesta también en los principios de la política social y económica, dirigidos a todos los poderes públicos, que definen áreas de actuación, objetivos y potestades. Estos principios informan la legislación, la práctica judicial y la actuación administrativa, aunque solo pueden alegarse ante la jurisdicción ordinaria en los términos previstos por las leyes que los desarrollen. Corresponde al legislador competente su concreción normativa y a la Administración la ejecución de las leyes de desarrollo.

Finalmente, los poderes públicos deben promover condiciones reales y efectivas de libertad e igualdad, remover los obstáculos que las dificulten y facilitar la participación de los ciudadanos en la vida política, económica, cultural y social, mandato que vincula especialmente a las Administraciones públicas en el ejercicio de sus competencias.

2.2. Bases europeas

El Estado contemporáneo deja de concebirse como plenamente soberano e introvertido y pasa a ser un Estado abierto al Derecho internacional, cooperativo con otros Estados y, en determinados casos, integrado en organizaciones supranacionales.

Este modelo se manifiesta de forma singular en la Unión Europea, que se aparta de los esquemas clásicos de las organizaciones internacionales. Su finalidad no es solo la cooperación, sino la integración, entendida como un proceso de unión cada vez más estrecha entre los pueblos de Europa.

La integración europea no se limita al ámbito económico ni al mercado interior y a las libertades económicas transfronterizas, sino que persigue también la creación de un espacio de libertad, seguridad y justicia sin fronteras interiores, así como la cohesión económica, social y territorial y la solidaridad entre los Estados miembros.

2.2.1. La incidencia general en el ordenamiento interno

El Derecho de la Unión Europea se diferencia del Derecho internacional clásico por disponer de un sistema propio de producción jurídica y por penetrar directamente en los ordenamientos de los Estados miembros. Se caracteriza por el principio de efecto directo, que permite su aplicación sin actos internos de incorporación, y por el principio de primacía, que desplaza las normas internas incompatibles.

Una vez realizada la cesión de competencias a la Unión a través del art. 93 CE, los presupuestos de validez y aplicabilidad del Derecho de la Unión quedan fuera del ordenamiento español y fuera del control de las instituciones estatales, sin que el Tribunal Constitucional ni los órganos judiciales españoles puedan controlar la validez de los actos de las instituciones de la Unión.

El Derecho de la Unión transforma la distribución interna de funciones y competencias. La cesión competencial reduce las competencias de todos los poderes del Estado, si bien el Gobierno resulta fortalecido por su papel decisivo en la dirección y en los procedimientos legislativos europeos, a diferencia del poder legislativo y de los poderes territoriales, que no obtienen compensaciones relevantes.

En materia de control normativo, los jueces nacionales deben inaplicar cualquier norma interna incompatible con el Derecho de la Unión, incluso de rango legal, conforme a la doctrina del Tribunal de Justicia de la Unión Europea (doctrina Simmenthal). En consecuencia, una ley puede ser controlada por el Tribunal Constitucional en términos de constitucionalidad y por cualquier órgano judicial en términos de compatibilidad con el Derecho de la Unión, lo que erosiona el control concentrado de constitucionalidad y sitúa a todos los jueces en plano de igualdad para el control de europeidad.

2.2.2. La influencia sobre el Derecho administrativo

Desde sus inicios, el Derecho de la Unión Europea ha tenido una incidencia decisiva sobre el Derecho administrativo, al afectar directamente a regulaciones, controles y potestades administrativas mediante la realización del mercado interior, las libertades económicas fundamentales, el régimen aduanero uniforme y diversas políticas comunes. Posteriormente, se ha extendido a regulaciones materiales en ámbitos como medio ambiente, contratación pública o protección de datos, convirtiéndose en un motor de modernización e innovación.

La expansión e intensificación de esta influencia es continua por varias razones concurrentes: – la integración europea carece de un final predeterminado y admite una unión cada vez más estrecha; – las competencias transferidas, aunque tasadas, se interpretan teleológicamente por el Tribunal de Justicia de la Unión Europea y se amplían con las reformas de los Tratados, junto a sus instrumentos y objetivos; – las crisis periódicas revelan debilidades y propician nuevos avances de integración.

La europeización del Derecho administrativo puede analizarse desde dos perspectivas estructurales: los procesos de instrumentalización y los procesos de reorientación.

2.2.2.1. Procesos de instrumentalización

Los procesos de instrumentalización derivan de la incorporación del Derecho de la Unión al sistema de fuentes y de la obligación de ejecución que recae sobre las Administraciones públicas de los Estados miembros, cada una en su ámbito competencial.

La ejecución del Derecho de la Unión se realiza, por regla general, a través de los instrumentos internos: normas, actos administrativos, procedimientos y vías de recurso, que se utilizan al servicio de la efectividad del Derecho de la Unión. Cuando una disposición europea fija el criterio material aplicable, corresponde a los Estados miembros ejecutarlo y sancionar sus infracciones conforme a sus procedimientos administrativos y judiciales internos, salvo que el Derecho de la Unión establezca un procedimiento específico.

Esta utilización funcional del Derecho interno implica que reglas procedimentales o principios internos no pueden obstaculizar la ejecución del Derecho de la Unión, debiendo ceder cuando sea necesario para garantizar su efectividad y unidad. En este sentido, los procedimientos internos se instrumentalizan en favor del Derecho de la Unión.

La regla general que rige este esquema es el principio de autonomía institucional, procedimental y procesal de los Estados miembros. No obstante, dicha autonomía está condicionada por el principio de efectividad, que se articula en dos exigencias: – el principio de equivalencia, según el cual las normas europeas deben ejecutarse con procedimientos análogos a los aplicables a las normas internas; – el principio de efectividad, que impide aplicar reglas internas que hagan imposible o excesivamente difícil la ejecución del Derecho de la Unión.

Si una norma interna incumple alguna de estas condiciones, queda desplazada en el ámbito de aplicación del Derecho de la Unión. Este sistema permite asegurar la uniformidad del Derecho de la Unión respetando la diversidad de tradiciones administrativas nacionales.

Desde el punto de vista cuantitativo, los procesos de instrumentalización son predominantes, pues la ejecución del Derecho de la Unión corresponde habitualmente a las autoridades internas, siendo excepcional la ejecución directa por instituciones europeas. Esta ejecución no altera el reparto constitucional de competencias, aunque en la práctica la Administración General del Estado suele centralizar determinadas obligaciones de información.

Finalmente, la europeización introduce tensiones en el principio de legalidad administrativa, al imponer a las Administraciones una lealtad dual al Derecho interno y al Derecho de la Unión, complejizando la selección de la norma aplicable y su interpretación.

2.2.2.2. Procesos de reorientación

Los procesos de reorientación aluden a cambios sustantivos inducidos por el Derecho de la Unión en el Derecho administrativo especial, que acaban proyectándose de forma paulatina sobre las reglas y categorías de la parte general.

Un ejemplo paradigmático es la contratación pública. La justificación tradicional de una normativa específica se basaba en el refuerzo de las prerrogativas administrativas para garantizar el interés público. El Derecho de la Unión impone un cambio de enfoque, priorizando la transparencia, la objetividad y la no discriminación en la preparación y adjudicación, con el fin de asegurar el mercado interior y la libre competencia.

El Derecho de la Unión no pretende instaurar un Derecho público de la contratación ni resolver la dicotomía público/privado, y es compatible con la diversidad de legislaciones nacionales. No impide la existencia de prerrogativas administrativas en la fase de ejecución, pero exige que en la fase previa se garanticen la transparencia y la competencia.

La influencia europea tiende a expandirse más allá de ámbitos, tipos contractuales o umbrales inicialmente delimitados. Los conceptos y categorías europeas repercuten en la sistematización del conjunto de la regulación, dificultando la coexistencia duradera de cuerpos normativos europeizados y no europeizados y promoviendo la uniformidad normativa.

Procesos análogos se observan en otros ámbitos: la intervención del Estado en la economía (prohibición de discriminaciones y privilegios), el desplazamiento de controles preventivos hacia controles ex post en actividades de servicios, el fomento de instrumentos cooperativos frente a los imperativos, el refuerzo del procedimiento administrativo como institución autónoma y la reserva de funciones decisorias a autoridades administrativas independientes.

3. EL DERECHO PRIVADO Y LA ADMINISTRACIÓN

3.1. La dualidad Derecho administrativo

La dualidad entre Derecho público y Derecho privado está profundamente arraigada en los ordenamientos de Europa continental, aunque su desarrollo histórico, su percepción (excluyente o complementaria) y su alcance actual varían según los Estados. La Constitución ha atenuado la contraposición clásica al proyectar su fuerza normativa sobre ambas ramas.

El modo de someter el poder al Derecho explica el sentido de la dualidad. En el modelo inglés, el poder se somete al Derecho común, lo que explica la debilidad del Derecho administrativo.

En el modelo alemán, la actividad patrimonial del poder se somete inicialmente al Derecho común mediante la teoría del fisco, y posteriormente se desarrolla un Derecho específico para el Estado, dando lugar a una dualidad pacífica de regímenes.

En el modelo francés, la Revolución impulsa un Derecho administrativo autónomo y pujante. La separación de poderes se interpreta de forma que se excluye a los jueces ordinarios del control de la Administración, favoreciendo la creación de reglas propias y de una jurisdicción contencioso-administrativa específica. Este proceso culmina en la consolidación de un Derecho propio de la Administración, reforzado por teorías como la del servicio público.

En España, el Derecho administrativo surge por evolución, no por ruptura, desarrollándose en el siglo XIX en paralelo a una Administración creciente y bajo influencia francesa. Como consecuencia del desarrollo histórico francés y español, el Derecho administrativo se concibe como propio de la Administración, y el Derecho privado como ajeno, lo que exige una remisión expresa para su aplicación y explica la reticencia doctrinal a su uso.

En cambio, en el modelo alemán, el Derecho privado se considera complementario del Derecho público y actúa como Derecho común supletorio cuando no existe regulación administrativa específica. Esta concepción se mantiene hasta hoy, incluso en ámbitos como la contratación administrativa o las indemnizaciones expropiatorias.

En la práctica, las Administraciones públicas pueden actuar conforme al Derecho privado en determinados ámbitos: por elección (contratación de personal laboral) o por necesidad (actividades logísticas o empresariales). Los contratos administrativos se limitan a modalidades típicas; para el resto de fines se celebran contratos privados.

Los bienes patrimoniales de la Administración se rigen mayoritariamente por el Derecho privado y se distinguen de los bienes demaniales, sujetos a un régimen administrativo especial.

Asimismo, la iniciativa pública en la actividad económica se ejerce conforme al Derecho privado, en condiciones de igualdad con los operadores privados, sin privilegios, conforme al Derecho de la Unión, con excepciones tasadas.

La elección entre Derecho público o privado tiene consecuencias procesales (jurisdicción competente) y instrumentales (uso de medios de ejecución forzosa). No obstante, no afecta al régimen de responsabilidad patrimonial, que es unitario, con independencia del Derecho aplicable a la actuación administrativa.

3.2. La elección del régimen jurídico de la actuación administrativa

La cuestión central es si y en qué medida la Administración puede elegir entre Derecho público y Derecho privado al realizar actividades materialmente administrativas. Existen actividades necesariamente privadas (logísticas y empresariales) y actividades necesariamente públicas (recaudación de tributos, limitación de derechos, orden público, seguridad ciudadana y ordenación y supervisión de actividades privadas).

La libertad de elección se plantea principalmente en las actividades de servicio público y de fomento, donde la regulación jurídico-pública puede ser incompleta. En último término, es el legislador quien reconoce, limita o condiciona esa capacidad de elección, especialmente cuando la actividad se desarrolla a través de entidades instrumentales.

El legislador modula la elección en tres momentos: al regular un sector de actividad; al fijar el régimen jurídico de las entidades vinculadas o dependientes; y al crear por ley una entidad de Derecho público. La posibilidad de crear personificaciones instrumentales responde al mandato constitucional de eficacia administrativa, correspondiendo al legislador configurar las modalidades de actuación y sus combinaciones de Derecho público y privado.

Las formas públicas de personificación tienden a regirse por Derecho administrativo y las formas privadas por Derecho privado, aunque el legislador introduce modulaciones. Así, ciertas entidades de Derecho público pueden regirse mayoritariamente por Derecho privado, con excepciones en aspectos clave como la formación de la voluntad, el ejercicio de potestades administrativas y los ámbitos expresamente regulados por normas administrativas.

La libertad de elección administrativa está doblemente limitada: solo alcanza a personificaciones cuya creación no exige ley o acuerdo del Consejo de Ministros (u órgano autonómico equivalente), y no permite excluir completamente el Derecho administrativo ni usar libremente el Derecho privado, sino elegir entre modelos cerrados definidos por la ley.

Como regla general, las entidades de Derecho público vinculadas o dependientes se rigen principalmente por Derecho administrativo, y las entidades de Derecho privado por Derecho privado, salvo cuando ejercen potestades administrativas o cuando normas administrativas resulten específicamente aplicables. Estas últimas no son Administraciones públicas, aunque integran el sector público institucional.

En el ámbito local, existen fórmulas organizativas similares, pero la capacidad de elección se encuentra restringida por exigencias de sostenibilidad financiera y eficiencia, estableciéndose una preferencia por las personificaciones públicas, que debe justificarse mediante informes y memorias.

3.3. Los límites materiales al uso del Derecho privado por la Administración

A finales del siglo XX se calificó como “huida del Derecho administrativo” el recurso de las Administraciones públicas a fórmulas de Derecho privado para desarrollar actividades administrativas, especialmente a través de personificaciones instrumentales privadas, buscando mayor flexibilidad. Cuando esa opción se utiliza para eludir controles administrativos o garantías ciudadanas, se considera cuestionable.

Frente a este fenómeno, se plantearon dos estrategias: una reserva o garantía institucional del Derecho administrativo y el refuerzo de la sujeción administrativa. La primera fue descartada por rigidizar en exceso al legislador, reducir el margen democrático y resultar incompatible con la dinámica del Derecho administrativo y del Derecho de la Unión. La segunda ha sido la opción seguida por el legislador, reforzando la sujeción al Derecho administrativo mediante normas generales, contractuales y de transparencia.

El primer límite material deriva de que el régimen jurídico aplicable lo fija el legislador, no la Administración. La capacidad de elección queda ya encuadrada por la regulación legal de las formas organizativas.

El segundo límite es el sometimiento pleno de las potestades administrativas al Derecho administrativo. No cabe ejercer potestades públicas conforme al Derecho privado. El ordenamiento excluye con frecuencia que determinadas entidades privadas puedan ejercer potestades administrativas, aunque existen excepciones discutidas en la legislación vigente.

El tercer límite se refiere al personal: las funciones que impliquen ejercicio de potestades públicas o salvaguarda de intereses generales están reservadas a funcionarios públicos, incluso cuando se actúe a través de personificaciones instrumentales.

El cuarto límite es el orden competencial. El uso del Derecho privado no amplía las competencias de la Administración: solo puede actuar dentro de su ámbito competencial y para fines propios.

El quinto límite lo constituyen los derechos fundamentales, que vinculan a los poderes públicos con independencia del régimen jurídico utilizado. La actuación privada de la Administración debe respetar, entre otros, los principios de igualdad, mérito y capacidad.

Un sexto límite deriva de las normas de estabilidad presupuestaria, endeudamiento y contratación pública, que atienden a la procedencia pública de los fondos, no a la forma jurídica de la entidad. Tampoco la creación de entidades privadas permite eludir estas reglas.

Además, incluso las entidades privadas del sector público quedan sujetas a un núcleo mínimo de Derecho administrativo, que incluye normas presupuestarias, contables, de personal, control económico-financiero, contratación y transparencia, así como a las reglas sobre su creación, transformación y supresión.

De ello se derivan dos consecuencias: a) la existencia de actos separables, sometidos al Derecho administrativo y al control contencioso-administrativo; b) la configuración de un Derecho privado singular de la Administración, distinto del Derecho privado común, modulado por la Constitución y por la posición jurídica especial de la Administración.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
