    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
    
1. LA POTESTAD DE AUTOORGANIZACIÓN DE LA ADMINISTRACIÓN.

Toda organización, pública o privada, dispone de medios personales, materiales y financieros que se ordenan conforme a una estructura diseñada para alcanzar sus objetivos con eficacia. En el ámbito administrativo, esta capacidad de configurar su propia estructura en función de sus fines, competencias y recursos económicos se denomina potestad de autoorganización.

Esta potestad corresponde a todas las Administraciones territoriales. En la Administración del Estado su existencia no ha sido cuestionada, mientras que en las comunidades autónomas el Tribunal Constitucional la considera inherente a su autonomía, comprendiendo la facultad de crear, modificar y suprimir órganos, unidades administrativas y entidades dependientes.

En el caso de las entidades locales, la doctrina y la jurisprudencia la reconocen igualmente como una potestad implícita derivada de su autonomía, que les permite establecer la organización más adecuada para garantizar el funcionamiento de los servicios públicos y el cumplimiento de sus fines.

Este reconocimiento cuenta además con respaldo normativo. La Carta Europea de la Autonomía Local afirma el derecho de las entidades locales a definir sus estructuras administrativas internas conforme a sus necesidades, y la Ley de Bases de Régimen Local atribuye expresamente a municipios, provincias e islas la potestad reglamentaria y de autoorganización dentro de sus competencias.

La potestad de autoorganización se materializa en decisiones concretas de configuración administrativa, como la reestructuración de departamentos ministeriales, la determinación de la estructura orgánica de administraciones autonómicas o la aprobación de reglamentos orgánicos en el ámbito local.

2. LÍMITES CONSTITUCIONALES Y LEGALES DE LA POTESTAD DE AUTOORGANIZACIÓN.

La potestad de autoorganización de las Administraciones públicas no es ilimitada, ya que, al igual que ocurre con las entidades privadas cuyos órganos esenciales vienen fijados por la ley, la Constitución y las leyes establecen principios, límites e incluso reglas estructurales que condicionan su organización.

2.1. Límites constitucionales.

Los límites se encuentran, en primer lugar, en la Constitución, que fija las bases de la organización administrativa. En el ámbito estatal, reconoce la Administración del Estado dirigida por el Gobierno y menciona expresamente el Gobierno, el Consejo de Estado como órgano consultivo y el delegado del Gobierno en las comunidades autónomas, todos ellos sujetos a regulación legal.

El artículo 103 CE establece principios que orientan la organización administrativa, como jerarquía, descentralización, desconcentración y coordinación, que vinculan tanto al legislador como a la propia Administración en el ejercicio de su potestad organizativa. Junto a ellos, se recogen principios de actuación como eficacia, servicio a los intereses generales, objetividad y sometimiento a la legalidad, reforzados por el control judicial de la actividad administrativa y reglamentaria.

Estos principios se han ampliado mediante leyes como la Ley de Transparencia y la LRJSP, que incorporan exigencias de buena administración, incluyendo transparencia, participación, responsabilidad, eficiencia, planificación, evaluación y orientación al ciudadano, afectando tanto a la organización como al funcionamiento administrativo.

La Constitución también impone reservas de ley en materia organizativa, exigiendo regulación legal del régimen jurídico de los órganos administrativos y del estatuto del personal público, así como el acceso en condiciones de igualdad. En el ámbito local, establece los elementos básicos de la organización municipal, provincial e insular, mientras que la regulación concreta de su creación o modificación se remite a la legislación ordinaria. En cambio, la organización de las comunidades autónomas apenas se detalla, remitiéndose en gran medida a sus estatutos y leyes propias.

Además, el principio de estabilidad presupuestaria introducido en el artículo 135 CE incide directamente en la potestad organizativa, al imponer límites financieros que condicionan la creación y mantenimiento de estructuras administrativas, así como el gasto de personal, reflejados en normas como la restricción de creación de entidades locales o la tasa de reposición de efectivos.

2.2. Límites legales.

La potestad de autoorganización también está limitada por las leyes, destacando la LRJSP como norma básica aplicable a todas las Administraciones públicas. El Estado, en virtud de sus competencias constitucionales, puede fijar principios y reglas básicas organizativas, aunque con menor intensidad cuando se trata de aspectos internos sin proyección externa.

Estas bases se complementan con legislación específica para cada nivel administrativo. En la Administración del Estado, la Ley del Gobierno regula el órgano político y sus funciones, mientras que la LRJSP ordena la estructura administrativa y la Ley General Presupuestaria establece el régimen económico. En las comunidades autónomas, los estatutos y leyes propias desarrollan su organización dentro del marco básico estatal.

En el ámbito local, la LBRL regula la organización de las entidades locales, desarrollada reglamentariamente, coexistiendo con posibles regulaciones autonómicas que, según la jurisprudencia constitucional, pueden superponerse siempre que no desplacen las bases estatales. De este modo, la potestad de autoorganización queda configurada como una capacidad condicionada por un entramado normativo constitucional y legal que delimita su alcance.

3. LAS UNIDADES Y ÓRGANOS ADMINISTRATIVOS.

El conjunto de medios personales y materiales de la Administración se organiza atendiendo a funciones y ámbitos de actividad. El elemento organizativo básico es la unidad administrativa, definida como un conjunto de puestos de trabajo vinculados funcionalmente por sus cometidos y orgánicamente por una jefatura común responsable de su funcionamiento.

Estas unidades se configuran mediante las relaciones de puestos de trabajo, que determinan la estructura del personal, incluyendo denominación de los puestos, adscripción y retribuciones, mientras que los reglamentos organizativos fijan su denominación concreta. Varias unidades administrativas, simples o complejas, constituyen un órgano cuando sus funciones producen efectos jurídicos frente a los administrados o cuando su intervención es obligatoria en un procedimiento.

El órgano administrativo integra de forma inseparable las funciones atribuidas y la persona o personas físicas que las ejercen. La actuación preceptiva implica la obligación de intervenir en un procedimiento, mientras que las funciones con efectos jurídicos comprenden cualquier manifestación de voluntad administrativa con incidencia externa, lo que permite distinguir entre unidades con actuación interna y órganos con proyección hacia los administrados.

La creación de órganos corresponde a cada Administración, pero exige determinar su integración en la estructura administrativa, su dependencia, sus funciones y la dotación presupuestaria necesaria. Además, en garantía de la seguridad jurídica, no pueden existir órganos con idénticas funciones en el mismo ámbito territorial y poblacional.

Finalmente, en la Administración del Estado, la LRJSP identifica los órganos superiores y directivos, como ministros y altos cargos, cuya concreta estructura se desarrolla reglamentariamente en cada ministerio.

4. LOS ÓRGANOS COLEGIADOS.

4.1. Concepto.

Los órganos administrativos pueden ser unipersonales o colegiados según que su titularidad corresponda a una sola persona o a varias, siendo necesario en el ámbito estatal un mínimo de tres miembros que actúan como un conjunto unitario. En los órganos colegiados, la voluntad se forma mediante un procedimiento que incluye convocatoria, deliberación y adopción de acuerdos por votación.

Esta forma de decisión es más compleja que la de los órganos unipersonales, lo que explica que tradicionalmente las funciones ejecutivas se atribuyeran a estos últimos, mientras que los colegiados asumían funciones consultivas. Con el tiempo, la colegialidad se extendió, impulsada por la especialización técnica y la necesidad de independencia en determinados sectores, dando lugar a órganos decisorios como jurados o tribunales.

Tras la Constitución de 1978, los órganos colegiados pasaron a desempeñar funciones diversas, no solo decisorias, sino también consultivas, de propuesta o control, favoreciendo la cooperación entre administraciones y la participación de intereses sociales. La LRJSP contempla expresamente estos supuestos y permite que dichos órganos adapten sus normas de funcionamiento.

No deben confundirse los órganos colegiados con los órganos complejos, ya que estos últimos agrupan varios órganos simples bajo un único titular, mientras que los colegiados se caracterizan por la pluralidad de miembros que adoptan decisiones de forma conjunta.

4.2. La regulación básica de los órganos colegiados de todas las administraciones públicas.

La LRJSP establece una regulación básica del régimen jurídico de los órganos colegiados, aunque excluye a los órganos de gobierno por su carácter también político. Su creación no requiere necesariamente ley, pero sí la publicación de sus normas cuando adopten decisiones que afecten a terceros, en garantía de la competencia y seguridad jurídica.

La ley regula su funcionamiento, incluyendo convocatoria, sesiones, quorum y adopción de acuerdos, sin agotar la regulación para respetar las competencias autonómicas. Se exige la presencia de un secretario, encargado de certificar los acuerdos y levantar acta, que debe reflejar los elementos esenciales de la sesión y puede incorporar grabaciones para garantizar su autenticidad.

La convocatoria exige la inclusión previa de los asuntos en el orden del día, salvo supuestos excepcionales, y permite el uso de medios electrónicos. El quorum mínimo requiere la asistencia de la mitad de los miembros, debiendo mantenerse durante toda la sesión, y los acuerdos se adoptan por mayoría. Los miembros que votan en contra o se abstienen quedan exentos de responsabilidad.

La ley también admite el uso de medios telemáticos para la celebración de sesiones, aunque en el ámbito local su uso queda limitado a situaciones excepcionales, manteniéndose como regla general la presencialidad.

4.3. El desarrollo legislativo de la normativa básica para los órganos colegiados de la administración del estado.

En la Administración del Estado, los órganos colegiados se crean por norma, convenio o acuerdo, aunque aquellos con funciones decisorias o relevantes requieren una norma formal. Deben contar con al menos tres miembros y un presidente, al que se atribuyen funciones de dirección y voto de calidad para resolver empates.

El presidente representa al órgano, convoca y dirige las sesiones y garantiza el funcionamiento del mismo, siendo sustituido según criterios establecidos o por previsión normativa específica. El secretario, por su parte, realiza funciones de apoyo, convocatoria, certificación y elaboración de actas, actuando con voz y voto solo cuando es miembro.

Se reconocen derechos a los miembros para garantizar su participación efectiva, como el acceso previo a la información, el ejercicio del voto y la posibilidad de dejar constancia de sus intervenciones o del sentido de su voto en el acta, incluyendo su motivación.

4.4. El desarrollo legislativo de la normativa básica para los órganos colegiados de las comunidades autónomas.

Las comunidades autónomas han desarrollado la regulación básica mediante sus propias leyes, manteniendo en general una estructura similar a la estatal. Las diferencias se limitan a aspectos concretos como los plazos de convocatoria, la publicidad de las deliberaciones o la forma de designación del presidente.

En términos generales, se mantiene un modelo con fuerte protagonismo del presidente, al que se atribuye el voto de calidad, y una regulación homogénea que, en muchos casos, remite a la legislación básica estatal para los aspectos esenciales del régimen jurídico de los órganos colegiados.

5. EL PRINCIPIO DE JERARQUÍA.

5.1. Significado y alcance.

El principio de jerarquía, consagrado en el artículo 103 CE, estructura la organización administrativa mediante una ordenación escalonada de órganos con competencias sobre una misma materia, de modo que los superiores pueden dirigir, fiscalizar y resolver los conflictos de los inferiores para asegurar la unidad de actuación. Esta relación exige, por un lado, una distribución escalonada de órganos sobre una misma competencia material y, por otro, un vínculo de subordinación que garantice la prevalencia de la voluntad del superior.

Este principio preside la organización interna de cada Administración. Las unidades administrativas cuentan con una jefatura responsable de su funcionamiento y todo órgano debe integrarse en una estructura con dependencia jerárquica determinada. Sin embargo, quedan exceptuados algunos órganos por su propia naturaleza, como los consultivos, los servicios jurídicos y ciertos órganos colegiados con participación de intereses sociales o de varias Administraciones, porque su función exige autonomía o independencia de criterio.

También puede existir una relación jerárquica atenuada entre una Administración territorial y las entidades dependientes o adscritas a ella, como ocurre con los medios propios o con la revisión de actos de organismos públicos. En cambio, el principio de autonomía excluye la jerarquía entre Administraciones territoriales, cuyas relaciones se basan en cooperación, coordinación y control de legalidad, aunque el Estado conserve una posición de superioridad constitucional que no equivale a una verdadera relación jerárquica.

5.2. Contenido.

La primera manifestación del principio de jerarquía es la facultad de impulso y dirección de los órganos inferiores mediante instrucciones y órdenes de servicio. Estas no tienen carácter normativo ni eficacia externa frente a terceros, sino que actúan como directrices internas para asegurar la coherencia en el funcionamiento de la organización administrativa, por lo que solo vinculan a los órganos subordinados y su incumplimiento no determina por sí mismo la nulidad del acto dictado.

La jerarquía comprende además otras facultades, como coordinar la actuación de los inferiores, resolver conflictos de atribuciones, ejercer inspección y vigilancia, designar suplentes, transferir competencias y revisar sus actos a través del recurso de alzada. También permite subsanar actos afectados por incompetencia jerárquica mediante su convalidación por el órgano superior competente.

Cuando estas facultades no se ejercen a través de procedimientos formales, se apoyan en el deber de obediencia impuesto a titulares de órganos y empleados públicos, reforzado por la potestad disciplinaria. El ordenamiento considera falta muy grave la desobediencia abierta a órdenes o instrucciones superiores, aunque esta obligación no ampara la obediencia a órdenes manifiestamente ilegales.

No obstante, la efectividad tradicional del principio de jerarquía se ha visto matizada por el reconocimiento de derechos y libertades de los funcionarios. La jurisprudencia constitucional admite restricciones derivadas de su condición, pero exige valorar cada caso atendiendo a factores como el cuerpo al que pertenecen, el contexto de actuación y si su conducta compromete la autoridad del superior o el buen funcionamiento del servicio.

Pese a estas modulaciones, el principio de jerarquía mantiene un peso decisivo en el sistema administrativo, como demuestra la conservación del carácter obligatorio del recurso de alzada, aun cuando se haya criticado su utilidad práctica por la frecuente confirmación de la decisión del órgano inferior por el superior.

6. EL PRINCIPIO DE COMPETENCIA.

6.1. Significado.

La competencia es el conjunto de atribuciones que corresponden a cada Administración territorial o entidad pública y, dentro de cada una de ellas, a sus distintos órganos. Su distribución parte del marco constitucional entre Estado y comunidades autónomas, se concreta para las entidades locales en la legislación correspondiente y, después, se reparte internamente mediante leyes y reglamentos de organización, siendo el titular de cada órgano quien asigna funciones a las unidades integradas en él.

Dentro de cada Administración, la competencia es irrenunciable y debe ejercerse por el órgano al que ha sido atribuida. Por eso, la infracción de las normas competenciales vicia los actos administrativos y también las disposiciones generales. La competencia puede considerarse desde una dimensión jerárquica, vinculada a la distribución escalonada de funciones dentro de una misma materia, desde una dimensión material, referida al sector o contenido sobre el que actúa el órgano, y desde una dimensión territorial, relativa al espacio en que puede ejercerse válidamente la función.

La validez del acto exige que concurran conjuntamente competencia material, jerárquica y territorial. Cuando falta la competencia material o territorial y esa falta es manifiesta, el acto incurre en nulidad de pleno derecho. Cuando la incompetencia es jerárquica o cuando la incompetencia material o territorial no resulta manifiesta, el acto es anulable y puede incluso ser convalidado por el órgano superior competente.

6.2. Figuras legales que permiten que la competencia se ejerza por quien no la tiene

atribuida sin modificarse la titularidad de la competencia: delegación de competencias, delegación de firma, suplencia y encomienda de gestión.

La LRJSP permite que el ejercicio de una competencia sea realizado por un órgano distinto del titular sin que cambie la titularidad de la misma. En todos estos casos, los actos se consideran dictados por el órgano competente y conservan el régimen de recursos que correspondería si hubiera actuado directamente su titular, siempre que se respeten los límites y requisitos legales.

6.2.1. Delegación de competencias.

La delegación de competencias permite que un órgano o entidad pública ejerza competencias atribuidas a otro, sin necesidad de que exista entre ambos relación jerárquica directa. Para que produzca efectos debe publicarse y también debe publicarse su revocación. Desde ese momento, el órgano delegado puede ejercer válidamente la competencia y el delegante no puede hacerlo mientras la delegación siga vigente.

La delegación debe hacerse constar expresamente en la resolución adoptada y los actos dictados por delegación se entienden emanados del órgano delegante. No todas las competencias son delegables. Quedan excluidas las de naturaleza política, la potestad reglamentaria, la resolución de recursos administrativos en el órgano autor del acto recurrido y, con carácter general, las competencias que ya se ejercen por delegación. Además, cuando la delegación procede de un órgano colegiado, debe adoptarse con la misma mayoría exigida para el asunto delegado.

6.2.2. Delegación de firma.

La delegación de firma no altera el ejercicio material de la competencia, sino únicamente la firma del acto o resolución ya decidido por el órgano competente. El órgano delegado se limita a suscribir formalmente la decisión del titular, por lo que no se requiere publicación de esta técnica.

Su finalidad es facilitar el funcionamiento administrativo en procedimientos repetitivos o masivos.

Aunque no necesita publicación, debe hacerse constar en la firma de la resolución la referencia al órgano delegante. Tampoco cabe en aquellos supuestos en los que no sería posible delegar la competencia, salvo previsión legal específica.

6.2.3. La suplencia.

La suplencia consiste en la sustitución temporal de la persona titular del órgano en casos tasados como vacante, ausencia, enfermedad o imposibilidad de intervenir por abstención o recusación.

No se modifica la competencia porque sigue ejerciéndola el mismo órgano, aunque cambie temporalmente la persona que lo ocupa.

No es necesaria su publicación, ya que responde a exigencias de eficacia y pretende evitar paralizaciones en la actividad administrativa. Sin embargo, debe reflejarse en la firma de la resolución quién actúa como suplente y en sustitución de qué titular, pues ello puede afectar a las garantías del interesado, especialmente en relación con posibles causas de recusación.

6.2.4. La encomienda de gestión.

La encomienda de gestión permite encargar a otro órgano o entidad pública la realización de actividades materiales o técnicas cuando el órgano competente no dispone de medios idóneos para llevarlas a cabo. Puede darse entre órganos de la misma Administración o entre Administraciones distintas, pero no implica transmisión de la titularidad de la competencia.

El límite esencial es que los actos jurídicos que sostienen o integran la actuación encomendadadeben seguir siendo dictados por el órgano competente. Aunque la jurisprudencia ha admitido que puedan incluirse ciertos actos instrumentales o de trámite, la encomienda no puede vaciar de contenido el ejercicio real de la competencia, especialmente en procedimientos sancionadores cuando intervienen personas sin estatuto funcionarial.

Su formalización varía según se produzca dentro de la misma Administración o entre Administraciones distintas, pero en todo caso requiere un instrumento formal y su publicación. Su ámbito ha quedado restringido, ya que no puede dirigirse a entidades privadas del sector público y tampoco procede cuando el objeto encaja en contratos del sector público o en encargos a medios propios.

6.3. La avocación.

La avocación es una manifestación del principio de jerarquía por la que el órgano superior asume para sí la resolución de un asunto concreto que normalmente corresponde a un órgano inferior, ya sea porque este la tenga atribuida directamente o la ejerza por delegación. No altera de forma general el reparto competencial, sino solo para ese caso singular.

Al referirse a un asunto concreto, no exige publicación oficial, bastando su notificación a los interesados. El acuerdo de avocación debe estar motivado, ya que supone un tratamiento singular respecto de otros asuntos semejantes y solo se justifica por razones técnicas, económicas, sociales, jurídicas o territoriales.

La impugnación de la avocación no puede hacerse separadamente, sino al recurrir el acto final del procedimiento. La jurisprudencia ha interpretado además que no es imprescindible una relación jerárquica directa entre el órgano que avoca y el que venía ejerciendo la competencia, siendo suficiente la existencia de dependencia jerárquica dentro de la misma organización administrativa.

7. LA RESOLUCIÓN DE LOS CONFLICTOS DE COMPETENCIAS ENTRE ÓRGANOS DE LA MISMA ADMINISTRACIÓN. LOS CONFLICTOS DE ATRIBUCIONES.

Tradicionalmente, la expresión conflicto de competencias se ha reservado para los enfrentamientos entre la Administración y los órganos judiciales, mientras que los conflictos entre órganos de una misma Administración reciben el nombre de conflictos de atribuciones. La LRJSP mantiene esta distinción y considera conflictos de atribuciones las cuestiones competenciales surgidas entre órganos de una misma Administración que no están unidos por relación jerárquica, siempre que el procedimiento aún no haya concluido.

Si el procedimiento ya ha finalizado, la cuestión no se resuelve mediante conflicto de atribuciones, sino a través del recurso correspondiente contra el acto dictado por un órgano presuntamente incompetente. La legislación básica prevé que la cuestión pueda plantearse de oficio por el propio órgano que se considere incompetente, remitiendo las actuaciones al que estime competente y comunicándolo a los interesados, o a instancia de estos, que pueden pedir al órgano actuante que decline su competencia.

En la Administración del Estado, la LRJSP regula tanto la competencia para resolver estos conflictos como su tramitación, distinguiendo entre conflictos positivos y negativos. Los positivos surgen cuando un órgano se considera competente y requiere a otro que se inhiba, interviniendo el superior jerárquico común si no se acepta el requerimiento. Los negativos se producen cuando un órgano se declara incompetente y remite las actuaciones a otro que también rechaza la competencia, debiendo decidir entonces el superior jerárquico común. La resolución debe dictarse en diez días y no admite recurso.

Cuando el conflicto surge entre ministerios, la competencia para plantearlo corresponde al ministro, mientras que su resolución corresponde al presidente del Gobierno. En las comunidades autónomas, las leyes propias desarrollan este régimen dentro del marco básico estatal. En las entidades locales, la LBRL atribuye con carácter general la resolución al alcalde o presidente, aunque corresponde al pleno cuando el conflicto afecta a órganos colegiados o a sus miembros.

8. EL PRINCIPIO DE DESCONCENTRACIÓN.

El principio de desconcentración, recogido en el artículo 103.1 CE y en la LRJSP, implica que las competencias no deben concentrarse en los órganos superiores, sino distribuirse dentro de la propia organización administrativa. Su alcance depende de cómo las normas organizativas repartan las funciones entre los distintos órganos, operando siempre en el interior de una misma Administración.

A diferencia de la delegación, que supone un ejercicio temporal y revocable de competencias, la desconcentración implica una modificación normativa que atribuye de forma estable la titularidad y el ejercicio de la competencia a órganos inferiores. Esta técnica responde a la necesidad de evitar la acumulación de asuntos y los retrasos en la gestión administrativa, garantizando una actuación más eficaz al servicio del interés general.

La desconcentración se caracteriza porque el órgano inferior ejerce la competencia como propia, en su nombre y con carácter definitivo, pudiendo a su vez delegarla en los términos previstos legalmente. Este desplazamiento puede ser de carácter funcional o territorial, pero siempre dentro de la misma Administración, y no elimina la relación jerárquica, ya que el órgano superior mantiene su poder de dirección y control, pudiendo conocer de los recursos de alzada contra los actos del órgano inferior.

El legislador ha articulado mecanismos para favorecer la desconcentración. Cuando una norma atribuye una competencia a una Administración sin concretar el órgano, se entiende atribuida al órgano inferior competente por razón de la materia y del territorio. Además, cuando la competencia se asigna expresamente a un órgano, la propia norma puede prever su transferencia definitiva a órganos inferiores, permitiendo así un reajuste estructural de la distribución competencial.

Finalmente, la atribución de competencias decisorias a órganos inferiores, habitualmente ocupados por funcionarios, se ha acompañado del uso de sistemas de provisión basados en la confianza, lo que ha supuesto una cierta proyección de criterios políticos en niveles funcionariales superiores.

9. LA DESCENTRALIZACIÓN.

9.1. Descentralización política o territorial.

La descentralización política o territorial implica la existencia de entidades con personalidad jurídica propia que ejercen competencias con autonomía, en contraste con el modelo centralizado en el que solo existe una Administración organizada jerárquicamente. Para que exista verdadera descentralización no basta con transferir competencias, sino que es necesario que la entidad que las recibe pueda ejercerlas sin control permanente de otra Administración, aunque puedan existir controles excepcionales.

En España, la descentralización territorial culmina con la Constitución de 1978, que organiza el Estado en municipios, provincias y comunidades autónomas, todos ellos dotados de autonomía para la gestión de sus intereses. Esta autonomía es distinta en cada nivel, ya que las entidades locales carecen de potestad legislativa y solo pueden dictar normas reglamentarias.

La descentralización local se refuerza con la Carta Europea de la Autonomía Local, que vincula este modelo con los valores democráticos y la participación ciudadana, destacando la importancia de dotar a las entidades locales de competencias efectivas y de autonomía real. La descentralización autonómica también se consolida constitucionalmente, reconociéndose el derecho a la autonomía de nacionalidades y regiones y articulándose en un sistema con múltiples niveles de decisión.

Este modelo presenta ventajas, como la proximidad al ciudadano y una gestión más ajustada a las necesidades territoriales, pero también inconvenientes, como el incremento de costes, la posible duplicidad de estructuras y las tensiones entre diversidad territorial y tendencias uniformadoras derivadas de la globalización. No obstante, se considera que sus beneficios en términos de participación y eficacia compensan sus costes.

9.2. Descentralización funcional.

La descentralización funcional consiste en transferir competencias a entidades con personalidad jurídica distinta dentro de la misma Administración, a diferencia de la desconcentración, que opera entre órganos de una misma persona jurídica. En este caso, no es imprescindible que las competencias se ejerzan con plena autonomía, ya que la entidad matriz mantiene controles sobre la actividad de los entes creados.

Esta técnica responde a criterios de eficacia, ya que los organismos resultantes suelen estar especializados en las funciones que gestionan, disponen de patrimonio y recursos propios y cuentan con mayor agilidad en su actuación. Sin embargo, su autonomía es relativa, pues la Administración de la que dependen conserva facultades de control y designación de sus órganos de dirección.

El grado de autonomía varía según la naturaleza de la entidad, siendo menor en los organismos públicos sometidos a controles más estrictos y mayor en entidades de derecho privado del sector público. También existen organismos que actúan con especial independencia debido a la naturaleza de sus funciones, como las autoridades administrativas independientes, cuya actuación requiere objetividad y autonomía respecto de la Administración matriz.

El uso intensivo de la descentralización funcional ha llevado a introducir cautelas en la creación de estos organismos, exigiendo la justificación de su necesidad, la definición de objetivos e indicadores, la evaluación de su eficiencia y la garantía de que no se produzcan duplicidades en la organización administrativa.

10. EL PRINCIPIO DE COORDINACIÓN INTRAADMINISTRATIVA.

El principio de coordinación intraadministrativa responde a la necesidad de armonizar la actuación de los distintos órganos de una misma Administración, especialmente ante la complejidad de sus funciones y la existencia de competencias materiales de carácter transversal que inciden sobre múltiples ámbitos de actuación. Aunque esta función se integra en el poder de dirección propio de la jerarquía, su relevancia exige mecanismos específicos que permitan evitar duplicidades y contradicciones, orientando la actuación administrativa hacia objetivos comunes.

La LRJSP no regula expresamente la coordinación interna, centrándose en la coordinación entre Administraciones territoriales, pero este principio se encuentra implícito en las funciones de determinados órganos que actúan como instancias de coordinación. Así ocurre con el Consejo de Ministros, las comisiones delegadas del Gobierno o la Comisión General de Secretarios de Estado y subsecretarios, que aseguran la coherencia en la actuación de los distintos departamentos.

Además de la coordinación orgánica, basada en la existencia de órganos específicos, también existe una coordinación funcional que se articula mediante instrumentos como reuniones periódicas, informes o la planificación, sin necesidad de crear nuevas estructuras organizativas.

11. LOS PRINCIPIOS VERTEBRADORES DE LAS RELACIONES ENTRE LA ADMINISTRACIÓN DEL ESTADO Y LAS COMUNIDADES AUTÓNOMAS.

El Estado descentralizado excluye la jerarquía entre Administraciones territoriales por ser incompatible con la autonomía. Por eso, las relaciones entre la Administración del Estado y las comunidades autónomas se articulan mediante principios como la lealtad institucional, el respeto competencial, la colaboración, la cooperación, la coordinación, la eficiencia en el uso de recursos, la responsabilidad y la solidaridad interterritorial.

11.1. Coordinación versus colaboración/cooperación. Sus diferencias.

La coordinación interadministrativa ha sido reconocida por la doctrina constitucional, pero no debe confundirse con la colaboración o la cooperación. La colaboración constituye un presupuesto implícito del sistema competencial y no requiere un título específico, mientras que la coordinación sí exige una competencia concreta que habilite su ejercicio. Por eso, el Estado no puede invocar la coordinación para limitar competencias autonómicas si carece de título competencial suficiente.

Esta diferencia tiene consecuencias jurídicas relevantes. La vulneración del principio de colaboración o cooperación no puede originar por sí misma un conflicto competencial ante el Tribunal Constitucional, mientras que sí puede hacerlo un ejercicio indebido de la coordinación.

La cooperación se basa en la voluntariedad y se traduce en compromisos asumidos libremente por varias Administraciones para una actuación común.

La coordinación, en cambio, permite garantizar la coherencia de las actuaciones administrativas cuando así lo prevea el ordenamiento, y puede imponer efectos vinculantes incluso a quienes no hayan prestado su conformidad. Entre ambas aparece una posición intermedia cuando el Estado impone informes preceptivos no vinculantes en procedimientos autonómicos, supuesto que la doctrina ha calificado como cooperación obligatoria, aunque exige igualmente una competencia estatal que la justifique.

11.2. Las diferencias entre colaboración y cooperación. La identificación por el legislador del principio de cooperación con la lealtad institucional.

La LRJSP distingue entre cooperación y colaboración. La cooperación se articula mediante técnicas orgánicas o funcionales y se concreta en acuerdos de órganos de cooperación o en convenios interadministrativos. La colaboración, en cambio, se vincula a deberes generales de conducta entre Administraciones.

Estos deberes presentan una vertiente negativa, consistente en respetar el ejercicio legítimo de las competencias ajenas, y otra positiva, que obliga a facilitar el ejercicio de las competencias de las demás Administraciones mediante el suministro de información, la creación de bases de datos integradas o la prestación de auxilio. Solo cabe excusar estas obligaciones cuando falten medios suficientes o exista incompatibilidad con las funciones propias.

De este modo, el legislador identifica la colaboración con la lealtad institucional, entendida como manifestación de la lealtad constitucional en el ámbito interadministrativo. Esta exige auxilio recíproco, consideración de los intereses generales comunes y abstención de actuaciones que puedan perjudicar o perturbar el funcionamiento del sistema descentralizado.

11.3. Los convenios interadministrativos.

La cooperación puede instrumentarse mediante diversas técnicas, como la participación en órganos comunes, la emisión de informes, las encomiendas de gestión o las cesiones de bienes.

Cuando no se canaliza a través de un órgano, la voluntad de cooperar se formaliza mediante convenios.

La LRJSP regula de forma completa los convenios, en especial los interadministrativos, para corregir problemas detectados en la práctica anterior, como la indefinición de obligaciones, la falta de control financiero o la ausencia de plazos claros de ejecución. Estos convenios pueden celebrarse entre Administraciones distintas o entre organismos públicos dependientes de ellas, e incluso pueden incluir el uso de medios y recursos ajenos para el ejercicio de competencias propias o delegadas, salvo que por su contenido deban calificarse como encomienda de gestión.

Los convenios tienen naturaleza contractual y producen efectos jurídicos exigibles, por lo que se perfeccionan por el consentimiento de las partes y se distinguen de los simples protocolos de intenciones. Por esa razón, la ley exige controles reforzados de estabilidad presupuestaria, sostenibilidad financiera, necesidad, oportunidad e impacto económico, así como un contenido mínimo que determine sujetos, competencias, obligaciones, compromisos económicos, consecuencias del incumplimiento, mecanismos de seguimiento, duración y eventual prórroga.

11.4. La conferencia de presidentes, las conferencias sectoriales y las comisiones bilaterales.

La cooperación también se manifiesta en órganos colegiados en los que participan varias Administraciones. Estos órganos pueden ser bilaterales, como las comisiones bilaterales, o multilaterales, como la conferencia de presidentes y las conferencias sectoriales, y pueden tener carácter general o sectorial según su ámbito material.

La conferencia de presidentes es el máximo órgano de cooperación política y reúne al presidente del Gobierno con los presidentes autonómicos y de las ciudades autónomas. Su funcionamiento se rige por su propio reglamento y sus decisiones pueden adoptar la forma de acuerdos o recomendaciones, con distinto grado de consenso y vinculación.

Las comisiones bilaterales son órganos permanentes entre el Estado y cada comunidad autónoma o ciudad autónoma. Su función principal es mejorar la coordinación en asuntos singulares y adoptar acuerdos vinculantes por consentimiento mutuo. Tienen especial relevancia en la negociación previa al recurso de inconstitucionalidad, al poder servir como cauce para resolver discrepancias sin necesidad de acudir al Tribunal Constitucional.

Las conferencias sectoriales son órganos multilaterales especializados por materias en los que participan el ministro competente y los consejeros autonómicos correspondientes. Sus funciones dependen de su norma de creación o de su reglamento, pero destacan el intercambio de información, la planificación, el informe de anteproyectos normativos y el establecimiento de criterios para el reparto de fondos estatales.

Su régimen de decisiones refleja su doble condición de órganos de cooperación y, en ciertos casos, también de coordinación. Los acuerdos contienen compromisos vinculantes para quienes los aceptan y, cuando recaen sobre materias en las que el Estado ostenta competencia de coordinación, vinculan a todas las Administraciones integradas en la conferencia. Las recomendaciones, por su parte, obligan a adaptar la actuación administrativa a quienes no se hayan opuesto a su adopción.

12. LAS RELACIONES DE LAS ADMINISTRACIONES DEL ESTADO Y COMUNIDADES AUTÓNOMAS CON LAS ENTIDADES LOCALES.

12.1. La eliminación del principio de jerarquía y la limitación de los controles
administrativos sobre las entidades locales.

Las relaciones entre el Estado, las comunidades autónomas y las entidades locales ya no se rigen por el principio de jerarquía, sino por la autonomía local, lo que ha reducido intensamente los controles administrativos existentes en el pasado. Frente al sistema anterior a la Constitución, basado en recursos de alzada, autorizaciones, aprobaciones y suspensiones de actos locales, el modelo actual admite controles mucho más limitados.

La Carta Europea de la Autonomía Local y la doctrina del Tribunal Constitucional permiten controles administrativos, pero solo si están previstos en la Constitución o en la ley, si se refieren con carácter general a la legalidad y no a la oportunidad, salvo en casos excepcionales de competencias delegadas o afectación de intereses supralocales, y si su intensidad es proporcionada al interés público protegido. Por eso, no caben controles genéricos sobre la actividad local, sino solo controles concretos y vinculados a intereses supramunicipales.

El control ordinario de la actividad de las entidades locales corresponde a la jurisdicción contencioso-administrativa. El Estado y las comunidades autónomas pueden impugnar actos y disposiciones locales cuando infrinjan el ordenamiento o lesionen sus competencias, pero esta facultad no constituye un control administrativo directo, sino una legitimación procesal. Antes de acudir a los tribunales, pueden formular un requerimiento a la entidad local para que anule el acto, aunque este trámite no suspende su eficacia ni sustituye al control judicial.

Solo de manera excepcional se reconocen controles administrativos directos. El delegado del Gobierno puede suspender actos locales que atenten gravemente al interés general de España, aunque para ello debe requerir antes a la entidad local y acudir después a la vía contenciosa.

También existen mecanismos extraordinarios de sustitución cuando la entidad local incumple obligaciones legales que impiden el ejercicio de competencias estatales o autonómicas, y medidas aún más intensas como la disolución de los órganos de gobierno local en supuestos de gestión gravemente dañosa para los intereses generales y de incumplimiento de obligaciones constitucionales.

Junto a estos controles existen supuestos de autorización o aprobación previa en materias concretas, como consultas populares, servicios en régimen de monopolio o determinados actos urbanísticos. No obstante, el legislador autonómico debe respetar en todo caso el modelo básico de control fijado por la LBRL, ya que constituye una garantía de la autonomía local.

12.2. La tutela económico-financiera del Estado y las comunidades autónomas sobre las entidades locales.

La tutela económico-financiera constituye una manifestación específica del control sobre las entidades locales, intensificada a partir de la exigencia de estabilidad presupuestaria. Su ejercicio corresponde al Estado o, en determinadas comunidades autónomas, a la propia comunidad que haya asumido esta competencia en su Estatuto de Autonomía.

Esta tutela comprende diversas facultades, como la emisión de informes preceptivos, a veces vinculantes y otras no, la recepción de información presupuestaria, la autorización de determinadas garantías financieras, la supervisión de discrepancias en materia de control interno y la aprobación y seguimiento de los planes económico-financieros elaborados por los municipios cuando incumplen los objetivos de estabilidad o las reglas de gasto.

12.3. Los principios de colaboración, cooperación y lealtad institucional.

Las relaciones con las entidades locales también se rigen por los principios del artículo 140.1 LRJSP. La LBRL mantiene la distinción entre coordinación y cooperación, vinculando la colaboración a la idea de lealtad institucional. Dentro de esta lealtad destacan deberes como el suministro de información por parte de las entidades locales a las Administraciones superiores, requisito esencial para que estas puedan ejercer las facultades de control que la ley les reconoce.

También se exige a las entidades locales que valoren el impacto financiero y presupuestario que puede tener el ejercicio de sus competencias sobre el resto de Administraciones. Como instrumentos de cooperación, además de los convenios, la ley prevé consorcios cuando el convenio no sea suficiente y resulte económicamente justificada la creación de una entidad diferenciada.

Existen igualmente órganos de cooperación de carácter consultivo o deliberante, como las comisiones territoriales, en las que pueden participar el Estado, las comunidades autónomas y las entidades locales. Aunque su finalidad es favorecer la coordinación y evitar duplicidades, sus acuerdos solo vinculan a quienes los aceptan, lo que refleja su verdadera naturaleza cooperativa.

También puede hablarse de cooperación forzosa cuando las entidades locales participan en decisiones de otras Administraciones mediante informes exigidos legalmente.

12.4. El principio de coordinación.

La coordinación permite a una Administración ejercer un cierto poder de dirección sobre las entidades locales, pero como afecta a su autonomía está sujeta a límites materiales y procedimentales muy estrictos. Desde el punto de vista sustantivo, la ley debe definir de forma precisa el alcance del poder coordinador y garantizar que la entidad local conserve una capacidad decisoria proporcionada al interés que sigue presente en el asunto.

Estos límites se reflejan en la LBRL, que exige para coordinar que la actividad o servicio local trascienda el interés propio de la entidad, incida de manera relevante en intereses estatales o autonómicos o sea concurrente o complementario con los de estas Administraciones. Además, la coordinación solo es legítima cuando no basta la cooperación voluntaria o esta resulta manifiestamente inadecuada.

El instrumento típico de la coordinación son los planes sectoriales, que deben estar previstos legalmente y fijan objetivos y prioridades para orientar la programación y ejecución de los servicios locales. La participación de las entidades locales en su elaboración constituye una garantía esencial de su autonomía, porque permite armonizar los intereses en presencia y limita las desviaciones de la Administración coordinadora.

Finalmente, las leyes sectoriales que establezcan facultades de coordinación deben concretar con suficiente detalle sus condiciones, límites y modalidades de control, reforzando así las exigencias de predeterminación y proporcionalidad que impone la autonomía local.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];

      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
