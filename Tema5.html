    /* =========================================================

    ========================================================= */
const PDF_TEXTO = `
1. INTRODUCCIÓN

En el Derecho administrativo intervienen todas las fuentes del ordenamiento, no solo la ley. A diferencia del ámbito penal o civil, aquí tienen especial protagonismo el decreto-ley, el decreto legislativo, la ley autonómica y el reglamento.

La regulación de un sector puede estar formada simultáneamente por normas europeas, estatales, autonómicas y locales, además de quedar condicionada por principios constitucionales, estatutarios y europeos. A ello se añade la jurisprudencia del Tribunal Supremo, Tribunal Constitucional, TJUE y TEDH. El resultado es un sistema multinivel y complejo.

La dificultad del Derecho administrativo no está tanto en memorizar normas como en saber localizarlas, coordinarlas y aplicarlas cuando concurren varias a la vez, incluso con aparentes contradicciones.

Las relaciones entre fuentes pueden ser: a) Concreción (una norma inferior desarrolla o precisa a otra superior). b) Compatibilidad o contradicción (cuando pueden o no coexistir). c) Integración (cuando una fuente suple lagunas de otra).

El principio de jerarquía normativa es clave para resolver conflictos dentro de un mismo ordenamiento, pero no basta por sí solo. En conflictos entre normas del mismo rango o de distintos ordenamientos deben aplicarse otros principios previstos en la Constitución, en la ley y en el Derecho de la Unión Europea.

2. PRINCIPIO DE JERARQUÍA NORMATIVA

El principio de jerarquía normativa parte de que las normas del ordenamiento poseen un rango que permite clasificarlas y ordenarlas. Ese rango depende de la forma de aprobación, no del contenido. Su consecuencia básica es el deber de las normas inferiores de respetar a las superiores. El art. 9.3 CE garantiza este principio, pero no actúa como parámetro autónomo de constitucionalidad: lo decisivo es siempre la norma superior concreta que se considera infringida.

La Constitución contiene múltiples manifestaciones concretas de la jerarquía: supremacía constitucional, subordinación del decreto legislativo a la ley de delegación, superioridad del estatuto en el ámbito autonómico, subordinación del reglamento a la ley, entre otras. En el ordenamiento interno existen tres grandes niveles normativos (Constitución, normas con rango de ley y normas reglamentarias), a los que pueden añadirse los tratados internacionales ratificados.

Sin embargo, no todo tipo de norma tiene rango propio: diferentes tipos pueden compartir la misma fuerza de ley, aunque presenten diferencias materiales.

En otros subsistemas la jerarquía se atenúa o se configura de forma distinta. En la Unión Europea existe una distinción entre Derecho primario y Derecho derivado; en el Derecho internacional no hay una ordenación jerárquica clara entre fuentes; en el ámbito local no hay escalones jerárquicos internos, mientras que en el ámbito foral sí existe una ordenación en varios niveles.

Las consecuencias esenciales del principio son dos: a) Aplicación preferente de la norma superior en caso de conflicto. b) Existencia de procedimientos de fiscalización para garantizar el respeto al rango.

El art. 6 LOPJ establece que jueces y tribunales no deben aplicar disposiciones contrarias a normas superiores. Además, el ordenamiento prevé la nulidad de pleno derecho de las normas inferiores que contradigan a las superiores (art. 39 LOTC; arts. 47.2 y 128.3 LPAC). La jurisprudencia añade el principio de interpretación conforme, que obliga a interpretar la norma inferior de manera compatible con la superior siempre que sea posible.

La relación entre tratado internacional y ley ha generado debate doctrinal. Aunque no siempre exista nulidad automática, los jueces deben inaplicar la ley contraria a un tratado ratificado y publicado, lo que revela una eficacia propia de norma superior. En todo caso, no toda invalidez normativa deriva de jerarquía: también puede responder al principio de competencia.

El principio de jerarquía opera entre distintos niveles normativos y dentro del grupo de disposiciones reglamentarias. No existe jerarquía entre normas con rango de ley entre sí. Cuando normas del mismo rango entran en conflicto, se aplican otros criterios: – Criterio cronológico (norma posterior deroga anterior). – Criterio de especialidad. – Criterio de función constitucional o competencia.

En el ámbito reglamentario estatal, la jerarquía sitúa por encima los reales decretos del presidente o del Consejo de Ministros y, por debajo, las órdenes ministeriales. Reglamentos dictados por órganos inferiores quedan subordinados a estos.

En suma, el principio de jerarquía normativa es un instrumento esencial para ordenar el sistema de fuentes y resolver conflictos, pero no es el único criterio operativo, ya que convive con los principios de competencia, especialidad y cronología.

3. PRINCIPIO DE COMPETENCIA

El principio de competencia comparte hoy protagonismo con el de jerarquía en la ordenación del sistema de fuentes. Mientras la jerarquía opera preferentemente entre normas de un mismo ordenamiento, la competencia actúa sobre todo en las relaciones entre distintos ordenamientos.

Ambos principios no son antagónicos ni excluyentes: el de competencia se apoya en la superioridad de la Constitución, que distribuye el poder normativo entre distintos sujetos públicos, y convive con el de jerarquía en el interior del sistema.

La esencia del principio de competencia consiste en la atribución separada de ámbitos de decisión a sujetos distintos, evitando solapamientos. La distribución competencial combina criterios materiales, funcionales y territoriales, lo que genera entrecruzamientos y conflictos. Así, una misma materia puede dividirse entre legislación básica y desarrollo, o entre competencias territoriales según el ámbito en que se proyecten los hechos regulados.

3.1. El principio de competencia en las relaciones intraordinamentales

Aunque en las relaciones internas rige por regla general la jerarquía, existen excepciones relevantes. La principal es la relación entre normas con rango de ley, que se rige por competencia y no por jerarquía.

La relación entre ley orgánica y ley ordinaria no es jerárquica: la Constitución reserva determinadas materias a ley orgánica, pero ello no convierte a la ley ordinaria en norma inferior.

En caso de conflicto, el Tribunal Constitucional ha admitido una prevalencia provisional de la ley orgánica, aunque ambas compartan rango formal.

Del mismo modo, la ley de presupuestos no tiene rango superior ni inferior respecto de otras leyes ordinarias. Su posición responde a una distribución competencial de contenido específico, no a una jerarquía. Tampoco la imposibilidad general de modificar tributos le atribuye inferioridad frente a leyes tributarias sustantivas.

En el ámbito autonómico ocurre algo similar: las leyes específicas o de mayoría reforzada previstas en los estatutos no son jerárquicamente superiores a las demás. El Tribunal Constitucional aplica aquí de forma clara el principio de competencia, rechazando la idea de “congelación” del contenido normativo por el hecho de existir una reserva estatutaria.

La excepción más admitida es la del estatuto de autonomía, que, como norma institucional básica de la comunidad autónoma, ocupa la cúspide del ordenamiento autonómico.

No debe confundirse la función de servir como parámetro de validez con la existencia de jerarquía. Que una norma delimite competencias o actúe como presupuesto de validez de otra no implica que tenga rango superior: esa función deriva de la Constitución, no de una superioridad intrínseca.

Una segunda excepción a la jerarquía dentro del mismo ordenamiento se encuentra en determinadas disposiciones administrativas estatales: los reales decretos del presidente del Gobierno y los reales decretos del Consejo de Ministros no se rigen entre sí por jerarquía, sino por competencia, conforme al art. 24.2 LG.

En definitiva, el principio de competencia ordena la distribución del poder normativo dentro y entre ordenamientos, explicando relaciones que no pueden entenderse mediante la mera jerarquía.

3.2. El principio de competencia en las relaciones interordinamentales

La relación entre el ordenamiento estatal y el autonómico no se rige por el principio de jerarquía, sino por el de competencia, como ha reiterado el Tribunal Constitucional. Ello supone que ninguno de los dos ordenamientos es superior al otro: cada uno actúa dentro del ámbito que le atribuye el bloque de constitucionalidad.

La distribución de competencias resulta de la Constitución, de los estatutos de autonomía, de las normas del art. 150 CE y de las normas delimitadoras de competencias, especialmente las bases estatales. El principio de competencia opera tanto en materias exclusivas como compartidas.

Así, puede prevalecer una norma básica estatal —incluso reglamentaria— frente a una ley autonómica de desarrollo, no por jerarquía, sino porque la Constitución atribuye al Estado la fijación de las bases. Si la norma autonómica contradice una norma estatal efectivamente básica (en sentido formal y material), incurre en inconstitucionalidad mediata: no vulnera directamente la Constitución, sino la norma que esta habilita para delimitar competencias.

En estos conflictos no basta con aplicar automáticamente la norma “superior”, porque no existe superioridad jerárquica entre Estado y comunidad autónoma. La resolución del conflicto exige un procedimiento específico y, cuando la norma cuestionada tiene rango legal, corresponde al Tribunal Constitucional declarar su invalidez.

Existe, no obstante, una situación singular en el ámbito local. Las normas locales son siempre reglamentarias y se mueven dentro de los límites fijados por la legislación estatal y autonómica.

En su contenido confluyen el principio de competencia y el de jerarquía: deben respetar las previsiones legales superiores, pero, dentro de ese marco, se relacionan entre sí conforme al principio de competencia.

4. PRINCIPIO DE SUPLETORIEDAD

4.1. El significado y la evolución del principio

La supletoriedad puede referirse a normas, a fuentes o a ordenamientos.

En sentido estricto, una norma es supletoria cuando se aplica en defecto de otra. También puede hablarse de supletoriedad entre fuentes (la costumbre en defecto de ley, los principios en defecto de ley y costumbre). Pero en Derecho público adquiere especial relevancia como técnica de integración entre ordenamientos: el art. 149.3 CE dispone que el Derecho estatal será, en todo caso, supletorio del Derecho de las Comunidades Autónomas.

El presupuesto de la supletoriedad no es la simple ausencia de regulación, sino la existencia de una laguna real, apreciada por el aplicador del Derecho. No toda falta de regulación es laguna: puede ser una opción deliberada del legislador. Además, antes de acudir al Derecho estatal, debe intentarse la integración con los propios principios y reglas del ordenamiento autonómico.

En cuanto al Derecho estatal que puede operar como supletorio, la jurisprudencia constitucional fue restringiendo progresivamente su alcance. Desde la STC 147/1991 se exigió que el Estado solo pudiera dictar normas supletorias cuando contara con un título competencial específico. Y la STC 61/1997 dio un paso decisivo: la supletoriedad no es un título competencial. El Estado no puede aprobar normas meramente supletorias si carece de competencia directa en la materia.

Esta doctrina supuso que el Estado no puede legislar con la única finalidad de cubrir hipotéticas omisiones autonómicas. La consecuencia es que la función supletoria ya no legitima por sí sola la producción normativa estatal. La integración corresponde al aplicador del Derecho cuando detecta una laguna no colmable internamente.

Con el tiempo, la práctica ha mostrado que el Estado dispone de otras vías para evitar vacíos normativos: la aprobación de legislación básica, el ejercicio de competencias residuales, la regulación de su propia organización o la normativa específica para territorios sin competencia legislativa.

El principio de supletoriedad no permite al legislador autonómico derogar formalmente normas estatales, pero sí puede desplazar su eficacia mediante el ejercicio efectivo de su propia competencia material. Así, la supletoriedad ha pasado de cumplir una función transitoria en el desarrollo del Estado autonómico a operar como técnica puntual de integración, subordinada siempre al principio de competencia.

4.2. El principio de la supletoriedad y la garantía del cumplimiento del derecho de la Unión Europea.

El cumplimiento del Derecho de la Unión Europea plantea un problema específico en el Estado autonómico, ya que el incumplimiento puede derivar de actuaciones u omisiones de distintas Administraciones.

La Ley Orgánica 2/2012 introdujo un mecanismo de responsabilidad: las Administraciones que provoquen el incumplimiento del Derecho de la Unión deben asumir, en la parte que les sea imputable, las consecuencias económicas derivadas. Este sistema fue desarrollado por el Real Decreto 515/2013. Aunque constituye un instrumento de presión relevante, no garantiza por sí mismo el cumplimiento efectivo del Derecho europeo.

Tradicionalmente se ha considerado que el principio de supletoriedad podría servir para asegurar la correcta transposición de directivas cuando las comunidades autónomas no ejercieran sus competencias. La jurisprudencia constitucional no es concluyente al respecto, aunque parte de la doctrina sostiene que el Estado podría dictar normas supletorias apoyándose en su competencia en materia de relaciones internacionales (art. 149.1.3 CE) y en el mandato del art. 93 CE de garantizar el cumplimiento de los tratados.

Sin embargo, esta solución solo cubriría un supuesto concreto: la falta de transposición de directivas. No resolvería otros incumplimientos más frecuentes o graves, como la transposición incorrecta o la deficiente aplicación del Derecho de la Unión.

Además, una política estatal preventiva de aprobación sistemática de normas supletorias desde la publicación de las directivas sería difícilmente compatible con la lógica del Estado autonómico.

La garantía del cumplimiento del Derecho de la Unión debe buscarse por vías distintas a una supletoriedad anticipada y generalizada, que podría erosionar el reparto constitucional de competencias.

5. PRINCIPIO DE PREVALENCIA

El principio de prevalencia es una regla constitucional de conflicto prevista en el art. 149.3 CE para los supuestos en que colisionan el ordenamiento estatal y el autonómico. Existe conflicto cuando ambos proporcionan soluciones incompatibles y excluyentes. La Constitución establece que las normas del Estado prevalecerán sobre las de las Comunidades Autónomas en todo lo que no esté atribuido a la competencia exclusiva de estas.

De esta previsión se deducen dos reglas: – Una regla expresa de prevalencia a favor del Derecho estatal. – Una regla implícita a favor del Derecho autonómico en materias de competencia exclusiva autonómica cuando el conflicto se produzca con Derecho estatal preconstitucional o con Derecho estatal dictado para otra comunidad autónoma al amparo de la cláusula residual del art. 149.3 CE.

5.1. Las posiciones doctrinales y jurisprudenciales hasta 2016

El principio de prevalencia, como el de supletoriedad, es una regla dirigida al operador jurídico (juez o Administración). Opera en el plano de la eficacia o aplicabilidad, no en el de la validez: determina qué norma debe aplicarse en caso de conflicto, pero no decide sobre su invalidez.

Además, solo actúa fuera del ámbito de las competencias exclusivas autonómicas.

Doctrinalmente se han defendido dos posiciones. Para unos, la prevalencia implica la aplicación incondicionada del Derecho estatal en caso de conflicto. Para otros, no puede desligarse completamente del principio de competencia, por lo que el aplicador debe realizar al menos un juicio positivo de validez de la ley estatal o comprobar la existencia de cobertura competencial suficiente antes de desplazar la norma autonómica.

Durante décadas, sin embargo, el principio fue prácticamente inaplicado. En la práctica del Estado autonómico se optó por resolver los conflictos entre ley estatal y ley autonómica como conflictos competenciales, no como meros conflictos normativos. Es decir, antes de aplicar la prevalencia debía determinarse la validez constitucional de las normas en conflicto.

La consecuencia fue clara: cuando el conflicto afectaba a normas con rango de ley, solo el Tribunal Constitucional podía resolverlo. Si el juez consideraba válida la ley estatal, debía plantear cuestión de inconstitucionalidad respecto de la ley autonómica; si dudaba de la validez de la ley estatal, debía cuestionar esta. El enfrentamiento entre ley estatal y ley autonómica se configuró así como un auténtico control de constitucionalidad (arts. 153 a) y 163 CE), reservado al Tribunal Constitucional (STC 163/1995).

Además, el Tribunal Constitucional añadió un refuerzo iusfundamental: si un órgano judicial inaplicaba una ley autonómica por estimarla contraria a las bases estatales sin plantear cuestión de inconstitucionalidad, vulneraba el derecho a la tutela judicial efectiva (arts. 24.1 y 24.2 CE), por extralimitarse en su función jurisdiccional (art. 117.1 CE).

Este modelo priorizaba el análisis del conflicto competencial sobre el conflicto normativo concreto. Sus ventajas eran claras: reforzaba el carácter centralizado de la justicia constitucional y otorgaba igual tratamiento a ley estatal y ley autonómica. Pero tenía una consecuencia práctica relevante: el principio de prevalencia quedaba prácticamente excluido en el ámbito de las competencias compartidas (bases estatales y desarrollo autonómico), precisamente donde se concentran la mayoría de los conflictos normativos.

5.2. La jurisprudencia constitucional posterior a 2016

Hasta 2016 el Tribunal Constitucional mantuvo una interpretación restrictiva del principio de prevalencia, rechazando las propuestas de los órganos judiciales para aplicarlo directamente. Sin embargo, a partir de ese año adoptó una concepción más “judicialista”, que permite a los jueces inaplicar normas autonómicas en determinados supuestos sin plantear cuestión de inconstitucionalidad. Esta nueva línea fue objeto de votos particulares críticos.

Las sentencias clave son las SSTC 102/2016, 204/2016 y 1/2017.

La STC 102/2016 abordó el caso de una ley autonómica que inicialmente era conforme con las bases estatales, pero que devino incompatible tras una modificación posterior de dichas bases, cuya constitucionalidad ya había sido confirmada por el Tribunal Constitucional. En este supuesto, el Tribunal permitió al juez aplicar directamente el principio de prevalencia e inaplicar la norma autonómica sin acudir nuevamente al control de constitucionalidad.

La STC 204/2016 amplió esta doctrina. En este caso, la norma autonómica no reproducía bases estatales preexistentes y la nueva norma estatal no había sido previamente enjuiciada por el Tribunal Constitucional. Aun así, el Tribunal entendió que el órgano judicial podía aplicar la prevalencia e inaplicar la ley autonómica cuando la incompatibilidad fuera sobrevenida. Con ello, la doctrina inicial, nacida en un supuesto muy específico, se extendió a más situaciones.

La STC 1/2017 introdujo una precisión relevante: el juez solo puede aplicar la prevalencia cuando la incompatibilidad sea sobrevenida, es decir, cuando derive de una modificación posterior de las bases estatales. Si la incompatibilidad es originaria, corresponde exclusivamente al Tribunal Constitucional resolver el conflicto mediante el control de constitucionalidad.

Esta reorientación ha sido discutida. Aunque el principio de prevalencia está previsto en la Constitución, su recuperación introduce una vía adicional —y limitada— para resolver conflictos normativos que pueden encubrir conflictos competenciales. Además, puede afectar a la seguridad jurídica y a la uniformidad interpretativa, dado que la identificación y delimitación de las bases estatales no siempre es sencilla.

Finalmente, la nueva doctrina debilita el privilegio jurisdiccional de la ley autonómica, pues permite su inaplicación por jueces ordinarios sin intervención del Tribunal Constitucional y sin que los órganos autonómicos tengan representación procesal en ese procedimiento, mientras que la ley estatal mantiene intacto su régimen reforzado de control.

6. PRINCIPIO DE PRIMACÍA

6.1. Significado

6.1.1. Primacía del Derecho de la Unión Europea

El principio de primacía es una construcción jurisprudencial del Tribunal de Justicia, formulada en el asunto Costa/ENEL (1964). Se fundamenta en la autonomía del Derecho de la Unión, en la cesión de competencias por los Estados miembros y en el carácter vinculante de los Tratados. A diferencia de los tratados internacionales ordinarios, el Tratado constitutivo creó un ordenamiento jurídico propio, integrado en los sistemas internos y vinculante para sus jueces.

La consecuencia es clara: ninguna norma interna, anterior o posterior, puede oponerse al Derecho de la Unión sin poner en cuestión su propia naturaleza. La primacía no depende del Derecho interno, sino del propio Derecho de la Unión y de la interpretación exclusiva del Tribunal de Justicia.

El Tribunal Constitucional español ha asumido esta lógica, pero distingue entre primacía y supremacía. La primacía es aplicativa, no jerárquica: implica desplazamiento en la aplicación, no invalidez. La supremacía constitucional se mantiene en el plano jerárquico, pero la Constitución, a través del art. 93 CE, ha permitido la cesión de competencias y, con ello, la aplicación preferente del Derecho de la Unión en su ámbito propio. Son planos distintos y compatibles.

6.1.2. Primacía de los tratados internacionales ratificados

Los tratados internacionales ratificados y publicados en el BOE también despliegan una primacía aplicativa frente a las normas internas. El propio legislador habla de “prevalencia”, salvo frente a la Constitución. En caso de conflicto, el juez ordinario puede desplazar la norma interna y aplicar preferentemente el tratado, sin expulsar aquella del ordenamiento, sino simplemente inaplicándola al caso concreto.

Este control de convencionalidad corresponde a los órganos judiciales. Si el juez considera que el tratado vulnera la Constitución, puede plantear cuestión de inconstitucionalidad, pero la eventual declaración afectaría a la constitucionalidad interna, no a la validez internacional del tratado.

A diferencia de los tratados, el Derecho derivado de la Unión no puede ser objeto de control de constitucionalidad interno. Dada su enorme relevancia cuantitativa y cualitativa en el ordenamiento, ello exige precisar cuidadosamente el alcance y los límites de su primacía aplicativa.

6.2. Consecuencias de la primacía del Derecho de la Unión Europea

6.2.1. Consecuencias sobre los operadores jurídicos

La jurisprudencia Simmenthal establece que todo juez nacional debe inaplicar cualquier norma interna incompatible con el Derecho de la Unión, siempre que no sea posible una interpretación conforme. La inaplicación es la consecuencia directa de la primacía y garantiza la plena eficacia del Derecho europeo.

El juez debe realizar esa inaplicación por iniciativa propia, sin esperar a que la norma interna sea derogada o anulada por otra vía. Además, puede plantear cuestión prejudicial ante el Tribunal de Justicia si tiene dudas sobre la interpretación o alcance del Derecho de la Unión (art. 267 TFUE).

Este mecanismo refuerza el papel de los jueces nacionales como jueces europeos y les otorga una facultad de inaplicación que deriva directamente del Derecho de la Unión.

Desde 2015, el art. 4 bis LOPJ reconoce que jueces y tribunales aplicarán el Derecho de la Unión conforme a la jurisprudencia del Tribunal de Justicia, consolidando así su posición.

La primacía también vincula a las autoridades administrativas. Según la doctrina Costanzo, deben dejar sin aplicar disposiciones o actos nacionales incompatibles con el Derecho de la Unión, sin esperar una declaración previa del Tribunal de Justicia. Aunque esta “primacía administrativa” ha sido discutida doctrinalmente, el Tribunal de Justicia y el Tribunal Supremo español la han confirmado.

6.2.2. Consecuencias sobre las normas y los actos incompatibles

El efecto general de la primacía es la inaplicación o desplazamiento, no la invalidez.

En el caso de normas con rango legal, el juez debe inaplicarlas si son incompatibles con el Derecho de la Unión. No se produce su expulsión del ordenamiento, sino la pérdida de aplicabilidad en el caso concreto. El Tribunal Constitucional no declara su nulidad por esa razón, pues el Derecho de la Unión no es canon autónomo de constitucionalidad.

En cambio, respecto de normas reglamentarias, el Tribunal Supremo ha declarado su nulidad de pleno derecho cuando son incompatibles con el Derecho de la Unión. Esta solución se basa en categorías internas de jerarquía normativa y resulta discutida por su carácter asistemático.

Los actos administrativos incompatibles también deben ser dejados sin efecto. La Administración está obligada a no aplicar actos dictados al amparo de normas internas contrarias al Derecho de la Unión, garantizando así la efectividad del principio de primacía.

6.3. Límites de la primacía del Derecho de la Unión Europea

La primacía no es absoluta ni incondicionada. Su alcance y modo de operar se ven modulados por otros principios y categorías que delimitan su ejercicio, especialmente en relación con la supremacía constitucional, la identidad constitucional y la articulación competencial dentro del Estado.

6.3. Límites de la primacía del Derecho de la Unión Europea

6.3.1. El principio de atribución

La Unión Europea no tiene competencia universal. Sus competencias se rigen por el principio de atribución (art. 5.1 TUE): solo puede actuar en las materias que los Estados le han cedido expresamente en los Tratados. Las competencias no atribuidas permanecen en los Estados (art. 4.1 TUE), y determinadas funciones esenciales —integridad territorial, orden público y seguridad nacional— siguen siendo responsabilidad exclusiva estatal (art. 4.2 TUE).

El respeto al principio de atribución es condición para que opere la primacía. Solo las normas europeas dictadas dentro de competencias atribuidas pueden desplazar normas internas incompatibles. Así lo afirmó el Tribunal Constitucional en la Declaración 1/2004: la primacía es aplicativa y limitada al ámbito de las competencias cedidas, no es general ni jerárquica.

Ahora bien, ni los Estados ni sus autoridades pueden inaplicar por sí mismos un acto vinculante de la Unión alegando falta de competencia. Si consideran que la Unión ha excedido sus competencias, deben acudir a los cauces previstos en el propio Derecho de la Unión: recurso de anulación ante el Tribunal de Justicia (art. 263 TFUE) o cuestión prejudicial de validez (art. 267 TFUE).

El ejercicio de las competencias europeas también está limitado por los principios de subsidiariedad y proporcionalidad (art. 5 TUE). La Unión solo debe intervenir cuando los objetivos no puedan alcanzarse suficientemente por los Estados y su actuación no puede exceder de lo necesario para lograr los fines de los Tratados.

6.3.2. La identidad nacional

El Derecho primario impone a la Unión el respeto de la identidad nacional de los Estados miembros, inherente a sus estructuras políticas y constitucionales fundamentales, incluida la autonomía local y regional (art. 4.2 TUE).

La identidad nacional constituye la única limitación expresa en los Tratados a la primacía del Derecho de la Unión. No obstante, su interpretación corresponde en última instancia al Tribunal de Justicia. Los tribunales constitucionales nacionales no pueden unilateralmente dejar de aplicar una norma europea alegando vulneración de la identidad nacional tal como ellos la definan.

La noción de identidad nacional se refiere a singularidades estructurales o valores constitucionales propios de cada Estado. Los valores comunes a todos los Estados miembros no requieren esta protección específica, pues forman parte del fundamento común de la Unión (art. 2 TUE).

En situaciones de conflicto sensible, el Tribunal de Justicia puede modular la primacía atendiendo a la identidad nacional, en un marco de cooperación con los órganos constitucionales estatales.

Se trata de una válvula de equilibrio entre integración europea y preservación de las estructuras constitucionales básicas de cada Estado.

6.3.3. La autonomía institucional y procedimental de los Estados miembros

La Unión Europea responde a un modelo de “federalismo de ejecución”: las instituciones europeas elaboran las normas y supervisan su cumplimiento, pero la ejecución corresponde, con carácter general, a los Estados miembros. Son sus autoridades administrativas y judiciales quienes aplican el Derecho de la Unión, adoptando todas las medidas internas necesarias (art. 291.1 TFUE). Solo excepcionalmente, cuando se requieran condiciones uniformes de ejecución, se atribuyen competencias ejecutivas a instituciones europeas (art. 291.2 TFUE).

La regla general es, por tanto, la ejecución descentralizada, y la excepción la ejecución centralizada. Esta técnica permite conciliar la unidad del Derecho de la Unión con la diversidad organizativa de los Estados.

En este contexto se habla del principio de autonomía institucional, procedimental y procesal: los Estados ejecutan el Derecho de la Unión conforme a su propio sistema organizativo, sus procedimientos y su distribución interna de competencias. No existe una competencia general de la Unión para regular la organización administrativa o las vías procesales nacionales.

Sin embargo, esta “autonomía” no es un ámbito reservado frente a la Unión. Está limitada por los principios de atribución, subsidiariedad y proporcionalidad. Cuando la Unión tenga competencia —por ejemplo, en materias exclusivas como el régimen aduanero (art. 3.1 a) TFUE)— puede unificar tanto las normas materiales como las procedimentales. En las competencias compartidas, lo habitual es que la Unión establezca el marco material y deje la ejecución a los Estados.

Además, incluso cuando la Unión no haya regulado el procedimiento, la autonomía estatal está condicionada por el principio de cooperación leal. Este se concreta en dos exigencias acumulativas: a) Principio de equivalencia: las normas nacionales aplicables al Derecho de la Unión no pueden ser menos favorables que las aplicables a situaciones puramente internas. b) Principio de efectividad: las normas nacionales no pueden hacer imposible o excesivamente difícil el ejercicio de los derechos conferidos por el Derecho de la Unión.

Si se vulnera alguno de estos principios, la consecuencia es la inaplicación de la norma procedimental o procesal nacional incompatible, garantizando así la plena efectividad del Derecho de la Unión.

7. PRINCIPIOS DE INTERPRETACIÓN CONFORME

El ordenamiento jurídico español reconoce tres modalidades principales de interpretación conforme: a) Interpretación conforme a la Constitución (art. 5 LOPJ). b) Interpretación conforme a los tratados internacionales sobre derechos humanos (art. 10.2 CE). c) Interpretación conforme al Derecho de la Unión Europea.

Su rasgo esencial es la imperatividad: no constituyen meras orientaciones doctrinales, sino mandatos jurídicos obligatorios para todos los aplicadores del Derecho. Son expresión de la interacción entre sistemas jurídicos derivada de tres procesos: constitucionalización del ordenamiento, vinculación al Derecho internacional de los derechos humanos y europeización del Derecho interno. Se trata de una técnica de coordinación normativa, incluso interordinamental.

Puede ampliarse su alcance, por ejemplo, mediante la interpretación conforme a otros tratados internacionales ratificados por España. Así ocurre con la Carta Europea de la Autonomía Local, que el Tribunal Supremo ha considerado instrumento relevante para interpretar el principio constitucional de autonomía local.

7.1. La interpretación conforme con la Constitución

El Tribunal Constitucional fundamentó este principio en el carácter de la Constitución como ley superior y posterior, así como en la necesidad de evitar lagunas en el ordenamiento (STC 4/1981).

La interpretación conforme permitió asegurar la continuidad del Derecho preconstitucional tras 1978, evitando tanto su conservación intacta como su derogación masiva. Solo procede la derogación cuando la incompatibilidad con la Constitución sea insalvable.

El juez ordinario fue encargado de aplicar esta técnica, garantizando la supremacía constitucional sin provocar vacíos normativos. La jurisdicción constitucional ha sido protagonista en la reinterpretación de numerosas instituciones del Derecho administrativo y penal conforme a los principios constitucionales, especialmente en materia sancionadora.

La interpretación conforme no se limita a leyes preconstitucionales. La proliferación normativa actual exige su aplicación constante también respecto de leyes posconstitucionales, incluidas las relativas a la distribución competencial. En la jurisdicción constitucional, las interpretaciones conformes suelen incorporarse expresamente al fallo para reforzar la seguridad jurídica.

Además, los jueces y tribunales están obligados a interpretar leyes y reglamentos conforme a la Constitución y a la doctrina del Tribunal Constitucional (art. 5.1 LOPJ). Solo pueden plantear cuestión de inconstitucionalidad cuando la interpretación conforme no sea posible, aunque esta exigencia no se aplica de forma rígida.

7.2. La interpretación conforme con los tratados internacionales sobre derechos humanos

El art. 10.2 CE establece que las normas relativas a los derechos fundamentales y libertades se interpretarán conforme a la Declaración Universal de Derechos Humanos y a los tratados internacionales ratificados por España. No se trata solo de integrar estos tratados en el ordenamiento interno (art. 96 CE), sino de utilizarlos como criterio de interpretación constitucional de los derechos fundamentales.

Esto implica que la interpretación conforme opera en un plano superior: el constitucional. Un juez puede inaplicar una ley contraria a un tratado internacional; y, si la interpretación constitucional de un derecho fundamental coincide con el estándar internacional, el Tribunal Constitucional puede declarar la inconstitucionalidad y nulidad de la norma legal incompatible.

El art. 10.2 CE cumple una doble función: actualizar permanentemente el contenido de los derechos fundamentales y coordinar el nivel interno de protección con el estándar internacional.

Los derechos dejan así de ser solo límites internos al poder estatal para convertirse también en límites externos derivados del Derecho internacional de los derechos humanos.

Desde el inicio, el Tribunal Constitucional destacó que la Constitución se inserta en un sistema universal de valores y principios en materia de derechos fundamentales. Inicialmente, esta técnica permitió dotar de contenido mínimo a preceptos constitucionales aún no desarrollados jurisprudencialmente; hoy su función es asegurar la adaptación continua del sistema interno a la evolución internacional.

Entre los tratados relevantes destaca el Convenio Europeo de Derechos Humanos, cuya interpretación por el Tribunal Europeo de Derechos Humanos tiene especial peso por su carácter dinámico y vinculante para los Estados parte. La jurisprudencia constitucional y del Tribunal Supremo recurre de forma habitual a esta doctrina.

La interpretación conforme no se limita a tratados interpretados por órganos jurisdiccionales.

También debe atenderse a la interpretación realizada por órganos internacionales no judiciales competentes, como los comités de Naciones Unidas, cuyas resoluciones y observaciones pueden orientar la interpretación constitucional de los derechos fundamentales.

7.3. La interpretación conforme con el Derecho de la Unión Europea

7.3.1. Introducción

Las relaciones entre el Derecho de la Unión Europea y el Derecho estatal no responden a la clásica lógica monista o dualista, sino a una doble lógica: la autonomía del Derecho de la Unión y su integración en el ordenamiento interno.

Desde la perspectiva de la autonomía, el principio de interpretación conforme opera dentro del propio ordenamiento europeo: el Derecho secundario debe interpretarse conforme al Derecho primario, incluida la Carta de Derechos Fundamentales. Su fundamento es la supremacía del Derecho primario sobre el secundario.

Desde la perspectiva de la integración, el principio actúa en los Estados miembros. Muchas normas internas encuentran su fundamento o sus condiciones de aplicación en normas europeas, por lo que deben interpretarse de manera coherente con ellas.

Este principio se conecta con el mecanismo de cooperación jurisdiccional del art. 267 TFUE (cuestión prejudicial), que permite a los jueces nacionales plantear al Tribunal de Justicia dudas sobre validez e interpretación del Derecho de la Unión aplicable al litigio. La interpretación conforme refuerza así la coherencia y efectividad del sistema.

7.3.2. Fundamento

El Tribunal de Justicia ha fundamentado la obligación de interpretación conforme en varios argumentos.

En primer lugar, el carácter obligatorio de los actos jurídicos europeos (art. 288 TFUE). Si las normas europeas son vinculantes y priman sobre las internas incompatibles, resulta lógico que las normas nacionales relacionadas con ellas deban interpretarse de conformidad con el Derecho de la Unión.

En segundo lugar, el principio de cooperación leal (art. 4.3 TUE). Este obliga a las autoridades estatales —incluidos los jueces— a adoptar todas las medidas necesarias para garantizar el cumplimiento del Derecho de la Unión y a abstenerse de actuaciones que lo pongan en peligro.

La interpretación conforme es uno de los instrumentos principales para cumplir esa obligación.

En tercer lugar, el Tribunal de Justicia ha señalado que esta exigencia es inherente al sistema del Tratado, pues permite a los órganos jurisdiccionales nacionales asegurar la plena eficacia del Derecho de la Unión dentro de sus competencias.

En definitiva, la interpretación conforme no solo preserva la primacía y unidad del ordenamiento europeo, sino que constituye un instrumento esencial para garantizar el cumplimiento efectivo de las obligaciones asumidas por los Estados miembros en un sistema descentralizado de ejecución.

7.3.3. Objeto y alcance

El principio de interpretación conforme al Derecho de la Unión se caracteriza por la amplitud del “bloque de interpretación”. Las normas internas que entren en el ámbito de aplicación del Derecho de la Unión deben interpretarse conforme al conjunto de este: Derecho primario, Derecho secundario y principios generales.

El principal motor de la interpretación conforme es la directiva. Dado que requiere transposición interna, la norma nacional debe interpretarse siempre a la luz de la directiva correspondiente. El juez nacional debe interpretar el Derecho estatal, en la medida de lo posible, de forma coherente con el Derecho de la Unión y, si existen dudas sobre su alcance, plantear cuestión prejudicial ante el Tribunal de Justicia.

La jurisprudencia europea formula esta obligación en términos amplios: el juez debe hacer “todo lo posible” para lograr una interpretación conforme. Esta fórmula impulsa la integración, pero respeta los límites del ordenamiento interno.

La obligación de interpretación conforme tiene límites claros: a) Se ejerce por el juez nacional dentro de sus competencias. No altera la distribución interna entre legislador y juez. b) Requiere la existencia de una norma interna susceptible de interpretación conforme. No autoriza una interpretación contra legem. Si no es posible una interpretación conforme, el juez debe inaplicar la norma interna incompatible. c) Solo opera dentro del ámbito de aplicación del Derecho de la Unión. Determinar ese ámbito puede ser complejo, especialmente cuando la norma interna amplía el alcance de la directiva. d) Se refiere principalmente a normas vinculantes (en especial directivas), aunque el Tribunal de Justicia ha reconocido relevancia interpretativa a actos no vinculantes como recomendaciones. e) Está limitada por principios generales del Derecho de la Unión, como seguridad jurídica, irretroactividad y legalidad penal. No puede crearse o agravarse responsabilidad sancionadora por vía interpretativa. f) El plazo de transposición también influye. Antes de su vencimiento, la intensidad de la interpretación conforme es menor; una vez expirado, la exigencia es plena.

En definitiva, la interpretación conforme obliga al juez a movilizar todos los recursos del ordenamiento interno —normas, métodos interpretativos y técnicas de resolución de conflictos— para evitar resultados contrarios al Derecho de la Unión y garantizar su efectividad.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();

function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
