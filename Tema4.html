document.addEventListener("DOMContentLoaded", () => {
  const errBox = document.getElementById("errBox");

  function showErr(msg){

    errBox.textContent = msg;
    errBox.classList.add("show");
  }

  window.addEventListener("error", (e)=>{

  });

  try{
    /* =========================
       ✅ PUNTUACIÓN (UNA SOLA VEZ)
    ========================= */
    const SCORE_OK = 0.5;
    const SCORE_BAD = 0.20;   // resta
    const SCORE_BLANK = 0;    // no suma ni resta

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LAS OTRAS NORMAS CON VALOR REGLAMENTARIO.
1.1. Introducción.
La doctrina del Derecho administrativo se construyó sobre categorías elaboradas en los siglos
XVIII y XIX, especialmente en torno a la ley y al principio de legalidad, tomando como modelo las
Administraciones estatales. Ello provocó que otras formas de poder y administración quedaran
teóricamente subordinadas a esquemas pensados para el Estado, obligándolas a adaptarse a
conceptos ajenos o, incluso, siendo ignoradas cuando no encajaban en ese modelo. Esta
insuficiencia se manifiesta con claridad en la teoría general del reglamento, concebida desde la
relación ley-reglamento propia del binomio Parlamento-Gobierno.
La creación de las Comunidades Autónomas permitió proyectar con relativa facilidad ese
esquema, pues también reproducen la dialéctica entre potestad legislativa y potestad
reglamentaria, atribuida al Gobierno conforme al art. 97 CE y a los estatutos de autonomía. Sin
embargo, el ordenamiento jurídico no se agota en ese binomio. Existen otras entidades públicas
que dictan normas sin rango legal y, por tanto, con valor reglamentario, pero que no se ajustan
plenamente al esquema clásico.
Estas normas comparten con el reglamento el rango normativo, el régimen de invalidez y las
modalidades de control, aunque difieren en su procedimiento de elaboración, en su función y en
su relación con la ley. Así, la norma local puede dictarse “de acuerdo con la ley” o “sin oponerse a
la ley”, mientras que la norma foral puede dictarse “de acuerdo con la ley” e incluso “en lugar de
la ley”, con sujeción directa a la Constitución y al estatuto de autonomía, lo que implica un
régimen de control distinto.
La distinción clásica entre potestad legislativa y reglamentaria responde a la división de poderes
en un mismo ordenamiento, mientras que la autonomía local, foral o universitaria y la
independencia funcional de ciertos entes obedecen a la distribución territorial del poder, a la
autoadministración o a la descentralización instrumental, generando ordenamientos propios
integrados en la unidad del ordenamiento jurídico. Por ello, categorías como reglamento ejecutivo
o independiente no resultan necesariamente determinantes fuera del ámbito estatal.
Ante las insuficiencias del esquema tradicional, se propone utilizar la expresión “norma con valor
reglamentario” como categoría genérica que englobe todas aquellas normas carentes de rango
legal. Dentro de ella se distinguen diversas modalidades: reglamentos y disposiciones
administrativas, ordenanzas locales, normas forales, estatutos de corporaciones de derecho
público y normas de autoridades administrativas independientes, atendiendo tanto a la potestad
normativa ejercida como a su relación con la ley.
2. LAS ORDENANZAS LOCALES.
2.1. La potestad normativa local: fundamento y ejercicio.
La potestad normativa local encuentra su fundamento en la autonomía local reconocida por los
arts. 137, 140 y 141 CE a municipios, provincias e islas para la gestión de sus respectivos
intereses. La LBRL confirma esta potestad en el ámbito de sus competencias. Otras entidades
locales pueden ejercer potestad normativa si así lo prevén los estatutos de autonomía, pues su
autonomía no está constitucionalmente garantizada, sino que depende del legislador autonómico.
Las mancomunidades también pueden tener potestad reglamentaria cuando sea necesaria para
el cumplimiento de sus fines.
La autonomía implica capacidad para dictar normas y configurar un ordenamiento propio. La
cuestión no es si existe potestad normativa, sino sobre qué materias se proyecta y cuál es su
alcance. La Constitución garantiza la autonomía local, pero corresponde al legislador estatal y
autonómico concretar su contenido, respetando esa garantía. La autonomía exige un ámbito
propio de decisión y gestión, no mera ejecución de decisiones ajenas.
La potestad normativa corresponde al pleno municipal o al pleno de la diputación provincial.
Según su objeto, las normas reciben distintas denominaciones: reglamentos orgánicos,
ordenanzas, planes urbanísticos y presupuestos. Los bandos de los alcaldes, mayoritariamente
considerados no normativos, han reabierto el debate sobre su naturaleza jurídica tras su uso
durante la pandemia.
El procedimiento de elaboración de las ordenanzas comprende tres fases: 1) aprobación inicial
por el pleno 2) información pública y audiencia durante un mínimo de treinta días 3) resolución de
reclamaciones y aprobación definitiva. Si no se presentan reclamaciones, el acuerdo provisional
queda definitivamente adoptado.
Las ordenanzas y el articulado de los planes urbanísticos deben publicarse íntegramente en el
Boletín Oficial de la Provincia y comunicarse a la Administración competente. Entran en vigor a
los quince días hábiles desde la recepción de la comunicación. En cambio, presupuestos y
ordenanzas fiscales entran en vigor inmediatamente tras su publicación íntegra conforme a la
LHL. Además, las entidades locales deben facilitar copia del planeamiento vigente a quienes lo
soliciten.
2.2. La relación con la ley.
2.2.1. La garantía constitucional de la autonomía local constituye un límite para el legislador.
El constituyente no predeterminó el contenido concreto de la autonomía local, lo que otorga al
legislador estatal y autonómico amplia libertad de configuración mediante la legislación de
régimen local y la sectorial. Sin embargo, esa libertad tiene un límite: el respeto a la garantía
constitucional de la autonomía local. A diferencia de los derechos fundamentales, cuyo contenido
está parcialmente definido por la Constitución, la autonomía local carece de un contenido
constitucional detallado, más allá de la exigencia de un ámbito propio de decisión.
La intervención legislativa es imprescindible para concretar la autonomía local, pero una ley que
la vulnere sería inconstitucional y podría ser anulada por el Tribunal Constitucional, ya sea
mediante recurso de inconstitucionalidad o a través del conflicto en defensa de la autonomía
local.
2.2.2. La ley constituye un límite para la norma local.
La ley delimita el contenido posible de la norma local y esta no puede contener preceptos
contrarios a ella. El art. 55 TRRL establece que las ordenanzas no podrán contener disposiciones
opuestas a las leyes, expresión que ha generado interpretaciones diversas. Algunos han
entendido que consagra una “vinculación negativa”, según la cual la ley actúa como límite pero
no como marco cerrado, dejando margen de configuración en lo no regulado.
Sin embargo, esta noción resulta confusa. Las entidades locales nunca actúan en un vacío legal,
sino dentro de un espacio delimitado por el conjunto del ordenamiento jurídico, que impone
límites competenciales, procedimentales, organizativos, presupuestarios y derivados de los
derechos fundamentales. La subordinación a la ley se deriva del principio de jerarquía normativa y
del sometimiento pleno a la ley y al Derecho. Los conceptos de vinculación positiva y negativa,
más que aclarar, tienden a oscurecer la relación real entre ley y norma local.
2.2.3. La norma local no está vinculada positivamente a la ley.
La ley constituye el límite de la norma local, pero no su fundamento. El fundamento de la
potestad normativa local es la autonomía reconocida por la Constitución, y en su caso el poder
tributario local del art. 133.2 CE. La ley configura el contenido de esa autonomía y delimita su
espacio de actuación, pero la norma local no tiene como función ejecutar la ley ni
complementarla, sino expresar una capacidad propia de ordenación e intervención dentro del
ámbito de los intereses locales.
Esta potestad no es ilimitada, pues está circunscrita a la gestión de los propios intereses, pero
tampoco es una potestad de mera ejecución normativa. La norma local no es el último eslabón
de una cadena que comienza en la ley y continúa con el reglamento estatal o autonómico. Si la
ley regulase de forma exhaustiva el contenido de la norma local sin justificación razonable, podría
vulnerarse la autonomía local.
La norma local tampoco puede calificarse como reglamento independiente en el sentido propio
del Gobierno. La distinción reglamento ejecutivo/independiente solo resulta adecuada respecto
de los reglamentos gubernamentales. La jurisprudencia ha admitido que, en ausencia de
prohibición legal, la ordenanza puede configurar políticas propias dentro del ámbito competencial
local.
2.2.4. La norma local y la legislación sectorial.
El art. 25 LBRL reconoce competencias propias de los entes locales, pero su delimitación
concreta se realiza a través de la legislación sectorial estatal o autonómica. Esta legislación debe
asegurar la intervención local en los asuntos que afecten directamente a su círculo de intereses,
garantizando la efectividad de la autonomía constitucionalmente reconocida.
La ausencia de regulación sectorial específica o la falta de precisión en la misma no impide al
ente local ejercer su potestad normativa en el ámbito de sus competencias. Sin embargo, si
posteriormente el legislador sectorial concreta o redefine ese ámbito competencial, la norma local
deberá adaptarse a la nueva regulación.
2.2.5. La norma local y las restricciones de la libertad general.
Parte de la doctrina sostiene que toda restricción de la libertad personal requiere autorización
legal, no solo en el ámbito de los derechos fundamentales del art. 53.1 CE, sino también en virtud
del principio general de libertad derivado del art. 10.1 CE y del reconocimiento de la libertad
como valor superior del art. 1.1 CE. Esta exigencia pretende garantizar aquellas manifestaciones
de libertad no cubiertas por derechos fundamentales específicos.
Aunque el art. 84.1 LBRL reconoce diversos instrumentos de intervención local —ordenanzas,
licencias, comunicaciones previas, controles posteriores—, ello no legitima cualquier restricción
de la libertad sin cobertura legal. La intervención local debe ajustarse a los principios de igualdad,
necesidad y proporcionalidad. En consecuencia, puede deducirse que la norma local necesita
una autorización legal para imponer restricciones a la libertad de los individuos.
2.3. La vinculación a la reserva de ley.
2.3.1. El quid de la cuestión: las potestades sancionadora y tributaria.
Los estudios sobre la reserva de ley han analizado tradicionalmente la relación entre ley y
reglamento, sin atender suficientemente a las peculiaridades de las normas locales. El problema
se manifiesta especialmente en dos materias en las que los entes locales sí ejercen potestad
normativa: la potestad sancionadora y la potestad tributaria. En estos ámbitos, la interpretación
más o menos estricta de la reserva de ley incide directamente en el alcance de la autonomía
local.
Desde 1992 se abrió un debate sobre si, en materias reservadas a ley, la ordenanza local debía
situarse en la misma posición que el reglamento ejecutivo o si, por el contrario, debía
reconocérsele una posición distinta. El Tribunal Constitucional afirmó que el art. 25.1 CE
establece una reserva de ley en materia sancionadora, pero no la entendió en sentido absoluto,
permitiendo el desarrollo reglamentario cuando la ley lo autoriza. El Gobierno puede completar la
ley mediante regulación subordinada, no autónoma.
La controversia se intensificó con el art. 129 LRJPAC, que evidenció la limitada capacidad
sancionadora local. Parte de la doctrina propuso flexibilizar la reserva de ley respecto de las
ordenanzas locales. El Real Decreto 1398/1993 reconoció que las ordenanzas podían tipificar
sanciones para completar y adaptar la ley, lo que generó críticas doctrinales y abrió una reflexión
sobre cómo conciliar autonomía local y reserva de ley.
2.3.2. La interpretación tradicional y su crítica.
La interpretación tradicional ha equiparado la ordenanza local al reglamento ejecutivo,
entendiendo que la reserva de ley opera con igual intensidad respecto de ambas. Según esta
posición, la ordenanza solo puede desarrollar una regulación legal previa, sin poder tipificar
infracciones ni establecer sanciones no previstas en la ley.
Las consecuencias de esta interpretación son relevantes: si no existe ley que establezca el
régimen sancionador, el ente local no puede atribuirse potestad sancionadora ni imponer
sanciones por infracciones de sus propias normas. Ello puede conducir a regulaciones locales
ineficaces.
Esta situación genera una tensión entre dos mandatos constitucionales: la garantía de la
autonomía local y la reserva de ley. Para evitar que uno anule al otro, parte de la doctrina propone
una interpretación sistemática que module el alcance de la reserva de ley en materias que son
competencia indiscutible de los entes locales, buscando la concordancia práctica entre ambas
instituciones.
2.3.3. Los argumentos a favor de la modulación.
La tesis de la modulación de la reserva de ley respecto de las ordenanzas locales se ha
fundamentado en diversos argumentos, aunque los más sólidos son el institucional y el
representativo.
El argumento histórico se apoya en la tradición preconstitucional, recordando que antiguas leyes
penales admitían que las ordenanzas municipales establecieran sanciones administrativas. Sin
embargo, este argumento no resulta concluyente, pues el marco constitucional actual incorpora
reservas de ley y garantías de derechos fundamentales que no existían en esos periodos
históricos.
El argumento pragmático sostiene que, sin potestad sancionadora propia, la actuación local
podría quedar ineficaz. También se ha invocado la teoría de los poderes implícitos, según la cual
los entes locales necesitarían potestad sancionadora para ejercer sus competencias. No
obstante, esta teoría no encaja plenamente en el contexto de un Estado de Derecho.
El argumento de subsidiariedad destaca que ciertas materias, por su carácter estrictamente local,
deben poder regularse adecuadamente en ese ámbito. Aunque relevante, este argumento se
integra en el institucional.
El argumento representativo o democrático subraya que la norma local es aprobada por un
órgano con legitimidad democrática, el pleno de la entidad local, lo que le otorga un valor
superior al reglamento dictado por un órgano ejecutivo. El Tribunal Constitucional ha reconocido
este plus democrático, aunque sin equiparar la ordenanza a la ley ni permitir que desplace la
reserva de ley. La equiparación plena erosionaría el concepto de ley y produciría una
fragmentación incompatible con el principio democrático.
El argumento institucional es el más sólido. La autonomía local, garantizada constitucionalmente,
reconoce a los entes locales un espacio propio de gobierno y gestión. Dentro de ese espacio, la
norma local no actúa como simple instrumento auxiliar de la ley, sino como expresión de una
capacidad propia de ordenación. Dado que tanto la reserva de ley como la autonomía local son
mandatos constitucionales, su coexistencia exige modular el alcance ordinario de la reserva de
ley para respetar ambas instituciones simultáneamente.
2.3.4. Las SSTC 233/1999 y 132/2001.
Durante las primeras décadas de jurisprudencia constitucional se aplicó una concepción uniforme
de la reserva de ley. Sin embargo, la STC 233/1999 introdujo una interpretación flexible en
materia de tasas y precios públicos locales, reconociendo a las ordenanzas municipales un
margen de regulación mayor que el del reglamento estatal ordinario.
La STC 132/2001 confirmó esta doctrina y la extendió a la potestad sancionadora local, aunque
subrayó que la reserva de ley sancionadora del art. 25.1 CE es más estricta que la tributaria. La
diferencia se fundamenta en que la reserva tributaria protege la autodisposición en el
establecimiento de deberes fiscales y la igualdad de los contribuyentes, mientras que la reserva
sancionadora garantiza la posición jurídica del ciudadano frente al poder punitivo del Estado.
Además, en el ámbito tributario existe un elemento sinalagmático —la contraprestación por un
servicio— que no concurre en las sanciones.
El Tribunal afirmó que la exigencia de ley debe ser flexible en materias donde exista interés local y
la regulación sea aprobada por el pleno municipal. No obstante, no suprimió la reserva de ley en
materia sancionadora: la mera atribución competencial a los municipios no les permite tipificar
libremente infracciones y sanciones. La ley no necesita definir cada ilícito, pero sí debe establecer
criterios mínimos de antijuridicidad que orienten la tipificación municipal y determinar las clases
de sanciones que pueden imponerse.
En síntesis, la reserva de ley se modula en favor de la ordenanza municipal en materias tributarias
con componente sinalagmático y en materia sancionadora, ampliando el espacio normativo local
respecto del reglamento ordinario, sin eliminar la intervención mínima del legislador.
2.3.5. La adecuación posterior de la legislación estatal de régimen local.
Como consecuencia de la STC 132/2001, en 2003 se incorporó a la LBRL un nuevo título XI que
regula la tipificación de infracciones y sanciones por los entes locales. Estas disposiciones
permiten a los municipios, en ausencia de normativa sectorial específica, tipificar infracciones y
establecer sanciones en materias vinculadas a la convivencia y al uso de servicios,
equipamientos e infraestructuras públicas.
La regulación exige respetar los criterios establecidos en la ley y fija límites económicos,
estableciendo una cuantía máxima para las infracciones muy graves. Con ello se reconoce un
espacio normativo local en ámbitos sensibles para la convivencia que suelen quedar fuera de la
legislación sectorial, conciliando la autonomía local con las exigencias derivadas de la reserva de
ley.
3. LAS NORMAS FORALES.
Las normas forales reflejan la singularidad del ordenamiento de los Territorios Históricos y tienen
su fundamento en la autonomía de los órganos que las aprueban. Para comprender su naturaleza
es necesario partir de los fundamentos constitucionales y estatutarios de la potestad normativa
foral, así como de su especial régimen de control.
3.1. La potestad normativa foral: fundamento y ejercicio.
Los Territorios Históricos de Araba/Álava, Bizkaia y Gipuzkoa no son simples entidades locales
provinciales, sino entidades con doble naturaleza: local y política, integradas en la Comunidad
Autónoma del País Vasco. Esta singularidad se refleja en la legislación estatal, que reconoce
peculiaridades en su organización y en su régimen competencial.
Sus competencias tienen doble origen: proceden tanto de su condición de entidades locales,
conforme a la legislación básica estatal, como de su condición de entidades políticas según el
Estatuto de Autonomía y la Ley de Territorios Históricos, que distribuye competencias entre las
instituciones comunes vascas y los Territorios Históricos. En determinadas materias cuentan con
competencia exclusiva, especialmente en la regulación del régimen tributario y en la
autoorganización de sus órganos.
La Constitución ampara los derechos históricos de los territorios forales y permite su
actualización dentro del marco constitucional y estatutario. En el ámbito de sus competencias
exclusivas, los Territorios Históricos ejercen potestad normativa, reglamentaria, administrativa y
revisora, distinguiéndose claramente entre potestad normativa —cuyas normas se aplican con
preferencia— y potestad reglamentaria.
El sistema institucional reproduce un esquema similar al parlamentario: las Juntas Generales
ejercen la potestad normativa y el control político, mientras que la Diputación Foral asume la
función ejecutiva, la potestad reglamentaria y la iniciativa normativa.
En el sistema de fuentes foral se distinguen los siguientes instrumentos normativos:
1) 2) 3) 4) 5) Las normas forales, que ocupan el nivel superior del ordenamiento foral y expresan la
potestad normativa de las Juntas Generales.
Los decretos forales normativos, dictados por delegación y con el mismo rango que las
normas forales.
Los decretos forales normativos en materia tributaria o por urgencia, que permiten adaptar o
establecer normas tributarias con control posterior.
Los decretos forales, que ejercen la potestad reglamentaria de la Diputación Foral.
Los decretos forales del Diputado General, cuya posición jerárquica varía según el Territorio
Histórico.
6) Las órdenes forales, dictadas por los titulares de los departamentos forales.
3.2. La naturaleza de las normas forales.
Inicialmente, todas las disposiciones forales de carácter general fueron asimiladas al reglamento
ordinario. Con el tiempo, se reconocieron sus peculiaridades y se adaptó su régimen jurídico a su
especial naturaleza.
Desde un punto de vista formal, las disposiciones forales carecen de rango legal, pues la
potestad legislativa en la Comunidad Autónoma del País Vasco corresponde exclusivamente al
Parlamento Vasco. Por ello, en principio, su control corresponde a la jurisdicción contencioso-
administrativa. Sin embargo, no pueden equipararse plenamente a los reglamentos estatales o
autonómicos.
Las normas forales emanan de las Juntas Generales, órgano de representación popular elegido
directamente, y en materias de competencia exclusiva no se subordinan a una ley específica, sino
que se relacionan directamente con la Constitución y el Estatuto de Autonomía. En tales materias
se aplican “con preferencia a cualesquiera otras”, lo que revela una posición singular dentro del
sistema de fuentes.
Un sector doctrinal las ha calificado como reglamentos autónomos, en la medida en que regulan
materias atribuidas a una disposición reglamentaria sin subordinación jerárquica a ley alguna y
con exclusión de la primacía legislativa ordinaria. No obstante, el Tribunal Constitucional ha
rechazado que las normas forales fiscales sean reglamentos ejecutivos o autónomos,
calificándolas como un tipo singular de normas reglamentarias.
En materia tributaria, aunque el Tribunal afirma su subordinación a la legislación estatal, la
regulación foral no se configura como un simple desarrollo jerárquico, sino como una potestad
normativa propia, modulada por los límites establecidos en el Estatuto de Autonomía y en la Ley
del Concierto Económico. La relación con la ley estatal no es de subordinación estricta, sino de
coordinación y armonización.
Fuera de las materias exclusivas, las normas forales pierden los rasgos que permitirían calificarlas
como reglamentos autónomos y se aproximan al régimen reglamentario ordinario.
Finalmente, la conexión directa con la Constitución tiene consecuencias en materia de reserva de
ley. En el ámbito tributario, la garantía constitucional de los derechos históricos y su
reconocimiento estatutario modulan el alcance de la reserva de ley del art. 133.1 CE. Del mismo
modo, en ciertos supuestos pueden cumplir la reserva de ley en materia penal cuando el Código
Penal remite a disposiciones tributarias de rango legal.
3.3. El control de las normas forales.
Las normas forales dictadas en materias de competencia exclusiva poseen legitimidad
democrática directa, respaldo constitucional y una función cuasilegislativa, pues en su territorio
sustituyen a leyes estatales o autonómicas. Esta posición singular resulta difícilmente conciliable
con su formal rango reglamentario.
El problema principal residía en su régimen de impugnación. Al tener rango reglamentario, podían
ser recurridas ante la jurisdicción contencioso-administrativa por cualquier persona, lo que
generaba inestabilidad en sistemas tributarios que requieren certeza. En cambio, las leyes
tributarias estatales o navarras no eran impugnables directamente por particulares.
Para solucionar esta disfunción cabían dos vías: reconocerles rango legal o atribuir su control al
Tribunal Constitucional. En 2010 se optó por la segunda solución mediante la reforma de la LOPJ
y la LOTC por la Ley Orgánica 1/2010. Se excluyó de la jurisdicción contencioso-administrativa el
control de las normas forales fiscales y se atribuyó en exclusiva al Tribunal Constitucional.
Se introdujeron dos nuevos procedimientos: el recurso contra normas forales fiscales y la
cuestión prejudicial de validez sobre normas forales fiscales, configurados de modo similar al
recurso y cuestión de inconstitucionalidad. Asimismo, se creó un conflicto en defensa de la
autonomía foral frente a leyes estatales, legitimando a las Juntas Generales y Diputaciones
Forales.
Este régimen especial se limita a las normas forales fiscales, no a todas las normas forales
dictadas en materias exclusivas. El parámetro de control es el bloque de constitucionalidad.
El Tribunal Constitucional confirmó en la STC 118/2016 la constitucionalidad de la reforma,
justificándola en la singularidad del régimen foral y en la función equivalente a la ley que cumplen
estas normas en materia tributaria. No obstante, mantuvo para la jurisdicción contencioso-
administrativa el control de legalidad ordinaria respecto de parámetros no integrados en el bloque
de constitucionalidad, como tratados internacionales, Derecho de la Unión Europea o leyes del
Parlamento Vasco.
Posteriormente, en el ATC 150/2017, el Tribunal excluyó también de su control las normas forales
generales tributarias, introduciendo una nueva excepción que fue objeto de discrepancia interna
reflejada en voto particular.
4. LAS NORMAS CORPORATIVAS Y UNIVERSITARIAS.
Las universidades públicas, los colegios profesionales y las comunidades de regantes son
entidades o corporaciones de derecho público configuradas sobre una base personal. En los
colegios profesionales y comunidades de regantes la pertenencia es obligatoria para ejercer la
actividad correspondiente.
Estas entidades elaboran sus propios estatutos para regular su organización interna y
determinadas funciones de interés general. Sus normas presentan dos singularidades: requieren
aprobación o control de legalidad por la Administración que las supervisa y su vigencia es
personal, no territorial, pues se aplican únicamente a quienes integran la corporación.
4.1. Los estatutos de los colegios profesionales.
Los colegios profesionales, amparados por el art. 36 CE, tienen personalidad jurídica y se rigen
por la Ley 2/1974 y por sus estatutos y reglamentos de régimen interior. Los Consejos Generales
elaboran estatutos generales, que deben ser aprobados por el Gobierno, mientras que los
colegios elaboran estatutos particulares, que requieren aprobación del Consejo General.
Los estatutos regulan materias esenciales como la condición de colegiado, derechos y deberes,
órganos de gobierno, régimen económico, disciplina y régimen jurídico de sus actos. La
tipificación de infracciones disciplinarias por los propios colegios plantea problemas en relación
con la reserva de ley sancionadora. Los colegios ejercen además funciones de control y
cumplimiento de la normativa aplicable a sus miembros.
4.2. Los estatutos universitarios.
Las universidades públicas actúan en régimen de autonomía constitucionalmente garantizada.
Entre sus manifestaciones se encuentra la potestad de elaborar y aprobar sus estatutos y normas
internas, conforme a la Ley Orgánica 2/2023 del sistema universitario.
Los estatutos son elaborados por el claustro y sometidos a control de legalidad y aprobación por
la comunidad autónoma, con publicación posterior en el diario oficial correspondiente y en el
BOE. En el caso de la UNED, la aprobación corresponde al Consejo de Ministros.
Los estatutos universitarios regulan un amplio conjunto de materias, incluyendo órganos de
gobierno, régimen electoral, derechos y deberes de estudiantes, régimen del personal,
organización académica, estructura financiera y funcionamiento de colegios mayores y
residencias.
4.3. Los estatutos de las comunidades de regantes.
Las comunidades de regantes se regulan en el texto refundido de la Ley de aguas. Los usuarios
de una misma toma o concesión de agua deben constituirse en comunidad de usuarios y, cuando
el destino principal sea el riego, reciben la denominación de comunidades de regantes.
Sus estatutos u ordenanzas son redactados y aprobados por los propios usuarios, pero requieren
aprobación administrativa del organismo de cuenca o confederación hidrográfica
correspondiente, que administra el dominio público hidráulico en el ámbito de la cuenca.
Estos estatutos regulan la organización de la comunidad y la explotación autónoma de los bienes
hidráulicos vinculados al aprovechamiento. El organismo de cuenca solo puede denegar su
aprobación o introducir modificaciones previo dictamen del Consejo de Estado.
5. LAS NORMAS DE LAS ADMINISTRACIONES INDEPENDIENTES.
5.1. Planteamiento.
La cuestión central es si organismos distintos del Gobierno, en particular las Administraciones
independientes, o incluso sujetos privados, pueden dictar disposiciones generales con eficacia
frente a terceros y en qué condiciones. La Constitución atribuye al Gobierno la potestad
reglamentaria (art. 97 CE), pero ello no impide, según el Tribunal Constitucional, la
desconcentración o delegación de esa potestad, bien mediante habilitación directa por ley, bien
mediante delegación singular del titular originario.
El auge de las Administraciones independientes, impulsado también por el Derecho de la Unión
Europea, ha reforzado esta tendencia. Su justificación radica en la especialización técnica y en la
garantía de independencia funcional respecto del poder político. El legislador puede atribuirles
potestad normativa, siempre que no desfigure el modelo constitucional de potestad reglamentaria
y respete los principios del Estado constitucional, especialmente la democracia, el Estado de
Derecho y la rendición de cuentas.
La legislación vigente reconoce a las autoridades administrativas independientes como entidades
de derecho público con funciones de regulación o supervisión externa, cuya independencia debe
establecerse por ley. Pueden ser habilitadas para dictar normas de desarrollo o aplicación cuando
la materia lo exija, aunque no todas disponen necesariamente de potestad normativa.
En algunos casos, la independencia deriva directamente del Derecho de la Unión Europea, que
impide incluso al legislador nacional reducir las facultades discrecionales conferidas. Sin
embargo, no todas estas autoridades dictan normas: algunas se limitan a emitir
recomendaciones, informes u opiniones.
5.2. Principales supuestos.
5.2.1. El Banco de España.
El Banco de España es una entidad de Derecho público con personalidad jurídica propia y
autonomía respecto de la Administración General del Estado. Se rige por su ley de autonomía y
por el resto del ordenamiento jurídico, actuando conforme al Derecho privado salvo cuando
ejerce potestades administrativas, en cuyo caso se aplican la LPAC y la LRJSP.
Puede dictar disposiciones normativas externas en forma de circulares monetarias, en materia
monetaria, y de circulares para el desarrollo de normas que le habiliten expresamente. Estas
disposiciones se publican en el Boletín Oficial del Estado y son impugnables ante la jurisdicción
contencioso-administrativa. El Tribunal Constitucional admitió la atribución de potestad normativa
por su especialización técnica, y posteriormente su autonomía quedó reforzada por el Derecho de
la Unión Europea.
Además, puede emitir soft law mediante guías técnicas dirigidas a entidades supervisadas,
fijando criterios y prácticas cuya observancia puede exigirse bajo la técnica del “cumple o
explica”. También puede dictar normas internas sin eficacia externa.
5.2.2. La Comisión Nacional del Mercado de Valores.
La CNMV es un ente de derecho público con autonomía orgánica y funcional, encargado de la
supervisión e inspección de los mercados de valores y del ejercicio de la potestad sancionadora.
Actúa con plena independencia y ninguna institución puede darle instrucciones en el ejercicio de
sus funciones.
Puede dictar circulares cuando exista habilitación expresa en la ley o en normas reglamentarias
superiores. Estas circulares se publican en el Boletín Oficial del Estado, son recurribles en vía
contencioso-administrativa y requieren consulta pública, audiencia a los interesados e informe del
Consejo de Estado.
Asimismo, puede emitir guías técnicas como instrumentos de soft law, fijando criterios de
supervisión y aplicando la técnica del “cumple o explica”, e incluso adoptar y adaptar directrices
de organismos internacionales.
5.2.3. La Comisión Nacional de los Mercados y la Competencia.
La CNMC es un ente de derecho público creado por la Ley 3/2013, que actúa con autonomía
orgánica y funcional y plena independencia del Gobierno y de cualquier entidad pública o
privada. Su finalidad es garantizar y promover la competencia efectiva y el correcto
funcionamiento de los mercados en beneficio de consumidores y usuarios. Surgió de la fusión de
varios organismos reguladores sectoriales, modelo cuya compatibilidad con el Derecho de la
Unión fue confirmada por el Tribunal de Justicia.
Ejerce funciones tanto nacionales como europeas, aplicando en España los artículos 101 y 102
TFUE y cooperando con la Comisión Europea y otras autoridades nacionales de competencia.
Puede dictar circulares cuando exista habilitación legal expresa para desarrollar leyes, reales
decretos u órdenes ministeriales en los sectores bajo su supervisión. Estas circulares, vinculantes
tras su publicación en el Boletín Oficial del Estado, responden al principio de atribución legal y,
cuando tienen carácter ejecutivo, requieren intervención del Consejo de Estado.
El Consejo de la CNMC, compuesto por diez miembros con mandato de seis años no renovable,
es el órgano competente para aprobar las circulares. En su elaboración debe garantizarse la
audiencia de los interesados y la participación pública. Además, la CNMC puede emitir circulares
informativas y comunicaciones de carácter interpretativo como instrumentos de soft law. Destaca
también su legitimación procesal para impugnar actos o disposiciones contrarios a la libertad de
establecimiento o circulación en defensa de la unidad de mercado.
5.2.4. La Agencia Española de Protección de Datos.
La Agencia Española de Protección de Datos es una autoridad administrativa independiente,
configurada conforme a la LRJSP y exigida por el Derecho de la Unión Europea. Se relaciona con
el Gobierno a través del Ministerio de Justicia, pero actúa con autonomía funcional. La potestad
normativa corresponde a su Presidencia, cuyo mandato es de cinco años, renovable una sola
vez.
La Presidencia puede dictar circulares que establezcan los criterios de actuación en la aplicación
del Reglamento (UE) 2016/679 y de la LOPDGDD. Su elaboración exige informes técnicos y
jurídicos y audiencia a los interesados, conforme al Estatuto de la Agencia. Una vez publicadas
en el Boletín Oficial del Estado, son obligatorias. Además, puede dictar directrices generales o
específicas dirigidas a responsables o encargados del tratamiento, también vinculantes. Las
autoridades autonómicas de protección de datos pueden aprobar circulares en su ámbito
competencial con igual alcance y efectos.
5.2.5. La Administración electoral.
La Administración electoral garantiza la transparencia, objetividad e igualdad en los procesos
electorales. Se estructura en Juntas Electorales (Central, Provinciales, Autonómicas y de Zona) y
en Mesas Electorales. La Junta Electoral Central, integrada por magistrados del Tribunal Supremo
y catedráticos, dirige y supervisa el censo, informa proyectos normativos, dicta instrucciones
obligatorias, resuelve consultas con carácter vinculante y unifica criterios interpretativos.
Aunque las instrucciones y resoluciones vinculantes no tienen formalmente naturaleza
reglamentaria, su función material las aproxima a disposiciones jurídicas infralegales, ya que no
se limitan al ámbito interno, completan la normativa electoral y suelen publicarse. Así,
desempeñan una función cuasinormativa en el sistema electoral, pese a no estar expresamente
calificadas como normas reglamentarias.
6. LAS NORMAS DE ORIGEN PRIVADO.
El Estado moderno consolidó el monopolio estatal de la producción normativa, desplazando la
capacidad reguladora de cuerpos intermedios como gremios o costumbres sectoriales. Sin
embargo, ante la complejidad técnica de muchos ámbitos y los límites de conocimiento y
capacidad de la Administración, se ha reabierto un espacio para la participación normativa de
sujetos privados, siempre dentro del marco fijado por el legislador. Esta tendencia responde al
desbordamiento funcional del Estado y a la necesidad de incorporar conocimiento experto para
regular sectores complejos.
6.1. Alcance y naturaleza.
En determinados ámbitos técnicos o sectoriales, las entidades que agrupan a los operadores
pueden fijar criterios comunes, estándares o pautas que ordenan el sector. La intensidad jurídica
de esos criterios depende del grado de respaldo o incorporación por el poder público, que puede
oscilar desde la mera referencia voluntaria hasta su integración en normas obligatorias.
6.1.1. La normalización industrial.
En el ámbito industrial, la Ley de Industria distingue entre “normas” y “reglamentos técnicos”. Las
“normas” son especificaciones técnicas de aplicación repetitiva cuya observancia no es
obligatoria, elaboradas por organismos de normalización privados con participación de las partes
interesadas. No son disposiciones jurídicas, pero adquieren fuerza práctica por la lógica del
mercado y la competitividad.
En cambio, los “reglamentos técnicos” son especificaciones técnicas obligatorias establecidas
mediante disposiciones administrativas para proteger intereses generales como la salud, la
seguridad o el medio ambiente. Aunque puedan basarse en textos elaborados por entidades
privadas, se aprueban por el procedimiento reglamentario correspondiente y se publican
oficialmente, adquiriendo plena naturaleza normativa.
6.1.2. Los códigos de conducta.
Los códigos de conducta son instrumentos de autorregulación con carácter inicialmente
voluntario, pero que pueden adquirir relevancia jurídica. En el ámbito audiovisual, las obligaciones
asumidas voluntariamente por operadores mediante códigos deontológicos pueden integrarse en
el contenido de las licencias administrativas, convirtiéndose en vinculantes.
En materia de protección de datos, los códigos pueden ser promovidos por autoridades públicas
o por asociaciones de responsables del tratamiento. Si se ajustan al Reglamento General de
Protección de Datos y son aprobados por la autoridad competente o por la Comisión Europea,
pueden adquirir efectos generales e integrarse en el sistema jurídico, reforzando su eficacia más
allá del plano meramente voluntario.
6.2. Remisión a la Comisión Europea.
La elaboración de normas y reglamentos técnicos está sujeta a un control supranacional derivado
del Derecho de la Unión Europea. La Directiva 98/34/CE impone la obligación de comunicar
previamente a la Comisión Europea los proyectos nacionales de normas y reglamentos técnicos,
con el fin de evitar obstáculos al mercado interior.
En España, el Real Decreto 1337/1999 regula este procedimiento de notificación. Tanto los
organismos de normalización como las Administraciones públicas deben informar sobre los
nuevos proyectos normativos o sus modificaciones, salvo que se trate de una mera transposición
idéntica de normas europeas o internacionales. La Comisión Europea y los demás Estados
miembros pueden formular observaciones o dictámenes razonados, que la Administración autora
debe valorar e informar sobre el tratamiento que les dará.
El incumplimiento de esta obligación tiene consecuencias graves. Según la jurisprudencia del
Tribunal de Justicia de la Unión Europea, la falta de notificación previa determina la inaplicabilidad
frente a los particulares del reglamento técnico no comunicado. Ello afecta tanto a la vía
administrativa y judicial como a litigios entre particulares, configurándose como un vicio
sustancial del procedimiento normativo.
6.3. Problemas jurídicos.
Los reglamentos técnicos plantean diversos problemas jurídicos. El primero es el relativo a las
remisiones dinámicas a normas técnicas privadas. Cuando un reglamento se remite de forma
abierta a especificaciones técnicas que pueden ser modificadas por organismos privados, el
contenido normativo queda indirectamente en manos de terceros, lo que equivale a una
atribución permanente de potestad normativa sin cobertura expresa suficiente.
El segundo problema es el de la publicidad. Muchas especificaciones técnicas a las que se
remiten los reglamentos no se publican íntegramente en diarios oficiales, y en ocasiones su
acceso exige el pago de derechos de propiedad intelectual. Esto genera dudas desde la
perspectiva de la seguridad jurídica y del principio de publicidad normativa.
El tercer problema es de legitimidad democrática. Los organismos de normalización, pese a no
estar investidos de legitimidad representativa, influyen decisivamente en la regulación de sectores
económicos estratégicos. Ello exige que la ley que habilite estos mecanismos garantice
transparencia, participación y control, evitando que se desdibuje el principio democrático y el
modelo constitucional de potestad normativa.
7. LOS REGLAMENTOS DE LOS ÓRGANOS CONSTITUCIONALES.
Los reglamentos del Congreso y del Senado se subordinan directamente a la Constitución y
tienen rango de ley. Solo pueden ser controlados por el Tribunal Constitucional. Se diferencian del
resto de las leyes porque regulan materias reservadas, provienen de una sola Cámara —salvo el
Reglamento de las Cortes Generales— y su aprobación o reforma exige mayoría absoluta en
votación final sobre el conjunto. Además, en determinados supuestos pueden actuar como
normas interpuestas entre la Constitución y las leyes, convirtiéndose en parámetro de
constitucionalidad cuando su infracción altera sustancialmente el proceso legislativo.
El Estatuto del Personal de las Cortes Generales constituye otro supuesto singular. Está
directamente vinculado a la Constitución y goza de fuerza de ley en su vertiente pasiva, pues
ninguna otra norma puede regular las materias que le están reservadas. Su control corresponde
igualmente al Tribunal Constitucional.
Por el contrario, los reglamentos de otros órganos constitucionales, como el Tribunal
Constitucional y el Consejo General del Poder Judicial, tienen rango reglamentario. Estos órganos
ejercen potestad reglamentaria en materia de organización, funcionamiento y personal, pero sus
reglamentos se subordinan a la ley orgánica correspondiente y son controlables por la jurisdicción
contencioso-administrativa, concretamente por el Tribunal Supremo.
El Reglamento de Organización y Funcionamiento del Defensor del Pueblo presenta una
peculiaridad procedimental. Aunque es un reglamento ejecutivo de su ley orgánica, se aprueba
por las Mesas del Congreso y del Senado a propuesta del propio Defensor del Pueblo, en
coherencia con su condición de alto comisionado de las Cortes Generales que actúa con
autonomía y responde únicamente ante ellas.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){

}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
