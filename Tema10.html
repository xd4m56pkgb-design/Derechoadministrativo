  try{

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN

El reconocimiento constitucional del derecho a la autonomía de nacionalidades y regiones en 1978 transformó el Estado centralizado en un Estado políticamente descentralizado, añadiendo un nuevo nivel de gobierno y administración a la organización previa basada en el Estado, los municipios y las provincias. La creación de las diecisiete comunidades autónomas se inició en 1979 y quedó prácticamente culminada en 1983, en algunos casos tras una fase preparatoria de regímenes preautonómicos durante la transición.

Junto al estatuto de autonomía, las comisiones mixtas de transferencias fueron un instrumento esencial en la institucionalización de las comunidades autónomas, al encargarse de ordenar y pactar el traspaso de funciones y atribuciones entre el Estado y cada comunidad autónoma. Sus acuerdos eran aprobados por el Gobierno mediante real decreto y publicados en el BOE.

Con el paso de dos décadas, la Administración autonómica pasó a ocupar una posición central en el sistema administrativo tanto por gasto como por personal, hasta el punto de concentrar aproximadamente el sesenta por ciento de los empleados públicos, con un peso especialmente relevante en educación y sanidad.

En términos generales, las comunidades autónomas reprodujeron no solo el esquema institucional estatal previsto en la Constitución, sino también el modelo organizativo del gobierno y la administración general del Estado, con una estructura departamental, burocrática, funcionarial, concentrada y centralizadora. Por ello, la organización de sus gobiernos y administraciones constituye en gran medida una réplica de la estructura estatal.

Ese diseño concentrado y centralizador propició, en las comunidades autónomas pluriprovinciales, la creación de una administración periférica propia y afectó además a las relaciones con los gobiernos locales, especialmente con los municipios. En las comunidades autónomas uniprovinciales, la provincia desapareció como entidad local al integrarse sus competencias en los nuevos entes autonómicos.

La lección se limita a ofrecer una visión panorámica de la organización de la administración propia de las comunidades autónomas. No aborda ni el origen y desarrollo del Estado autonómico, ni su sistema institucional, competencial o de controles, ni tampoco cuestiones más específicas y complejas como la función pública autonómica, la hacienda o la gestión presupuestaria. Su propósito es exponer los rasgos generales de esa organización administrativa partiendo de los criterios fijados por las normas superiores del ordenamiento, en especial la Constitución y los estatutos de autonomía.

2. LA ADMINISTRACIÓN AUTONÓMICA EN LA CONSTITUCIÓN Y LOS ESTATUTOS DE AUTONOMÍA

La Constitución no estableció una regulación general de la organización específica de las comunidades autónomas, en coherencia con el principio de autonomía, que alcanza en el plano organizativo una especial intensidad. Su previsión más relevante en este punto se contiene en el artículo 147 CE, que remite al estatuto de autonomía, como norma institucional básica, la determinación de materias como la denominación, organización y sede de las instituciones autónomas propias.

Aunque la existencia de distintas vías de acceso a la autonomía pretendía dar lugar a modelos organizativos diferenciados y, al menos transitoriamente, a distintos niveles competenciales, esa diferenciación organizativa no llegó a consolidarse, porque todas las comunidades autónomas adoptaron un modelo similar. Solo de forma transitoria, y como resultado de los Pactos Autonómicos de 1981, algunos estatutos de la vía lenta introdujeron límites al número de consejerías y a la creación de administración periférica, restricciones que después desaparecieron. También la Ley Orgánica 9/1992 contribuyó a una amplia igualación competencial entre comunidades.

Que la Constitución no regule de forma específica la organización administrativa autonómica no significa que no le resulten aplicables sus disposiciones generales sobre Administración pública y ejercicio del poder público. Por ello, los preceptos constitucionales referidos a esos ámbitos son igualmente aplicables a la Administración de las comunidades autónomas, como confirma además la jurisprudencia constitucional respecto del artículo 103 CE.

La determinación constitucional más importante en esta materia es la competencia exclusiva del Estado del artículo 149.1.18 CE, que le atribuye la fijación de las bases del régimen jurídico de las administraciones públicas y del régimen estatutario de sus funcionarios, así como del procedimiento administrativo común, la expropiación forzosa, la legislación básica sobre contratos y concesiones administrativas y el sistema de responsabilidad de todas las administraciones públicas. Esta competencia estatal condiciona decisivamente el margen de autonomía organizativa de las comunidades autónomas, de modo que cuanto más extensa y densa sea la regulación estatal, menor será su capacidad para configurar de forma diferenciada su propia administración e innovar organizativamente.

Los estatutos de autonomía se refieren de manera desigual a la administración autonómica y a su organización: algunos no contienen precepto alguno sobre la materia, mientras que otros dedican varias disposiciones a regularla. Con frecuencia se limitan a afirmar la competencia autonómica para crear y regular una administración propia, pero cuando inciden directamente en aspectos organizativos presentan varias coincidencias.

Es habitual que incluyan una cláusula general sobre la Administración autonómica que reitera los criterios de actuación del artículo 103.1 CE y, en ocasiones, añade otros principios ya presentes en la legislación estatal, como la buena fe, la confianza legítima, la lealtad institucional o la transparencia. En los estatutos más recientes también aparecen referencias a la buena administración, a la prestación de servicios públicos de calidad, a la publicidad de la oferta y características de los servicios públicos y a la evaluación de las políticas públicas.

Algunos estatutos califican a la Administración autonómica como administración ordinaria en el ejercicio de sus competencias o le atribuyen la gestión ordinaria de sus actividades mediante sus servicios centrales y periféricos. Esa calificación no excluye la existencia de administración periférica del Estado en el territorio autonómico, según precisó el Tribunal Constitucional, pero parece apuntar a que la comunidad autónoma debe ejercer normalmente sus competencias con su propia estructura administrativa y no mediante estructuras ajenas, como las de las entidades locales a través de encomiendas de gestión.

También es frecuente que los estatutos atribuyan a la Administración autonómica las potestades y prerrogativas reconocidas por el ordenamiento a la Administración del Estado, ya sea mediante remisión general a ellas o mediante su enumeración expresa. Asimismo, suelen establecer reservas de ley para determinadas submaterias, entre ellas el estatuto de los funcionarios de la propia Administración, y en algunos casos extienden esa remisión legal a aspectos como la organización administrativa, las formas de descentralización funcional, la personificación pública y privada, la gestión de los servicios públicos, la participación del sector privado, la participación ciudadana, el acceso a la Administración, la presencia equilibrada de hombres y mujeres en órganos directivos, colegiados o consultivos, o la evaluación de las políticas públicas.

Por último, algunos estatutos prevén que organismos, servicios o dependencias de la Administración autonómica puedan ubicarse en distintas localidades del territorio, además de en la capital.

3. LA CONFIGURACIÓN DE LAS ADMINISTRACIONES DE LAS COMUNIDADES AUTÓNOMAS

3.1. El proceso de creación: Entre inercia y autonomía limitada

La configuración de las administraciones autonómicas ha sido interpretada como una paradoja de la autonomía o como una oportunidad perdida, porque, en lugar de aprovechar su autonomía para crear estructuras propias e innovadoras, las comunidades autónomas reprodujeron en gran medida el modelo estatal tradicional, caracterizado por su organización burocrática, funcionarial, departamental, centralizada y concentrada. Esta reproducción no obedeció solo a la inercia o a la urgencia del proceso de construcción autonómica, sino también a condicionantes jurídicos relevantes.

El Tribunal Constitucional distinguió entre la potestad de organización de las instituciones de autogobierno y la potestad de organización administrativa. La primera constituye una competencia exclusiva en sentido propio, limitada únicamente por el diseño institucional básico del artículo 152.1 CE, mientras que la segunda queda condicionada por la competencia estatal sobre las bases del régimen jurídico de las Administraciones públicas del artículo 149.1.18 CE. De este modo, el Gobierno autonómico se concibe como institución de autogobierno, pero la Administración autonómica aparece como un instrumento jurídico-administrativo sometido a una competencia compartida. Aunque esta distinción es discutible y difícil de aplicar en la práctica, fue asumida por diversos estatutos de autonomía.

Por ello, la competencia autonómica para configurar sus estructuras administrativas nunca fue plena, sino dependiente de las bases estatales. El legislador autonómico puede desarrollar esas bases, pero el alcance real de su capacidad organizativa viene determinado por la intensidad con que el Estado ejerza su competencia normativa. Además, al finalizar en 1983 el proceso de creación de las comunidades autónomas, esas bases no estaban formuladas de modo expreso, sino que debían deducirse de la legislación vigente, inicialmente preconstitucional, lo que generaba incertidumbre y hacía arriesgada cualquier opción organizativa innovadora por el riesgo de impugnación e inconstitucionalidad.

Esa limitación afectó de forma especial al modelo funcionarial. La interpretación dominante entendió pronto que la Constitución optaba por la relación funcionarial estatutaria clásica, de modo que este aspecto no quedaba disponible para la libre configuración autonómica. La Ley 30/1984 impuso una ordenación uniforme de la función pública en todo el Estado, y la STC 99/1987 confirmó esa opción constitucional en favor del régimen estatutario de los servidores públicos. A partir de ello, la Ley 23/1988 consolidó la regla general de reserva de puestos a funcionarios, admitiendo solo excepcionalmente la contratación laboral para determinados puestos no permanentes, instrumentales, singulares o técnicamente especializados.

A ello se añadió la propia dinámica del proceso de transferencias, que fue políticamente condicionado, ministerial, fragmentario y prolongado, dificultando un diseño administrativo coherente. Las comunidades autónomas incorporaban personal y, en ocasiones, servicios completos procedentes de la Administración del Estado, lo que favorecía la continuidad de un modelo departamental conocido. También desde el punto de vista político y social resultaba más sencillo legitimar las nuevas administraciones reproduciendo una organización similar a la estatal, con un órgano colegiado de gobierno, consejeros al frente de departamentos y una estructura jerarquizada de funcionarios.

En conjunto, la falta de modelos alternativos, la incertidumbre sobre el alcance de la autonomía organizativa, la necesidad urgente de poner en marcha estructuras para ejercer competencias y prestar servicios, la dependencia de medios personales procedentes del Estado, la construcción progresiva derivada de los traspasos y la exigencia de mantener una relación simétrica con la Administración general del Estado explican que no existieran condiciones favorables para una verdadera innovación organizativa.

Pese a ello, las nuevas administraciones autonómicas constituyeron la principal innovación del sistema administrativo democrático, al contribuir a colmar parte del déficit de legitimidad del aparato estatal percibido como lejano. Esa innovación se reflejó en la búsqueda de estructuras más próximas al ciudadano, orientadas a la simplificación administrativa y a la tutela de los usuarios de los servicios públicos. Sin embargo, la posibilidad de construir modelos más variados sigue limitada por el peso de las estructuras consolidadas y por dos condicionantes jurídicos básicos: la exigencia constitucional de organización jerárquica de todas las Administraciones públicas y la conexión de la organización administrativa con otros sectores densamente regulados, como la función pública, la gestión presupuestaria o el ejercicio de potestades administrativas.

La crítica doctrinal a la falta de imaginación organizativa se relaciona también con el fracaso del modelo de administraciones autonómicas mínimas apoyadas en una administración indirecta mediante delegación en las entidades locales. Aunque el objetivo de evitar duplicidades estructurales era razonable, ese diseño resultaba poco realista, porque convertía a las comunidades autónomas en instancias de dirección y coordinación sin aplicación directa de políticas públicas, algo inviable en servicios como la educación, la sanidad o determinadas infraestructuras supraprovinciales. La verdadera paradoja reside así en que, pese a la descentralización y al traspaso de servicios, la Administración general del Estado apenas redujo sus estructuras centrales y mantuvo una organización equivalente a la que necesitaría si siguiera prestando íntegramente los servicios transferidos.

3.2. La potestad autonómica de organización administrativa y sus límites

El único ámbito verdaderamente exclusivo de las comunidades autónomas en materia organizativa es la potestad de crear, modificar y suprimir los órganos, unidades administrativas o entidades que integran sus respectivas administraciones o dependen de ellas. El Tribunal Constitucional ha afirmado que el Estado no puede imponer la inserción forzosa en la Administración autonómica de órganos jerárquicamente dependientes de la Administración del Estado, porque ello vulneraría la autonomía, cuya expresión más genuina es la capacidad de autoorganización. En principio, por tanto, la decisión sobre la estructura orgánica del aparato administrativo directivo corresponde exclusivamente a la comunidad autónoma.

Fuera de ese núcleo, la competencia autonómica no es exclusiva, sino que está limitada por la legislación estatal dictada al amparo del artículo 149.1.18 CE. El Estado puede establecer principios y reglas básicas sobre organización y funcionamiento de todas las Administraciones públicas, incluyendo la composición, estructura y competencias de sus órganos. No obstante, la jurisprudencia constitucional ha precisado que la intensidad de esas bases no puede ser igual en todos los ámbitos: puede ser mayor en las materias que inciden directamente en la actividad externa de la Administración y en los derechos e intereses de los administrados, y menor en las cuestiones relativas a la organización y funcionamiento interno. Por ello, el Estado puede regular de manera uniforme determinadas figuras organizativas, pero no descender hasta concretar aspectos internos que corresponden a la potestad organizativa autonómica.

Con el desarrollo paulatino de la legislación básica estatal en materia de organización, funcionamiento administrativo y prestación de servicios públicos, se ha reforzado una visión uniformista del aparato organizativo. Además, esas bases no son estáticas, sino variables en el tiempo, por lo que el margen autonómico de diferenciación ha seguido modulándose. Entre los condicionantes más relevantes figura la reserva a funcionarios públicos de las funciones que impliquen ejercicio de potestades públicas o salvaguardia de intereses generales. Esto significa que, si una comunidad autónoma crea entidades instrumentales diferenciadas, las potestades administrativas atribuidas a esas entidades no podrán ser ejercidas por personal laboral, sino por funcionarios. El Tribunal Constitucional ha entendido, además, que corresponde a las leyes autonómicas concretar qué funciones quedan reservadas y cómo pueden desempeñarse, y ha admitido que esas entidades instrumentales dispongan del personal funcionario necesario tanto mediante funcionarios propios como mediante funcionarios dependientes orgánicamente de la Administración territorial que actúan funcionalmente a su servicio.

También condicionan la organización autonómica las normas estatales básicas sobre órganos administrativos, competencia, abstención y recusación, funcionamiento electrónico, convenios, consorcios y relaciones interadministrativas. En este ámbito, el Tribunal Constitucional anuló el carácter básico de algunas normas estatales sobre órganos colegiados por considerar que regulaban con un detalle excesivo cuestiones internas que impedían un desarrollo autonómico real. Del mismo modo, el legislador estatal incidió en la regulación de la iniciativa legislativa y del procedimiento de elaboración de reglamentos y otras disposiciones autonómicas, aunque parte de esa regulación fue declarada inconstitucional por razones competenciales.

El peso de la inercia y el estrecho marco normativo básico ayudan a explicar la limitada ambición autonómica en materia organizativa. Aun así, se han producido intentos de reforma de gran alcance, como la reordenación del sector público andaluz de 2011, que perseguía reducir drásticamente el número de entidades instrumentales mediante la utilización de agencias públicas empresariales y afectaba a un volumen muy elevado de empleados públicos. El Tribunal Constitucional avaló esa reforma al asumir una concepción amplia de la Administración autonómica, integrada tanto por la Administración territorial como por los entes instrumentales creados por la comunidad autónoma para ejercer funciones de su competencia, y al admitir la adscripción funcional de funcionarios orgánicamente dependientes de la Administración territorial o de una agencia administrativa para prestar servicio en agencias públicas empresariales. De este modo, aceptó la compatibilidad con las bases estatales de fórmulas organizativas que combinan dependencia orgánica y funcional distinta dentro del sector público autonómico.

4. LA ORGANIZACIÓN ADMINISTRATIVA

4.1. La dispersión de la regulación

Ante la escasez de referencias estatutarias, las claves de la organización administrativa autonómica se localizan sobre todo en la legislación autonómica, especialmente en las leyes sobre administración, régimen jurídico, gobierno o administración de cada comunidad autónoma.

Sin embargo, tampoco esa legislación ofrece siempre una regulación completa o suficientemente significativa de la organización y estructura interna, en parte por la importancia de las bases estatales, por la continua modificación de las estructuras administrativas derivada de cambios políticos y por la necesidad de flexibilidad para integrar los servicios transferidos por el Estado.

Además, muchos aspectos organizativos se concretan en leyes sectoriales autonómicas, que junto a la regulación sustantiva atribuyen funciones y prevén órganos específicos. Estas leyes suelen señalar también qué órganos agotan la vía administrativa y fijar los plazos de resolución y los efectos del silencio administrativo.

4.2. Personalidad jurídica y potestades administrativas

La falta de referencias constitucionales y estatutarias claras sobre el modelo administrativo autonómico, unida a la inercia, a la urgencia del proceso y a las limitaciones competenciales, hizo que prevaleciera el modelo estatal. En el plano jurídico-formal ese mimetismo es completo: todos los ordenamientos autonómicos proclaman la personalidad jurídica única de la Administración de la comunidad autónoma, organizada mediante órganos jerárquicamente ordenados, subordinada al Gobierno autonómico y actuando con personalidad única, sin perjuicio de la existencia de entidades instrumentales dependientes.

A esa Administración se le atribuye, en el ejercicio de sus competencias, el conjunto más amplio de potestades y prerrogativas, bien por remisión a las reconocidas a la Administración del Estado, bien mediante enumeración expresa. Entre ellas figuran la ejecución forzosa, la revisión de oficio, la expropiación, incluida la declaración de urgente ocupación, las potestades de investigación, deslinde y recuperación de bienes, la potestad sancionadora, el procedimiento de apremio, la inembargabilidad de sus bienes y derechos, los privilegios de cobro propios de la Hacienda pública, la exención de prestar garantías o cauciones ante órganos administrativos y judiciales y la inadmisibilidad de acciones posesorias.

4.3. Líneas comunes dentro de la diversidad

Las diferencias competenciales, demográficas, geográficas, históricas y socioeconómicas entre comunidades autónomas tienen reflejo organizativo. Aunque el proceso de traspasos ha producido una importante igualación, persisten asimetrías que afectan a la organización administrativa, especialmente cuando implican cuerpos policiales propios, gestión penitenciaria, medios personales y materiales de la Administración de Justicia o competencias ligadas a la existencia de litoral. También influyen factores territoriales, como el número de provincias, factores demográficos, la condición insular de algunas comunidades y la existencia de instituciones históricas singulares, como las del País Vasco.

Pese a esa diversidad, pueden apreciarse varias características comunes. La primera es la fragmentación y rigidez de las estructuras departamentales, ya que las comunidades autónomas han adoptado el modelo sectorial de la Administración estatal y han reproducido incluso las denominaciones ministeriales en sus consejerías y órganos superiores. La segunda es el peso desproporcionado de la confianza política en las estructuras directivas, por la existencia de escalones de autoridad servidos por altos cargos de libre nombramiento. La tercera es la proliferación de entes instrumentales, bien por mimetismo con fórmulas estatales, bien para disponer de estructuras más ágiles en la ejecución de proyectos o en la gestión de centros y servicios. La cuarta es la conservación o reproducción de una estructura periférica desplegada territorialmente, aunque no siempre coincidente con la provincia.

A esas notas se añaden otras dos. Por un lado, el fortalecimiento de las estructuras administrativas al servicio de la presidencia, normalmente a través de un macrodepartamento que concentra funciones políticas, transversales y sectoriales clave, como la coordinación de consejerías, los recursos humanos, los servicios jurídicos, la comunicación o las relaciones institucionales. Por otro, la incidencia del régimen de doble oficialidad lingüística en varias comunidades autónomas, que no solo genera derechos para los ciudadanos y obligaciones para los poderes públicos, sino también consecuencias organizativas, al exigir adaptación de publicaciones, resoluciones, formularios, cartelería y demás servicios, así como la existencia de órganos específicos de política lingüística.

4.4. Los órganos superiores

En algunas comunidades autónomas se mantiene la concepción según la cual no existe separación entre gobierno y administración, de modo que el gobierno o su consejo de gobierno actúa como órgano superior de la Administración autonómica. En esos casos, es necesario distinguir dentro del mismo órgano las atribuciones que corresponden a su condición de institución de autogobierno y las que ejerce como órgano administrativo superior. Esa dualidad hace que el gobierno autonómico tenga a la vez naturaleza política y administrativa, aunque su régimen jurídico no se rige por la normativa general sobre órganos colegiados, sino por una regulación específica como institución de autogobierno.

En otras comunidades autónomas, en cambio, se ha seguido el modelo estatal posterior a 1997 y se distingue orgánica y funcionalmente entre Gobierno y Administración. En ese esquema, la Administración actúa bajo la dirección política del consejo de gobierno, pero no se confunde con él. El vínculo entre ambos lo representan los consejeros, que son simultáneamente miembros del Gobierno y órganos superiores de la Administración. En consecuencia, la Administración se organiza en consejerías o departamentos encargados de la gestión de uno o varios sectores de actividad.

Todas las comunidades autónomas combinan consejerías sectoriales con otras de carácter general, dedicadas a funciones como presidencia, hacienda o administraciones públicas, en las que suelen concentrarse servicios esenciales como los jurídicos, la intervención, la función pública o los presupuestos. En algunas también existe la figura del consejero sin departamento o sin cartera, que puede asumir funciones gubernamentales no ejecutivas y disponer de medios personales y materiales, aunque en los modelos que separan Gobierno y Administración queda fuera de la organización administrativa en sentido estricto.

El número de consejerías y la estructura orgánica de la Administración autonómica no son estables, porque dependen de coyunturas políticas, económicas y administrativas como cambios de gobierno, crisis, coaliciones o reformas organizativas. Aunque en algunos casos los departamentos se crean o extinguen por ley, lo habitual es que corresponda al gobierno autonómico fijar su número, denominación, competencias y estructura. Por ello, la estructura orgánica no se contiene normalmente en una ley general, sino en el conjunto de decretos que regulan la organización de cada departamento y que suelen modificarse con cada cambio de gobierno.

Dentro de cada consejería, la organización interna suele articularse en torno a su titular y a órganos centrales como viceconsejerías, secretarías generales técnicas y direcciones generales o regionales, a los que pueden añadirse secretarías generales o secretarías autonómicas. En la mayoría de las comunidades autónomas estos órganos directivos son puestos de confianza no profesionalizados, aunque en algunas los directores generales deben ser funcionarios de carrera.

Los órganos inferiores, como servicios, secciones y negociados, se consideran no directivos y su creación o supresión corresponde al Gobierno o a los consejeros.

4.5. Los órganos territoriales

4.5.1. Alcance en las comunidades autónomas pluriprovinciales

En las comunidades autónomas uniprovinciales no existe con carácter general una administración autonómica territorial, aunque pueden crearse órganos periféricos singulares para funciones concretas. En las comunidades pluriprovinciales, en cambio, junto a la organización administrativa central suele existir una administración periférica, diferenciándose así entre órganos con competencia para todo el territorio autonómico y órganos con competencia limitada a un ámbito territorial determinado. Estos servicios territoriales responden al principio de desconcentración y suelen organizarse atendiendo a la provincia, aunque pueden establecerse también otras demarcaciones complementarias o alternativas para la gestión de determinados servicios, incluso sin coincidir con entidades locales.

La organización territorial puede adoptar distintas fórmulas. En unos casos se articula mediante delegaciones o direcciones territoriales del Gobierno o de la comunidad autónoma, encargadas de coordinar, inspeccionar y supervisar los servicios ubicados en su territorio. En otros, mediante delegaciones territoriales de la administración general en las que se integran los servicios territoriales de las distintas consejerías, mediante delegados de cada departamento o mediante combinaciones de ambos modelos. Los delegados territoriales suelen tener la condición de alto cargo y ser nombrados y cesados por el consejo de gobierno. Esta organización periférica debe distinguirse de la ordenación territorial utilizada para la prestación de servicios públicos, donde es normal que convivan distintas divisiones funcionales no coincidentes entre sí.

4.5.2. Órganos territoriales versus Administración indirecta

El modelo inicialmente propugnado en 1981 y en la Ley del proceso autonómico de 1983 apostaba por que las diputaciones provinciales asumieran la gestión periférica de los servicios y funciones autonómicos, de modo que las comunidades autónomas se apoyaran en una administración indirecta. Muchos estatutos incorporaron esa orientación, lo que condicionaba la creación de una estructura periférica propia. Sin embargo, esas previsiones apenas llegaron a desarrollarse y quedaron, en la mayoría de los casos, como declaraciones programáticas. Las posteriores reformas estatutarias eliminaron en general esas limitaciones y atribuyeron la gestión ordinaria de las actividades autonómicas a sus propios servicios centrales y periféricos.

En la actualidad solo algunas comunidades mantienen previsiones de administración indirecta o de posible delegación en entidades locales, aunque ello no ha impedido la creación de estructuras periféricas propias ni ha dado lugar, en ciertos casos, a una aplicación efectiva de esas posibilidades. También existen fórmulas de cooperación con las diputaciones provinciales orientadas a clarificar competencias y coordinar actuaciones, sin sustituir por ello la administración periférica autonómica.

4.5.3. Órganos situados fuera de la comunidad autónoma

La organización desconcentrada de las comunidades autónomas no tiene por qué situarse exclusivamente dentro de su territorio. Algunas legislaciones autonómicas contemplan expresamente la posibilidad de crear órganos o unidades administrativas que actúen funcionalmente fuera de la comunidad autónoma, tanto en otros puntos de España como en el extranjero. Además, la legislación estatal admite la apertura de oficinas autonómicas para la promoción exterior, sometiendo su creación a una comunicación previa al Gobierno y a la emisión de informes ministeriales. Esa comunicación y esos informes han sido considerados por la jurisprudencia constitucional técnicas legítimas de cooperación y coordinación, sin carácter autorizatorio ni vinculante.

Especial relevancia tienen las oficinas o delegaciones autonómicas en Bruselas. La jurisprudencia constitucional reconoció la competencia de las comunidades autónomas para crearlas, y todas han acabado contando con una estructura de este tipo. Su función principal no consiste en el ejercicio de potestades administrativas ordinarias, sino en el seguimiento de la política europea, la representación ante las instituciones de la Unión y la asistencia a representantes autonómicos en órganos y foros europeos. Algunas comunidades que antes actuaban mediante fórmulas privadas adaptaron esas estructuras para integrarlas en la Administración autonómica con naturaleza pública.

4.5.4. Regímenes especiales

Existen comunidades autónomas cuyo entramado institucional presenta una complejidad singular. En el País Vasco, la organización territorial se apoya en los territorios históricos, que ejercen no solo competencias locales, sino también competencias autonómicas. En Canarias, los cabildos insulares no son simples entidades locales, sino instituciones autonómicas que representan ordinariamente al Gobierno y a la Administración autonómica en cada isla y desempeñan funciones administrativas autonómicas previstas en el estatuto o atribuidas por ley, transferencia o delegación. En Illes Balears, los consejos insulares son también instituciones de la comunidad autónoma, con competencias propias y posibilidad de asumir otras funciones ejecutivas y de gestión.

A ello se añade el caso singular de Arán, reconocido como entidad territorial especial con personalidad jurídica propia, autonomía garantizada y funciones tanto de autogobierno autonómico como de administración local. En todos estos supuestos no se trata de órganos periféricos de la administración autonómica ni de entes locales ordinarios, sino de piezas del propio sistema institucional autonómico, configuradas como fórmulas de descentralización política con distintos grados de intensidad y regulación propia. La existencia de estos entramados no excluye, además, que la Administración autonómica mantenga órganos periféricos para las competencias que ejerce de forma centralizada.

4.6. Los órganos consultivos jurídicos

Algunos primeros estatutos de autonomía ya previeron consejos consultivos autonómicos, inicialmente orientados sobre todo al control de adecuación estatutaria de proyectos o proposiciones de ley. En la actualidad casi todas las comunidades autónomas cuentan con órganos consultivos jurídicos propios, lo que evita acudir al Consejo de Estado en los supuestos en que la legislación exige su intervención o la del órgano autonómico equivalente. Estos órganos forman parte del sistema de garantías de la legalidad de la actuación de gobiernos y administraciones autonómicas. Solo las comunidades que no cuentan con órgano consultivo propio deben seguir recurriendo al Consejo de Estado, aunque en alguna comunidad se permite además solicitarle dictámenes facultativos aun existiendo órgano consultivo autonómico.

La creación de estos órganos fue impulsada por la jurisprudencia constitucional, que consideró que la función consultiva del Consejo de Estado constituía una garantía procedimental básica, pero que esa garantía podía satisfacerse mediante órganos autonómicos equivalentes en organización y competencias. Posteriormente, la legislación estatal generalizó la posibilidad de cumplir esa función mediante órganos específicos dotados de autonomía o, en determinados casos, mediante servicios jurídicos con especiales garantías de independencia, aunque las comunidades autónomas han optado de forma general por la primera fórmula. Con el tiempo, muchos de estos órganos consultivos se han incorporado a los estatutos de autonomía y han pasado a formar parte del diseño institucional básico de la comunidad autónoma.

Su denominación, composición y organización varían de una comunidad a otra, como expresión de la potestad de autoorganización. Es habitual que se presenten como órgano consultivo superior del Gobierno, de la Administración autonómica y, en ocasiones, también de las entidades locales, entes dependientes o universidades públicas. Su composición puede integrar miembros natos, electivos y, en algunas comunidades, miembros permanentes. También varían la forma de designación, el perfil profesional exigido, la duración del mandato y el régimen de incompatibilidades. Algunas comunidades cuentan además con cuerpos propios de letrados al servicio del órgano consultivo, mientras que otras prevén adscripciones temporales de juristas procedentes de distintos cuerpos y carreras.

Dentro de su diversidad pueden distinguirse dos grandes modelos. Unos órganos se limitan a funciones jurídico-administrativas semejantes a las del Consejo de Estado, como el dictamen sobre reglamentos, revisión de oficio, responsabilidad patrimonial, contratos administrativos o conflictos de atribuciones. Otros añaden funciones de asesoramiento político-estatutario, como las relativas a reformas estatutarias, anteproyectos de ley, recursos de inconstitucionalidad, conflictos competenciales o convenios de cooperación. En este segundo modelo la actividad consultiva se proyecta no solo sobre el Gobierno y la Administración, sino también sobre el Parlamento autonómico. Cataluña separa ambas funciones entre dos órganos distintos, uno para el asesoramiento jurídico-administrativo y otro para el asesoramiento político-estatutario. El número de miembros de estos órganos suele ser reducido.

4.7. Los órganos de participación y consulta.

Las comunidades autónomas han creado numerosos órganos de participación y consulta.

Algunos tienen carácter institucional por estar previstos en los estatutos, como ocurre habitualmente con los Consejos Económicos y Sociales. Otros son órganos colegiados insertos en la estructura administrativa, bien con funciones interdepartamentales de coordinación, bien con funciones participativas para incorporar a los sectores afectados por las políticas públicas.

Su finalidad no es solo consultiva y asesora, sino también favorecer el consenso previo en actuaciones significativas. En ocasiones la normativa sectorial exige su intervención en la elaboración de disposiciones reglamentarias para mejorar su acierto e idoneidad.

Estos órganos reciben denominaciones muy diversas y se extienden a todos los ámbitos materiales en que las comunidades autónomas ejercen competencias. Algunos pueden organizarse en varios niveles territoriales, combinando escalones autonómicos, supramunicipales y locales. Incluso existen comunidades que han establecido una regulación general de estos órganos consultivos y participativos.

4.8. Los órganos administrativos con competencia resolutoria.

4.8.1. Los jurados autonómicos de expropiación

La potestad autonómica de autoorganización se proyecta también sobre órganos administrativos con funciones decisorias. En materia expropiatoria, la Ley de Expropiación Forzosa prevé el Jurado Provincial de Expropiación, encargado de fijar el justiprecio. Tras la Constitución, muchas comunidades autónomas crearon sus propios jurados de expropiación para intervenir en las expropiaciones realizadas por la Administración autonómica o por las entidades locales de su territorio. Inicialmente se tendió a reproducir el modelo estatal, incluida la presencia de un magistrado, aunque esa composición fue después cuestionada a la luz de la jurisprudencia constitucional que negó a las comunidades competencia para integrar jueces o magistrados en órganos administrativos autonómicos en otros ámbitos.

Pese a ello, el Tribunal Constitucional no ha negado la constitucionalidad de los jurados autonómicos de expropiación ni ha exigido que su composición reproduzca la del artículo 32 de la Ley de Expropiación Forzosa. Ha entendido que su creación y regulación pertenecen a la competencia autonómica sobre organización y régimen jurídico de la Administración, y no a la competencia estatal sustantiva sobre expropiación forzosa, descartando además que la composición del jurado estatal constituya una base obligatoria. Por eso las comunidades autónomas han podido diseñar modelos organizativos distintos, ya sea con órganos provinciales, territoriales o únicos para todo su territorio, organizados en pleno y secciones o con criterios de distribución funcional. En las comunidades que no han creado jurados propios continúa actuando el Jurado Provincial de Expropiación estatal.

4.8.2. Los órganos autonómicos de resolución de las reclamaciones contractuales

La normativa europea sobre contratación pública exigió la existencia de recursos ágiles y eficaces frente a las infracciones en materia contractual. El legislador estatal incorporó en 2010 la posibilidad de un recurso especial no jurisdiccional ante órganos especializados e independientes, solución que pasó a formar parte de la legislación básica estatal. Desde entonces se prevé la existencia de tribunales administrativos de recursos contractuales de ámbito estatal, autonómico y local.

En este marco, las comunidades autónomas disponen de dos opciones organizativas: crear un órgano independiente propio para resolver estos recursos o atribuir esa función, mediante convenio, al Tribunal Administrativo Central de Recursos Contractuales. Si optan por crear un órgano propio, este puede ser unipersonal o colegiado, pero debe garantizar independencia, inamovilidad y cualificación jurídica y profesional suficiente. La legislación estatal exige esas garantías tanto respecto del titular o del presidente como en relación con el nombramiento y la terminación del mandato. El diseño concreto de estos órganos, por tanto, se integra en el margen de autoorganización autonómica, aunque sometido a los requisitos básicos estatales de independencia y especialización.

5. LA ADMINISTRACIÓN INSTITUCIONAL AUTONÓMICA

En la Administración autonómica debe distinguirse entre la Administración general de la comunidad autónoma y su Administración institucional, integrada por organismos públicos vinculados o dependientes de aquella para desarrollar actividades de ejecución o gestión, administrativas o económicas, cuya naturaleza justifique su organización en régimen de descentralización funcional. Se trata, por tanto, de una administración instrumental, creada para servir de apoyo funcional a la Administración general.

Aunque la jurisprudencia constitucional sostuvo inicialmente un criterio restrictivo sobre la creación por las comunidades autónomas de personificaciones instrumentales propias, ese planteamiento fue abandonado después. La jurisprudencia posterior ha entendido que la constitución de entidades de derecho privado para el cumplimiento de fines públicos forma parte de la potestad de autoorganización de las administraciones territoriales y ha avalado expresamente la creación de determinadas agencias autonómicas. Tampoco el legislador estatal ha dictado una regulación básica general sobre las personificaciones instrumentales de todas las administraciones públicas, sino que ha limitado su intervención a las entidades instrumentales de la Administración del Estado.

Algunos estatutos de autonomía asumen esta misma lógica y remiten a la ley la regulación de la organización administrativa, de las modalidades de descentralización funcional, de las distintas formas de personificación pública y privada, de la gestión de los servicios públicos y de la participación del sector privado en la ejecución de políticas públicas. Esa remisión legal ha sido considerada constitucional siempre que se entienda sometida a las bases estatales dictadas al amparo del artículo 149.1.18 CE.

Las modalidades concretas de personificación instrumental se regulan en normas autonómicas específicas. Por lo general, estas regulaciones son poco densas y reproducen, con ligeras variantes, las figuras ya previstas en la legislación estatal o se remiten directamente a ella, pese a que no tenga carácter básico en este ámbito. Así, la normativa estatal actúa como modelo de referencia que las comunidades autónomas adoptan voluntariamente, total o parcialmente.

En varias comunidades autónomas se mantiene la distinción básica entre organismos autónomos y entidades públicas empresariales. Los primeros suelen asumir actividades administrativas de fomento, prestaciones o gestión de servicios públicos, mientras que las segundas se orientan a actividades y servicios de contenido económico o a la producción de bienes de interés público susceptibles de contraprestación. Junto a estas entidades de derecho público, el sector público autonómico incorpora también entidades de derecho privado, principalmente fundaciones constituidas mayoritaria o totalmente con aportaciones públicas y sociedades mercantiles cuyo capital pertenece íntegra o mayoritariamente, de forma directa o indirecta, a la Administración autonómica.

En el pasado, la regulación de estos entes se integraba en algunos casos en la normativa de hacienda autonómica, porque esta actuaba como derecho común de la pluralidad de entes institucionales y empresas públicas. Posteriormente, varias comunidades autónomas han adoptado una concepción más amplia y moderna basada en la idea de sector público o sector público institucional, siguiendo una visión unificadora semejante a la utilizada por el legislador estatal. En ese marco es frecuente incluir también a las universidades públicas radicadas en el territorio autonómico y a los consorcios del sector público, dada su vinculación financiera o funcional con la comunidad autónoma.

Pese a la existencia de regulaciones generales, su eficacia ordenadora es limitada. La reserva de ley en esta materia hace que las entidades instrumentales se creen normalmente mediante leyes singulares, a menudo vinculadas a las leyes de acompañamiento presupuestario, con una fuerte tendencia a excepcionar el marco general. Por ello, el régimen común no siempre consigue imponer una ordenación uniforme del sector público autonómico.

La dimensión de este sector público institucional es relevante y ha crecido al compás de las necesidades sociales, del proceso de transferencias y de la ampliación competencial. Los ámbitos tradicionales de actuación de los entes instrumentales en el Estado también lo son en el nivel autonómico, especialmente en sectores como salud, vivienda, medio ambiente, radiotelevisión, promoción económica, transporte, cultura, evaluación universitaria o desarrollo territorial. No obstante, entre 2010 y 2014 varias comunidades autónomas llevaron a cabo procesos de reestructuración y racionalización de su Administración institucional a causa de la crisis financiera.

Uno de los problemas clásicos de estas entidades, su opacidad, ha sido afrontado mediante la creación del Inventario de Entidades del Sector Público Estatal, Autonómico y Local, que constituye la única norma básica específica en este ámbito. Este registro público administrativo, gestionado por la Intervención General de la Administración del Estado, garantiza la publicidad y fiabilidad de la información sobre todas las entidades integrantes del sector público institucional, con independencia de su naturaleza jurídica y de su dependencia estatal, autonómica o local.

Por último, una entidad de derecho público autonómica puede actuar fuera del territorio de la comunidad autónoma cuando interviene como operador económico y sus normas constitutivas la habilitan para ello. En tal caso puede operar al margen del ejercicio de potestades jurídicopúblicas, incluso presentándose a procedimientos de contratación pública convocados por administraciones distintas de aquella de la que depende.

6. LAS AUTORIDADES INDEPENDIENTES AUTONÓMICAS

Las comunidades autónomas pueden crear autoridades independientes, ya sea por previsión estatutaria o por ley. Su implantación es menos extensa que en otros ámbitos, debido al coste institucional que implica dotarlas de autonomía funcional e independencia, pero existen varios ejemplos relevantes.

6.1. Organismos de Defensa de la Competencia

A partir de la doctrina constitucional y de la Ley 1/2002, varias comunidades autónomas han organizado autoridades propias de defensa de la competencia para investigar y sancionar conductas anticompetitivas cuyos efectos no superan el ámbito autonómico. Esa ley estatal fijó exigencias orgánicas y funcionales tan intensas que frenó la expansión generalizada de estos órganos. En particular, impuso la separación entre la instrucción y la resolución de los expedientes, permitiendo bien un organismo único con órganos internos diferenciados para cada función, bien un órgano resolutorio separado de un servicio instructor integrado en una consejería autonómica, normalmente la competente en materia económica.

La denominación de estos órganos varía entre comunidades autónomas y su configuración también ha sido desigual. Algunas han creado organismos autónomos con personalidad jurídica propia, adscritos a la consejería competente en hacienda, mientras que otras solo han asumido funciones instructoras y han dejado la resolución en manos del órgano estatal. También hay comunidades que suprimieron órganos que inicialmente habían creado y otras que nunca llegaron a establecer ni órganos ni servicios propios en esta materia. Además de las funciones de instrucción, resolución y sanción, estos órganos o servicios suelen asumir tareas consultivas y de promoción de la competencia. Cuando tienen competencia resolutoria, sus órganos se integran por tres miembros nombrados por seis años no renovables.

6.2. Consejos del Audiovisual

Algunas comunidades autónomas cuentan con consejos audiovisuales como entidades públicas independientes de naturaleza estatutaria. Su función principal consiste en garantizar y controlar la actividad de los medios de comunicación audiovisual, tanto públicos como privados, dentro de su ámbito territorial. Supervisan la aplicación de la normativa sobre comunicación audiovisual, publicidad y protección de la infancia y la adolescencia, y en algunos casos se les reconoce también potestad normativa en su ámbito material.

La composición y el sistema de designación de sus miembros varían según la comunidad autónoma. Sus competencias también presentan diferencias. En unos casos pueden dictar instrucciones o desarrollar reglamentariamente la legislación audiovisual; en otros, además de ejercer potestades sancionadoras, participan en procesos de adjudicación de licencias y concesiones de radio y televisión. Existen también modelos con funciones más limitadas, en los que el consejo puede dictar resoluciones vinculantes, recomendaciones, requerimientos de cese, intervenir en licencias y renovaciones, pedir información e inspeccionar.

6.3. Agencias de Protección de Datos

Las autoridades autonómicas de protección de datos pueden ejercer, conforme a la normativa europea y autonómica, las funciones generales de supervisión y control respecto de tratamientos de datos vinculados al sector público autonómico y local, a quienes prestan servicios mediante formas de gestión directa o indirecta y a quienes tratan datos en el ejercicio de funciones públicas en materias de competencia autonómica o local. También pueden intervenir en otros tratamientos expresamente previstos en los respectivos estatutos de autonomía.

Junto a esas funciones generales, estas agencias pueden dictar circulares respecto de los tratamientos sometidos a su competencia, con el alcance y los efectos previstos legalmente para la Agencia Española de Protección de Datos.

6.4. Consejos de Transparencia

Varias comunidades autónomas han creado órganos propios de transparencia y acceso a la información pública con autonomía funcional, siguiendo el modelo estatal del Consejo de Transparencia y Buen Gobierno. En otros casos, en lugar de crear un órgano propio, la comunidad autónoma ha suscrito convenios con el órgano estatal para que este resuelva las reclamaciones relativas a la administración autonómica.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
